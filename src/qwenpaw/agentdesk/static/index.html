              const task = getTaskById(taskId);
              if (task) {
                try {
                  remote = await window.AgentDeskAPI.getTask(taskId);
                  syncTaskMessages(task, remote.messages);
                  patchPendingUserTail(task, remote);
                } catch (_) {
                  /* ignore message sync errors */
                }
              }
              const hydrated = await hydrateSkillWizardFromServer(taskId);
              if (!hydrated) {
                await retryOrphanedSkillWizardStream(taskId, remote);
              }
              if (!shouldApplyStreamUi(taskId)) return;
              wizardSubmitting = false;
              refreshSkillWizardComposer(taskId);
            } finally {
              skillWizardRecoverInflight.delete(taskId);
            }
          })();
        }
      };

      const refreshSkillWizardPanelInPlace = (taskId) => {
        refreshSkillWizardComposer(taskId);
      };

      const collectCurrentWizardAnswer = (q) => {
        if (!q) return {};
        const qid = String(q.id);
        const wrap = document.getElementById("skillWizardComposerWrap");
        const scope = wrap || mainPanel;
        if (q.type === "single") {
          const buttons = scope.querySelectorAll('[data-wizard-qid][data-wizard-multi="0"]');
          const active = Array.from(buttons).find(
            (node) =>
              node.getAttribute("data-wizard-qid") === qid &&
              node.getAttribute("data-wizard-selected") === "1",
          );
          if (active) return { [q.id]: active.getAttribute("data-wizard-option") };
          const draftVal = wizardDraftAnswers[q.id];
          if (draftVal !== undefined && draftVal !== "") return { [q.id]: draftVal };
          const picked = scope.querySelector(`input[name="wizard-${qid}"]:checked`);
          return { [q.id]: picked instanceof HTMLInputElement ? picked.value : q.default || "" };
        }
        if (q.type === "multiple") {
          const selected = Array.from(
            scope.querySelectorAll('[data-wizard-qid][data-wizard-multi="1"]'),
          )
            .filter(
              (node) =>
                node.getAttribute("data-wizard-qid") === qid &&
                node.getAttribute("data-wizard-selected") === "1",
            )
            .map((node) => node.getAttribute("data-wizard-option") || "");
          if (selected.length) return { [q.id]: selected };
          const draftVal = wizardDraftAnswers[q.id];
          if (Array.isArray(draftVal) && draftVal.length) return { [q.id]: draftVal };
          return { [q.id]: selected };
        }
        const input = scope.querySelector(`input[data-wizard-text="${qid}"]`);
        return { [q.id]: input instanceof HTMLInputElement ? input.value.trim() : "" };
      };

      const collectWizardAnswersFromDom = () => {
        const w = currentSkillWizard;
        if (!w) return { ...wizardDraftAnswers };
        return { ...wizardDraftAnswers, ...collectCurrentWizardAnswer(w.questions[wizardStepIndex]) };
      };

      const submitChatChoice = (taskId, choiceAnswer) => {
        prepareTaskStreamForUserSend(taskId);
        const letter = choiceAnswer.letter || "";
        const label = choiceAnswer.label || choiceAnswer.custom || "";
        const userText = choiceAnswer.custom
          ? `选择：${label}`
          : `选择 ${letter}：${label}`;
        clearChatChoices();
        refreshChatChoicesComposer();
        const task = getTaskById(taskId);
        if (!task) return;
        void executeTaskFlow(taskId, userText, { choiceAnswer });
      };

      const submitBranchChoice = (taskId, branchAnswer) => {
        const letter = branchAnswer.letter || "";
        const label = branchAnswer.label || branchAnswer.custom || "";
        const userText = branchAnswer.custom
          ? `对齐选择：${label}`
          : `对齐选择 ${letter}：${label}`;
        branchCustomDraft = "";
        if (currentSkillWizard) {
          currentSkillWizard = { ...currentSkillWizard, branch_choices: null };
        }
        wizardSubmitting = true;
        refreshSkillWizardComposer(taskId);
        void runSkillWizardStream(
          taskId,
          "dialogue",
          { branch_answer: branchAnswer },
          userText,
        );
      };

      const GATE0_QUESTION_IDS = new Set(["duplicate_action", "duplicate_resolution"]);

      const isGate0Question = (q) => q && GATE0_QUESTION_IDS.has(q.id);

      const submitGate0Choice = (taskId, questions, patch) => {
        wizardDraftAnswers = { ...wizardDraftAnswers, ...patch };
        wizardSubmitting = true;
        refreshSkillWizardComposer(taskId);
        void runSkillWizardStream(
          taskId,
          "answer",
          {
            gate0_only: true,
            answers: { ...defaultWizardAnswers(questions), ...wizardDraftAnswers },
          },
          "提交重名选项",
        );
      };

      const advanceWizardStep = (taskId, { skip = false, knownPatch = null } = {}) => {
        const w = currentSkillWizard;
        const wStatus = normalizeWizardStatus(w);
        if (!w || (wStatus !== "skill_clarifying" && wStatus !== "skill_branch_dialogue")) return;
        if (wizardSubmitting) return;
        const questions = w.questions || [];
        const q = questions[wizardStepIndex];
        if (!q) return;
        let patch;
        if (skip) {
          patch = { [q.id]: q.default !== undefined ? q.default : q.type === "multiple" ? [] : "" };
        } else {
          patch =
            knownPatch && knownPatch[q.id] !== undefined && knownPatch[q.id] !== ""
              ? knownPatch
              : collectCurrentWizardAnswer(q);
          if (
            (q.type === "single" || q.type === "multiple") &&
            (patch[q.id] === undefined || patch[q.id] === "" || (q.type === "multiple" && !Array.isArray(patch[q.id])))
          ) {
            const draftVal = wizardDraftAnswers[q.id];
            if (draftVal !== undefined && draftVal !== "") {
              patch = { [q.id]: draftVal };
            }
          }
          const v = patch[q.id];
          if (q.type === "multiple" && (!Array.isArray(v) || v.length === 0)) {
            window.alert("请至少选择一项，或点「跳过」");
            return;
          }
          if (q.type === "text" && !String(v || "").trim()) {
            window.alert("请填写内容，或点「跳过」");
            return;
          }
          if (q.type === "single" && !v) {
            window.alert("请选择一项，或点「跳过」");
            return;
          }
        }
        wizardTouchedIds.add(q.id);
        wizardDraftAnswers = { ...wizardDraftAnswers, ...patch };
        if (wStatus === "skill_clarifying" && isGate0Question(q) && !skip && patch[q.id]) {
          submitGate0Choice(taskId, questions, patch);
          return;
        }
        const isLast = wizardStepIndex >= questions.length - 1;
        if (isLast) {
          wizardSubmitting = true;
          refreshSkillWizardComposer(taskId);
          const wizardAction = wStatus === "skill_branch_dialogue" ? "dialogue" : "answer";
          void runSkillWizardStream(
            taskId,
            wizardAction,
            { answers: { ...defaultWizardAnswers(questions), ...wizardDraftAnswers } },
            wStatus === "skill_branch_dialogue" ? "提交对齐选项" : "提交技能选项",
          );
          return;
        }
        wizardStepIndex += 1;
        refreshSkillWizardComposer(taskId);
      };

      const runSkillWizardStream = async (
        taskId,
        action,
        wizardPayload,
        userText,
        { skipLock = false } = {},
      ) => {
        const task = getTaskById(taskId);
        if (!task) return;
        abortTaskStream(taskId);
        if (isTaskStreamingNow(taskId)) resetTaskStreamUiState();
        if (!skipLock) {
          if (streamRequestLock) {
            prepareTaskStreamForUserSend(taskId);
          }
          streamRequestLock = true;
        }
        if (
          action === "dialogue" &&
          currentSkillWizard?.status === "skill_branch_dialogue" &&
          !wizardPayload?.branch_answer
        ) {
          currentSkillWizard = { ...currentSkillWizard, branch_choices: null };
          refreshSkillWizardPanelInPlace(taskId);
        }
        isTaskStreaming = true;
        streamingTaskId = taskId;
        chatStickToBottom = true;
        chatUserDetached = false;
        setChatStreamingUi(true);
        resetStreamTrace();
        if (userText) {
          setPendingUserMessage(taskId, userText);
          const lastMsg = task.messages[task.messages.length - 1];
          const alreadyHasUser =
            lastMsg?.role === "user" && String(lastMsg.content || "") === userText;
          if (!alreadyHasUser) {
            task.messages.push({ role: "user", content: userText, sender: "你" });
          }
        }
        const assistantMsg = {
          role: "assistant",
          sender: "skill-creator",
          content: "",
        };
        task.messages.push(assistantMsg);
        streamingAssistantMsgRef = assistantMsg;
        rerenderTaskIfActive(taskId, { refreshSidebar: true, forceFullRender: true });
        refreshSkillWizardPanelInPlace(taskId);

        const payload = {
          task_id: taskId,
          message: userText || "继续技能创建",
          mode: "single",
          chat_mode: "chat",
          intent: "skill_create",
          wizard_action: action,
          wizard_payload: wizardPayload || {},
        };

        try {
          abortTaskStream(taskId);
          startSkillWizardPlanPoll(taskId);
          await window.AgentDeskAPI.chatStream(
            payload,
            (evt) => {
              handleChatStreamEvent(evt, taskId, assistantMsg);
            },
            {
              timeoutMs: 600000,
              onController: (ctrl) => {
                taskStreamControllers.set(taskId, ctrl);
              },
            },
          );
        } catch (error) {
          if (!streamAbortRequested && !isBenignStreamAbort(error)) {
            task.messages.push({
              role: "system",
              sender: "系统",
              content: error instanceof Error ? error.message : "调用失败",
            });
            try {
              await refreshTaskPlan(taskId);
              wizardSubmitting = false;
              refreshSkillWizardPanelInPlace(taskId);
            } catch (_) {
              /* keep in-memory wizard if any */
            }
            refreshChatMessagesInPlace(taskId);
          }
        } finally {
          streamAbortRequested = false;
          stopSkillWizardPlanPoll();
          wizardSubmitting = false;
          isTaskStreaming = false;
          streamingTaskId = null;
          setChatStreamingUi(false);
          cancelStreamBubblePaint();
          taskStreamControllers.delete(taskId);
          flushTaskCheckpointPersist();
          const last = task.messages[task.messages.length - 1];
          if (last?.role === "assistant" && last.content) {
            patchStreamingAssistantBubble(last.content, { finalize: true });
          }
          if (last?.role === "assistant") {
            if (currentTurnRuntime) {
              currentTurnRuntime.stats = currentTaskStats ? { ...currentTaskStats } : null;
            }
            const turnIdx = task.messages.lastIndexOf(last);
            finalizeTurnRuntimeOnMessage(last, turnIdx >= 0 ? turnIdx : task.messages.length - 1);
          }
          try {
            await hydrateSkillWizardFromServer(taskId, { allowWhileStreaming: true });
            await refreshTaskMetaFromServer(taskId);
          } catch (_) {
            /* keep in-memory wizard from stream events */
          }
          refreshSkillWizardPanelInPlace(taskId);
          clearStreamingAssistantRef();
          refreshChatMessagesInPlace(taskId);
          renderTaskList();
          if (!skipLock) streamRequestLock = false;
        }
      };

      const ensureSkillWizardDelegatedEvents = () => {
        if (skillWizardEventsBound) return;
        skillWizardEventsBound = true;

        document.addEventListener("click", (event) => {
          const taskId = activeTaskId;
          if (!taskId || currentView !== "task-conversation") return;

          const chatChoiceBtn = event.target.closest("[data-chat-option]");
          if (chatChoiceBtn && chatChoiceBtn.closest("#chatChoicesComposerWrap") && currentChatChoices) {
            try {
              const raw = chatChoiceBtn.getAttribute("data-chat-payload") || "{}";
              const payload = JSON.parse(raw);
              submitChatChoice(taskId, payload);
            } catch (_) {
              window.alert("选项数据异常，请改用 E 自定义或下方输入框回复。");
            }
            return;
          }

          const chatCustomBtn = event.target.closest("[data-chat-action='submit-custom']");
          if (
            chatCustomBtn &&
            chatCustomBtn.closest("#chatChoicesComposerWrap") &&
            currentChatChoices
          ) {
            const input = document.querySelector("#chatChoicesComposerWrap [data-chat-custom-input]");
            const custom =
              input instanceof HTMLInputElement ? input.value.trim() : chatChoiceCustomDraft.trim();
            if (!custom) {
              window.alert("请在 E 输入框填写自定义内容");
              return;
            }
            submitChatChoice(taskId, { custom });
            return;
          }

          const branchBtn = event.target.closest("[data-branch-option]");
          if (
            branchBtn &&
            branchBtn.closest("#skillWizardComposerWrap") &&
            normalizeWizardStatus(currentSkillWizard) === "skill_branch_dialogue"
          ) {
            try {
              const raw = branchBtn.getAttribute("data-branch-payload") || "{}";
              const payload = JSON.parse(raw);
              submitBranchChoice(taskId, payload);
            } catch (_) {
              window.alert("选项数据异常，请改用 E 自定义或下方输入框回复。");
            }
            return;
          }

          const branchCustomBtn = event.target.closest("[data-branch-action='submit-custom']");
          if (
            branchCustomBtn &&
            branchCustomBtn.closest("#skillWizardComposerWrap") &&
            normalizeWizardStatus(currentSkillWizard) === "skill_branch_dialogue"
          ) {
            const input = document.querySelector(
              "#skillWizardComposerWrap [data-branch-custom-input]",
            );
            const custom =
              input instanceof HTMLInputElement ? input.value.trim() : branchCustomDraft.trim();
            if (!custom) {
              window.alert("请在 E 输入框填写自定义内容");
              return;
            }
            submitBranchChoice(taskId, { custom });
            return;
          }

          const optBtn = event.target.closest("[data-wizard-option]");
          if (optBtn && optBtn.closest("#skillWizardComposerWrap")) {
            if (wizardSubmitting) return;
            const qid = optBtn.getAttribute("data-wizard-qid") || "";
            const opt = optBtn.getAttribute("data-wizard-option") || "";
            const isMulti = optBtn.getAttribute("data-wizard-multi") === "1";
            const w = currentSkillWizard;
            const wStatus = normalizeWizardStatus(w);
            if (wStatus !== "skill_clarifying" && wStatus !== "skill_branch_dialogue") return;
            const q = findWizardQuestion(w, qid);
            if (!q) return;
            const answerKey = String(q.id);
            if (isMulti) {
              const cur = Array.isArray(wizardDraftAnswers[answerKey])
                ? [...wizardDraftAnswers[answerKey]]
                : [];
              const idx = cur.indexOf(opt);
              if (idx >= 0) cur.splice(idx, 1);
              else if (opt) cur.push(opt);
              wizardDraftAnswers = { ...wizardDraftAnswers, [answerKey]: cur };
            } else {
              wizardDraftAnswers = { ...wizardDraftAnswers, [answerKey]: opt };
              wizardTouchedIds.add(answerKey);
              if (q.type === "single") {
                refreshSkillWizardComposer(taskId);
                const patch = { [answerKey]: opt };
                if (wStatus === "skill_clarifying" && isGate0Question(q)) {
                  submitGate0Choice(taskId, w.questions || [], patch);
                } else {
                  advanceWizardStep(taskId, { skip: false, knownPatch: patch });
                }
                return;
              }
            }
            refreshSkillWizardComposer(taskId);
            return;
          }

          const actionBtn = event.target.closest("[data-wizard-action]");
          if (!actionBtn || !actionBtn.closest("#skillWizardComposerWrap")) return;
          const action = actionBtn.getAttribute("data-wizard-action");
          if (action === "toggle-collapse") {
            wizardComposerCollapsed = !wizardComposerCollapsed;
            refreshSkillWizardComposer(taskId);
            return;
          }
          if (action === "complete-step") {
            advanceWizardStep(taskId, { skip: false });
            return;
          }
          if (action === "skip-step") {
            advanceWizardStep(taskId, { skip: true });
            return;
          }
          if (action === "confirm") {
            void runSkillWizardStream(
              taskId,
              "confirm",
              readSkillPlanEditorPayload(),
              "确认创建技能",
            );
          } else if (action === "cancel") {
            skillWizardDismissedTaskIds.add(taskId);
            dismissSkillWizardComposer(taskId);
            void runSkillWizardStream(taskId, "cancel", {}, "取消技能创建", { skipLock: true });
          } else if (action === "dismiss") {
            dismissSkillWizardComposer(taskId);
          } else if (action === "retry-start") {
            void (async () => {
              let remote = null;
              try {
                remote = await window.AgentDeskAPI.getTask(taskId);
              } catch (_) {
                remote = null;
              }
              await retryOrphanedSkillWizardStream(taskId, remote, { force: true });
            })();
          } else if (action === "retry-branch-choices") {
            wizardSubmitting = true;
            refreshSkillWizardComposer(taskId);
            void runSkillWizardStream(
              taskId,
              "dialogue",
              { regenerate_branch_choices: true },
              "重新生成对齐选项",
            );
          }
        });

        document.addEventListener("input", (event) => {
          const planEditor = event.target.closest("[data-skill-plan-editor]");
          if (planEditor instanceof HTMLTextAreaElement) {
            applySkillPlanEditorValue(planEditor.value);
            return;
          }
          const input = event.target.closest("[data-branch-custom-input]");
          if (input instanceof HTMLInputElement && input.closest("#skillWizardComposerWrap")) {
            branchCustomDraft = input.value;
          }
        });

        document.addEventListener("keydown", (event) => {
          if (!event.target.closest("#skillWizardPanel")) return;
          if (event.key !== "Enter" || event.shiftKey) return;
          const customInput = event.target.closest("[data-branch-custom-input]");
          if (
            customInput &&
            normalizeWizardStatus(currentSkillWizard) === "skill_branch_dialogue" &&
            activeTaskId
          ) {
            event.preventDefault();
            const custom = customInput.value.trim();
            if (custom) submitBranchChoice(activeTaskId, { custom });
            return;
          }
          if (normalizeWizardStatus(currentSkillWizard) !== "skill_clarifying" || wizardSubmitting) {
            return;
          }
          const tag = event.target?.tagName?.toLowerCase();
          if (tag === "textarea") return;
          event.preventDefault();
          const taskId = activeTaskId;
          if (taskId) advanceWizardStep(taskId, { skip: false });
        });
      };

      const applySkillWizardFromPlan = (plan, taskId = activeTaskId) => {
        if (!plan) return false;
        const status = plan.status || "idle";
        if (
          taskId &&
          skillWizardDismissedTaskIds.has(taskId) &&
          status !== "skill_done" &&
          status !== "skill_cancelled"
        ) {
          currentPlanState = { status, tasks: plan.tasks || [] };
          return false;
        }
        if (status === "skill_done" || status === "skill_cancelled") {
          skillWizardDismissedTaskIds.delete(taskId);
        }
        if (plan.wizard) {
          const incoming = plan.wizard;
          const local = currentSkillWizard;
          const localBc = local?.branch_choices;
          const hasLocalBc =
            localBc && Array.isArray(localBc.options) && localBc.options.length;
          const incomingBc = incoming.branch_choices;
          const hasIncomingBc =
            incomingBc &&
            Array.isArray(incomingBc.options) &&
            incomingBc.options.length;
          currentSkillWizard =
            hasLocalBc && !hasIncomingBc
              ? {
                  ...incoming,
                  branch_choices: localBc,
                  status: incoming.status || status,
                }
              : { ...incoming, status: incoming.status || status };
          currentPlanState = {
            status: status || currentPlanState.status,
            tasks: plan.tasks || [],
          };
          const serverAnswers = plan.wizard.answers || {};
          wizardDraftAnswers = {
            ...defaultWizardAnswers(plan.wizard.questions || []),
            ...wizardDraftAnswers,
            ...serverAnswers,
          };
          Object.keys(serverAnswers).forEach((id) => wizardTouchedIds.add(id));
          if ((plan.wizard.questions || []).length > 0) {
            activeComposerIntent = "normal";
            pendingComposerSkillTag = null;
          }
          if (!wizardSubmitting) {
            syncWizardClarifyProgress();
          }
          return true;
        }
        if (String(status).startsWith("skill_")) {
          currentPlanState = { status, tasks: plan.tasks || [] };
          if (!currentSkillWizard || !String(currentSkillWizard.status || "").startsWith("skill_")) {
            currentSkillWizard = {
              kind: "skill_create",
              status,
              questions: [],
              answers: {},
            };
          }
          return true;
        }
        return false;
      };

      const hydrateSkillWizardFromServer = async (taskId, opts = {}) => {
        const allowWhileStreaming = !!opts.allowWhileStreaming;
        if (!taskId || (!allowWhileStreaming && isTaskStreamingNow(taskId))) return false;
        try {
          const plan = await window.AgentDeskAPI.getTaskPlan(taskId);
          return applySkillWizardFromPlan(plan);
        } catch (_) {
          return false;
        }
      };

      const refreshTaskPlan = async (taskId) => {
        try {
          const plan = await window.AgentDeskAPI.getTaskPlan(taskId);
          if (!applySkillWizardFromPlan(plan)) {
            currentPlanState = { status: plan.status || "idle", tasks: plan.tasks || [] };
            if (
              !isTaskStreaming &&
              !String(plan.status || "").startsWith("skill_") &&
              !String(currentSkillWizard?.status || "").startsWith("skill_")
            ) {
              dismissSkillWizardComposer(taskId);
            }
          }
        } catch (_) {
          currentPlanState = { status: "idle", tasks: [] };
          if (!isTaskStreaming && !String(currentSkillWizard?.status || "").startsWith("skill_")) {
            currentSkillWizard = null;
          }
        }
      };

      const pruneEmptyAssistantMessages = (task) => {
        if (!task || !Array.isArray(task.messages)) return;
        task.messages = task.messages.filter(
          (message) =>
            message.role !== "assistant" ||
            String(message.content || "").trim().length > 0 ||
            message.streaming === true ||
            (teamStreamActive &&
              (message === streamingAssistantMsgRef || message === teamStreamAssistant)),
        );
      };

      const upgradeTeamSpeakerRuntimeToComplete = (task, msg) => {
        if (!task || !msg?.runtime) return;
        msg.streaming = false;
        const renderMessages = getRenderableTaskMessages(task);
        const renderIdx = renderMessages.indexOf(msg);
        if (renderIdx < 0) return;
        const row = document.querySelector(`[data-assistant-turn="${renderIdx}"]`);
        if (!row) return;
        const liveRoot = row.querySelector("#turnRuntimeLive");
        const completeHtml = renderTurnRuntimeHtml(msg.runtime, {
          phase: "complete",
          turnKey: String(renderIdx),
        });
        if (liveRoot) {
          if (completeHtml) liveRoot.outerHTML = completeHtml;
          else liveRoot.remove();
          return;
        }
        if (!completeHtml || row.querySelector(".wm-turn-runtime")) return;
        const label = row.querySelector(".mb-1") || row.firstElementChild;
        if (label) label.insertAdjacentHTML("afterend", completeHtml);
      };

      const finalizeTeamStreamSpeaker = (task, { refreshUi = false } = {}) => {
        const finishedMsg = teamStreamAssistant;
        if (teamStreamActive && finishedMsg && currentTurnRuntime) {
          const idx = task?.messages?.indexOf(finishedMsg) ?? -1;
          snapshotTurnRuntimeToMessage(finishedMsg, idx >= 0 ? idx : 0, {
            keepLive: false,
          });
        }
        if (finishedMsg) finishedMsg.streaming = false;
        teamStreamAssistant = null;
        if (teamStreamActive) {
          streamingAssistantMsgRef = null;
          if (task) pruneEmptyAssistantMessages(task);
        }
        if (refreshUi && task && finishedMsg) {
          upgradeTeamSpeakerRuntimeToComplete(task, finishedMsg);
        }
      };

      const resetLiveTurnRuntimeForNextSpeaker = () => {
        currentTurnRuntime = createEmptyTurnRuntime();
      };

      const buildAssistantMessageRowHtml = (task, message, renderIdx, { streaming = false } = {}) => {
        const md = window.AgentDeskMarkdown;
        const isStreamingBubble = Boolean(streaming);
        const bubbleClass = [
          "inline-block max-w-[75%] rounded-2xl border border-gray-200 bg-white px-4 py-3 text-[13px] text-gray-700",
          isStreamingBubble || !md ? "whitespace-pre-wrap" : md.bubbleClassForMessage(message),
          isStreamingBubble ? "min-h-[2.5rem]" : "",
        ]
          .filter(Boolean)
          .join(" ");
        const bubbleId = isStreamingBubble ? ' id="streamingAssistantBubble"' : "";
        const bubbleContent =
          isStreamingBubble && isStreamingPlaceholderOnly(message.content)
            ? STREAMING_PLACEHOLDER
            : message.content;
        const bubbleBody =
          isStreamingBubble || !md
            ? escapeHtml(bubbleContent)
            : md.renderMessageBubbleHtml(message);
        const bubbleHtml = `<div${bubbleId} class="${bubbleClass}">${bubbleBody}</div>`;
        const runtimeSource = isStreamingBubble && currentTurnRuntime ? currentTurnRuntime : message.runtime;
        const runtimeHtml =
          message.role === "assistant" && runtimeSource
            ? renderTurnRuntimeHtml(runtimeSource, {
                phase: isStreamingBubble ? "streaming" : "complete",
                turnKey: isStreamingBubble ? "live" : String(renderIdx),
              })
            : "";
        return `
            <div class="" data-assistant-turn="${renderIdx}">
              ${renderMessageLabelHtml(message)}
              ${runtimeHtml}
              ${bubbleHtml}
            </div>
          `;
      };

      const mountTeamStreamWorkerBubble = (taskId, streamMsg) => {
        const task = getTaskById(taskId);
        const root = document.getElementById("chatMessagesRoot");
        if (!task || !root || !streamMsg) {
          refreshChatMessagesInPlace(taskId);
          return;
        }
        document.getElementById("streamingAssistantBubble")?.removeAttribute("id");
        getActiveLiveRuntimeRoot()?.remove();
        const renderMessages = getRenderableTaskMessages(task);
        const renderIdx = renderMessages.indexOf(streamMsg);
        if (renderIdx < 0) {
          refreshChatMessagesInPlace(taskId);
          return;
        }
        let row = root.querySelector(`[data-assistant-turn="${renderIdx}"]`);
        if (!row) {
          root.insertAdjacentHTML("beforeend", buildAssistantMessageRowHtml(task, streamMsg, renderIdx, { streaming: true }));
          row = root.querySelector(`[data-assistant-turn="${renderIdx}"]`);
        } else {
          const bubble = row.querySelector(".rounded-2xl");
          if (bubble) {
            bubble.id = "streamingAssistantBubble";
            bubble.textContent = streamMsg.content || STREAMING_PLACEHOLDER;
          }
          row.querySelector("#turnRuntimeLive")?.remove();
          if (!row.querySelector("#turnRuntimeLive") && currentTurnRuntime) {
            const rtHtml = renderTurnRuntimeHtml(currentTurnRuntime, {
              phase: "streaming",
              turnKey: "live",
            });
            if (rtHtml) {
              const label = row.querySelector(".mb-1") || row.firstElementChild;
              if (label) label.insertAdjacentHTML("afterend", rtHtml);
            }
          }
        }
        streamingAssistantMsgRef = streamMsg;
        syncTurnRuntimeOpenStateDom("live");
        traceScrollListenerBound = false;
        ensureTraceScrollBehavior();
        scrollChatToBottom({ force: isTaskStreaming && !chatUserDetached });
      };

      const findReuseTeamStreamMessage = (task, sender) => {
        if (!teamStreamActive || !teamActiveWorker) return null;
        const name = normalizeTeamStreamSender(sender);
        if (normalizeTeamStreamSender(teamActiveWorker) !== name) return null;
        let lastUserIdx = -1;
        for (let i = (task.messages?.length || 0) - 1; i >= 0; i -= 1) {
          if (task.messages[i]?.role === "user") {
            lastUserIdx = i;
            break;
          }
        }
        for (let i = task.messages.length - 1; i > lastUserIdx; i -= 1) {
          const m = task.messages[i];
          if (m?.role === "assistant" && normalizeTeamStreamSender(m.sender) === name) {
            return m;
          }
        }
        return null;
      };

      const ensureTeamStreamAssistant = (task, sender) => {
        const name = normalizeTeamStreamSender(sender, teamStreamAssistant?.sender || teamActiveWorker);
        if (
          teamStreamAssistant &&
          normalizeTeamStreamSender(teamStreamAssistant.sender) === name
        ) {
          streamingAssistantMsgRef = teamStreamAssistant;
          return teamStreamAssistant;
        }
        const reused = findReuseTeamStreamMessage(task, name);
        if (reused) {
          teamStreamAssistant = reused;
          streamingAssistantMsgRef = reused;
          return reused;
        }
        teamStreamAssistant = { role: "assistant", sender: name, content: "" };
        task.messages.push(teamStreamAssistant);
        streamingAssistantMsgRef = teamStreamAssistant;
        return teamStreamAssistant;
      };

      const handleChatStreamEvent = (evt, taskId, assistantMsg) => {
        const task = getLiveTask(taskId);
        if (!task) return;
        const reduced = reduceIncomingStreamEvent(evt, taskId);
        if (!reduced.applied) return;
        const streamTurn = reduced.turn;
        const applyUi = shouldApplyStreamUi(taskId);
        if (evt.type === "heartbeat") {
          if (currentTurnRuntime) {
            currentTurnRuntime.pulseAt = Date.now();
            if (applyUi) scheduleTurnRuntimePanelRefreshThrottled();
          }
          return;
        }
        if (evt.type === "artifact") {
          if (!currentTurnRuntime) currentTurnRuntime = createEmptyTurnRuntime();
          currentTurnRuntime.artifacts = currentTurnRuntime.artifacts || [];
          currentTurnRuntime.artifacts.push(evt);
          if (applyUi && assistantMsg) {
            assistantMsg.artifacts = normalizeArtifactList(currentTurnRuntime.artifacts);
          }
          return;
        }
        if (evt.type === "trace") {
          syncStreamingAssistantIntoTask(task);
          if (applyUi) appendTraceEvent(evt);
          return;
        }
        if (teamStreamActive && evt.type === "team_phase") {
          const phase = String(evt.phase || "");
          if (phase === "done") {
            teamPhaseLabel = String(evt.label || "团队响应完成");
            if (evt.plan_status || evt.plan?.status) {
              currentPlanState = {
                status: evt.plan_status || evt.plan?.status || currentPlanState.status,
                tasks: evt.plan?.tasks || currentPlanState.tasks || [],
              };
            }
            if (applyUi) {
              refreshPlanMessageFooter(taskId);
              scheduleChatMessagesRefresh(taskId);
            }
            return;
          }
          teamPhaseLabel = String(evt.label || phase || "团队协作中…");
          if (applyUi) {
            setChatStreamingUi(true);
            refreshPlanMessageFooter(taskId);
          }
          return;
        }
        if (teamStreamActive && evt.type === "worker_start") {
          finalizeTeamStreamSpeaker(task, { refreshUi: applyUi });
          teamActiveWorker = String(
            evt.actor_id || evt.worker || evt.source_member || "",
          ).trim();
          teamPhaseLabel = evt.worker ? `成员 ${evt.worker} 协作中…` : "成员协作中…";
          const workerSender = teamActiveWorker || "成员";
          resetLiveTurnRuntimeForNextSpeaker();
          const streamMsg = ensureTeamStreamAssistant(task, workerSender);
          if (!String(streamMsg.content || "").trim()) {
            ensureStreamingAssistantShell(streamMsg);
          }
          appendTraceEvent({
            step: "info",
            label: evt.worker ? `成员 ${evt.worker} 开始协作` : "成员开始协作",
            detail: "Leader 已派工，等待成员响应…",
          });
          if (applyUi) {
            setChatStreamingUi(true);
            refreshPlanMessageFooter(taskId);
            mountTeamStreamWorkerBubble(taskId, streamMsg);
            patchStreamingAssistantBubble(streamMsg.content);
          }
          return;
        }
        if (teamStreamActive && evt.type === "worker_done") {
          closeDelegateTracesInTeamTurn(task);
          finalizeTeamStreamSpeaker(task, { refreshUi: applyUi });
          teamActiveWorker = "";
          teamPhaseLabel = String(evt.label || "Leader 继续安排…");
          if (applyUi) {
            setChatStreamingUi(true);
            refreshPlanMessageFooter(taskId);
          }
          return;
        }
        if (evt.type === "stream_start") {
          if (!teamStreamActive && assistantMsg) {
            ensureStreamingAssistantShell(assistantMsg);
            assistantMsg.sender = evt.sender || assistantMsg.sender;
            syncStreamingAssistantIntoTask(task);
            if (applyUi) {
              setChatStreamingUi(true);
              if (!document.getElementById("streamingAssistantBubble")) {
                refreshChatMessagesInPlace(taskId);
              } else {
                patchStreamingAssistantBubble(assistantMsg.content);
              }
            }
          }
          return;
        }
        if (evt.type === "text_delta") {
          if (teamStreamActive) {
            const incomingSender = resolveTeamStreamSender(evt);
            if (
              !teamActiveWorker &&
              teamStreamAssistant &&
              normalizeTeamStreamSender(teamStreamAssistant.sender) !== incomingSender
            ) {
              finalizeTeamStreamSpeaker(task, { refreshUi: applyUi });
              resetLiveTurnRuntimeForNextSpeaker();
              if (applyUi) mountTeamStreamWorkerBubble(taskId, ensureTeamStreamAssistant(task, incomingSender));
            }
            const streamMsg = ensureTeamStreamAssistant(task, incomingSender);
            if (streamMsg.streaming) {
              streamMsg.streaming = false;
              const base = stripStreamingPlaceholder(streamMsg.content);
              streamMsg.content = base + (evt.content || "");
            } else {
              streamMsg.content += evt.content || "";
            }
            if (applyUi) {
              patchStreamingAssistantBubble(streamMsg.content);
              scheduleTurnRuntimePanelRefreshThrottled();
              scheduleTaskCheckpointPersist();
            }
            return;
          }
          assistantMsg.sender = evt.sender || assistantMsg.sender;
          if (assistantMsg.streaming) {
            assistantMsg.streaming = false;
            assistantMsg.content =
              stripStreamingPlaceholder(assistantMsg.content) + (evt.content || "");
          } else {
            assistantMsg.content += evt.content || "";
          }
          if (!currentTurnRuntime) currentTurnRuntime = createEmptyTurnRuntime();
          const piece = String(evt.content || "");
          if (piece) {
            const merged = `${currentTurnRuntime.activityText || ""}${piece}`;
            currentTurnRuntime.activityText = merged.slice(-240);
          }
          syncStreamingAssistantIntoTask(task);
          if (applyUi) {
            patchStreamingAssistantBubble(assistantMsg.content);
            scheduleTurnRuntimePanelRefreshThrottled();
            scheduleTaskCheckpointPersist();
          }
          return;
        }
        if (evt.type === "message" && evt.content) {
          if (teamStreamActive) {
            const incomingSender = resolveTeamStreamSender(evt);
            if (
              !teamActiveWorker &&
              teamStreamAssistant &&
              normalizeTeamStreamSender(teamStreamAssistant.sender) !== incomingSender
            ) {
              finalizeTeamStreamSpeaker(task, { refreshUi: applyUi });
            }
          }
          const targetMsg = teamStreamActive
            ? ensureTeamStreamAssistant(
                task,
                teamStreamActive ? resolveTeamStreamSender(evt) : evt.sender || teamStreamAssistant?.sender,
              )
            : assistantMsg;
          targetMsg.sender = evt.sender || targetMsg.sender;
          const part = String(evt.content || "").trim();
          if (part) {
            const cur = String(targetMsg.content || "").trim();
            if (targetMsg.streaming) {
              targetMsg.streaming = false;
              targetMsg.content = part;
            } else if (!cur) {
              targetMsg.content = part;
            } else if (part === cur || cur.endsWith(part)) {
              /* already streamed via text_delta */
            } else if (part.startsWith(cur)) {
              targetMsg.content = part;
            } else {
              targetMsg.content = `${cur}\n\n${part}`;
            }
          }
          if (applyUi) {
            if (teamStreamActive) {
              streamingAssistantMsgRef = targetMsg;
              const needsFullRender = !document.getElementById("streamingAssistantBubble");
              if (needsFullRender) {
                rerenderTaskIfActive(taskId, { refreshSidebar: false });
              } else {
                patchStreamingAssistantBubble(targetMsg.content, { finalize: false });
              }
            } else {
              patchStreamingAssistantBubble(targetMsg.content, { finalize: false });
            }
            if (
              currentSkillWizard?.status === "skill_awaiting_confirm" ||
              currentSkillWizard?.status === "skill_iterating_plan" ||
              currentPlanState.status === "awaiting_confirm"
            ) {
              refreshPlanMessageFooter(taskId);
            }
          }
          return;
        }
        if (evt.type === "choices_pending" && evt.choices) {
          setChatChoicesForTask(taskId, evt.choices);
          if (applyUi) refreshChatChoicesComposer();
          return;
        }
        if (evt.type === "branch_choices_pending" && evt.branch_choices) {
          if (!applyUi) return;
          const w = currentSkillWizard || { kind: "skill_create", status: "skill_branch_dialogue" };
          currentSkillWizard = {
            ...w,
            status: w.status || "skill_branch_dialogue",
            branch_choices: evt.branch_choices,
          };
          wizardSubmitting = false;
          refreshSkillWizardPanelInPlace(taskId);
          return;
        }
        if (evt.type === "wizard_update" && evt.wizard) {
          if (!applyUi) return;
          const w = evt.wizard;
          const questions = w.questions || [];
          const serverAnswers = w.answers || {};
          const prevQuestionCount = (currentSkillWizard?.questions || []).length;
          currentSkillWizard = w;
          if ((questions || []).length > 0) {
            wizardSubmitting = false;
            activeComposerIntent = "normal";
            pendingComposerSkillTag = null;
          }
          if ((questions || []).length > prevQuestionCount) {
            refreshSkillWizardPanelInPlace(taskId);
          }
          if (
            w.status === "skill_branch_dialogue" &&
            w.branch_choices &&
            Array.isArray(w.branch_choices.options) &&
            w.branch_choices.options.length
          ) {
            wizardSubmitting = false;
          }
          if (w.status) {
            currentPlanState = { ...currentPlanState, status: w.status };
          }
          if (w.status === "skill_branch_dialogue") {
            wizardStepIndex = 0;
            if (!isTaskStreaming) {
              wizardSubmitting = false;
            }
            wizardDraftAnswers = {};
            if ((w.questions || []).length > 0) {
              currentSkillWizard = { ...w, questions: [] };
            }
          } else if (w.status !== "skill_clarifying" && w.status !== "skill_branch_dialogue") {
            wizardSubmitting = false;
          } else if (
            !wizardSubmitting &&
            Object.keys(serverAnswers).length === 0 &&
            questions.length > 0 &&
            wizardTouchedIds.size === 0
          ) {
            wizardStepIndex = 0;
            wizardDraftAnswers = defaultWizardAnswers(questions);
          }
          if (!wizardSubmitting) {
            wizardDraftAnswers = {
              ...defaultWizardAnswers(questions),
              ...wizardDraftAnswers,
              ...serverAnswers,
            };
          }
          Object.keys(serverAnswers).forEach((id) => wizardTouchedIds.add(id));
          if (
            (w.status === "skill_clarifying" || w.status === "skill_branch_dialogue") &&
            !wizardSubmitting
          ) {
            syncWizardClarifyProgress();
          }
          refreshSkillWizardPanelInPlace(taskId);
          if (w.status === "skill_awaiting_confirm" || w.status === "skill_iterating_plan") {
            refreshPlanMessageFooter(taskId);
          }
          if (w.status === "skill_done" || w.status === "skill_cancelled") {
            if (w.status === "skill_done") {
              ensureSkillFileArtifact(w.created_skill, {
                op: String(w.mode || "create") === "create" ? "create" : "edit",
              });
              fetchAndSyncInstalledSkills({ allowClearOnEmpty: true }).then((skills) => {
                if (skills && currentView === "skills") {
                  renderSkillsPage();
                }
              });
            }
            scheduleSkillWizardDismiss(taskId);
          }
          return;
        }
        if (evt.type === "plan_update" && evt.plan) {
          const nextPlan = streamTurn?.planSnapshot || {
            status: evt.plan_status || evt.plan.status || currentPlanState.status,
            tasks: evt.plan.tasks || [],
          };
          const nextStatus = nextPlan.status || currentPlanState.status;
          currentPlanState = {
            status: nextStatus,
            tasks: nextPlan.tasks || [],
          };
          if (nextStatus === "team_done") {
            teamPhaseLabel = "";
          }
          if (!applyUi) return;
          refreshPlanMessageFooter(taskId);
          persistAppState();
          return;
        }
        if (evt.type === "error" && evt.content) {
          if (applyUi) {
            appendTraceEvent({ step: "error", label: "错误", detail: evt.content });
          }
          if (assistantMsg) {
            assistantMsg.sender = evt.sender || assistantMsg.sender || "系统";
            assistantMsg.content = assistantMsg.content
              ? `${assistantMsg.content}\n\n${evt.content}`
              : String(evt.content);
            if (applyUi) {
              patchStreamingAssistantBubble(assistantMsg.content, { finalize: false });
            }
          }
          if (evt.fatal && String(currentSkillWizard?.status || "").startsWith("skill_")) {
            currentSkillWizard = null;
            wizardSubmitting = false;
            if (applyUi) refreshSkillWizardPanelInPlace(taskId);
          }
          if (applyUi && streamTurn?.terminal) {
            markTaskStreamUiComplete(taskId);
            flushTurnRuntimePanelRefresh();
            flushChatMessagesRefresh(taskId);
          }
          return;
        }
        if (evt.type === "approval_required") {
          if (!applyUi) return;
          appendTraceEvent({
            step: "approval_required",
            label: "等待审批",
            detail: "写入/执行类工具需要审批，请确认后继续。",
          });
          if (evt.task_id) {
            const allow = window.confirm("检测到高风险工具调用，是否批准本任务继续执行？");
            if (allow) {
              window.AgentDeskAPI.approveChat(evt.task_id, true).catch(() => {});
            }
          }
          return;
        }
        if (evt.type === "queue_update" && evt.queue) {
          renderMessageQueuePanel(evt.queue);
          return;
        }
        if (evt.type === "done" && evt.messages) {
          if (teamStreamActive) {
            syncTeamDoneMessages(task, evt.messages);
            const lastAssistant = [...(task.messages || [])]
              .reverse()
              .find((m) => m.role === "assistant");
            if (lastAssistant && currentTurnRuntime) {
              const turnIdx = task.messages.lastIndexOf(lastAssistant);
              finalizeTurnRuntimeOnMessage(
                lastAssistant,
                turnIdx >= 0 ? turnIdx : task.messages.length - 1,
              );
            }
          } else {
            syncTaskMessages(task, evt.messages);
            coalesceTaskAssistantTail(task);
          }
          if (!applyUi) return;
          if (evt.plan_status) {
            currentPlanState = {
              status: evt.plan_status,
              tasks: currentPlanState.tasks || [],
            };
          }
          const last = task.messages[task.messages.length - 1];
          if (last?.role === "assistant") {
            if (currentTurnRuntime) {
              currentTurnRuntime.stats = currentTaskStats ? { ...currentTaskStats } : null;
            }
            patchStreamingAssistantBubble(last.content, { finalize: true });
            const turnIdx = task.messages.lastIndexOf(last);
            finalizeTurnRuntimeOnMessage(last, turnIdx >= 0 ? turnIdx : task.messages.length - 1);
          }
          markTaskStreamUiComplete(taskId);
          flushTurnRuntimePanelRefresh();
          flushChatMessagesRefresh(taskId);
          restoreChatChoicesForTask(taskId);
          refreshChatChoicesComposer();
          void refreshTaskPlan(taskId)
            .then(() => {
              if (!shouldApplyStreamUi(taskId)) return;
              wizardSubmitting = false;
              refreshSkillWizardPanelInPlace(taskId);
              refreshChatMessagesInPlace(taskId);
              restoreChatChoicesForTask(taskId);
              refreshChatChoicesComposer();
            })
            .catch(() => {
              refreshChatMessagesInPlace(taskId);
              restoreChatChoicesForTask(taskId);
              refreshChatChoicesComposer();
            });
        }
      };

      const extractOriginalUserTaskFromMessage = (text) => {
        const raw = String(text || "").trim();
        if (!raw) return "";
        const marker = "the user's task:";
        const markerIdx = raw.indexOf(marker);
        if (markerIdx >= 0) {
          let rest = raw.slice(markerIdx + marker.length).trimStart();
          const bodySplit = rest.indexOf("\n\n");
          if (bodySplit >= 0) rest = rest.slice(0, bodySplit).trim();
          if (rest) return rest;
        }
        return raw;
      };

      const isSkillCreateMessage = (text) => {
        const original = extractOriginalUserTaskFromMessage(text);
        const t = String(original || "").trim();
        if (!t) return false;
        const firstLine = t.split(/\n/)[0]?.trim() ?? t;
        if (
          /^(把|将)?(上述|以上|这些|上面|这个)/.test(firstLine) &&
          /总结|概括|汇总|整理|归纳|描述|说明/.test(firstLine)
        ) {
          return false;
        }
        if (/^(总结|概括|汇总|整理|归纳|描述|说明)/.test(firstLine)) {
          return false;
        }
        if (/总结|概括|汇总|整理|归纳|描述成|说明成|改成|修改|优化|润色/.test(t.slice(0, 60))) {
          return false;
        }
        if (/请帮我创建一个可以实现「/.test(t) && /」的\s*skill/i.test(t)) {
          return true;
        }
        const probe = t.length <= 120 ? t : firstLine;
        if (/请(帮我|为我)?(创建|新建|写一个|做一个|生成).{0,60}(skill|技能)/i.test(probe)) {
          return true;
        }
        if (/\/make-skill\b/i.test(probe)) return true;
        return /^create\s+(a\s+)?skill\b/i.test(probe);
      };

      const isCasualChatMessage = (text) => {
        const t = String(text || "").trim();
        if (!t || t.length > 80 || isSkillCreateMessage(t)) return false;
        return /^(你好|您好|hi|hello|hey|在吗|在不在|谢谢|感谢|好的|嗯|哦|啊|哈哈|呵呵|你是谁|你能做什么)[\s!！?？。．.…,，~～]*$/i.test(
          t,
        );
      };

      const getLastUserMessage = (task) => {
        const msgs = task?.messages || [];
        for (let i = msgs.length - 1; i >= 0; i -= 1) {
          if (msgs[i]?.role === "user") return msgs[i];
        }
        return null;
      };

      const getOrphanedSkillWizardPrompt = (taskId, remote = null) => {
        const task = getTaskById(taskId);
        if (!task) return null;
        const lastUser = getLastUserMessage(task);
        const userText = extractOriginalUserTaskFromMessage(lastUser?.content || "");
        if (!userText || !isSkillCreateMessage(userText)) return null;
        const remoteMsgs = remote?.messages || [];
        if (remoteMsgs.some((m) => m.role === "assistant" && String(m.content || "").trim())) {
          return null;
        }
        if ((currentSkillWizard?.questions || []).length > 0) return null;
        const wizStatus = currentSkillWizard?.status;
        if (wizStatus === "skill_done" || wizStatus === "skill_cancelled") return null;
        if (wizStatus && !["skill_clarifying", "idle"].includes(wizStatus)) return null;
        return userText;
      };

      const retryOrphanedSkillWizardStream = async (taskId, remote = null, { force = false } = {}) => {
        if (!taskId || isTaskStreamingNow(taskId) || streamRequestLock || skillWizardRetryInflight.has(taskId)) {
          return false;
        }
        const userText = getOrphanedSkillWizardPrompt(taskId, remote);
        if (!userText) return false;
        if (!force && skillWizardAutoRetried.has(taskId)) return false;
        skillWizardRetryInflight.add(taskId);
        if (!force) skillWizardAutoRetried.add(taskId);
        activeComposerIntent = "skill_create";
        currentSkillWizard = {
          kind: "skill_create",
          status: "skill_clarifying",
          questions: [],
          answers: {},
        };
        wizardSubmitting = false;
        if (shouldApplyStreamUi(taskId)) {
          refreshSkillWizardPanelInPlace(taskId);
        }
        try {
          await runSkillWizardStream(taskId, "start", {}, userText, { skipLock: true });
          return true;
        } catch (_) {
          return false;
        } finally {
          skillWizardRetryInflight.delete(taskId);
        }
      };

      const executeTaskFlow = async (taskId, userText, options = {}, legacyTask = null) => {
        let task = getLiveTask(taskId, legacyTask);
        if (!task || !taskId) return;
        if (isTaskStreamingNow(taskId) && !options.skipQueueWhileRunning) {
          await enqueueMessageWhileRunning(taskId, userText, options);
          return;
        }
        prepareTaskStreamForUserSend(taskId);
        streamRequestLock = true;
        try {
        if (!options.choiceAnswer) {
          clearChatChoices();
          refreshChatChoicesComposer();
        }
        task = getLiveTask(taskId, task);
        if (!task) return;
        const assignee = normalizeAssignee(selectedAssignee);
        const useTeam = assignee.type === "team";
        const forcePlan = Boolean(options.forcePlan);
        const usePlan =
          (forcePlan || planModeEnabled || currentPlanState.status === "executing") && !useTeam;
        const casualChat = isCasualChatMessage(userText);
        const skillCreateIntent = !casualChat && isSkillCreateMessage(userText);
        if (casualChat) {
          activeComposerIntent = "normal";
        }
        const planStatus = currentPlanState.status || "";
        const inBranchDialogue =
          !casualChat &&
          currentSkillWizard?.status === "skill_branch_dialogue" &&
          !useTeam;
        const inClarifyingWizard =
          !casualChat &&
          currentSkillWizard?.status === "skill_clarifying" &&
          (currentSkillWizard?.questions || []).length > 0 &&
          !useTeam;
        if (inBranchDialogue && !useTeam && !skillCreateIntent) {
          task = getLiveTask(taskId, task);
          if (!task) return;
          task.messages.push({ role: "user", content: userText, sender: "你" });
          clearSkillWizardDismissTimer();
          if (currentSkillWizard) {
            currentSkillWizard = { ...currentSkillWizard, branch_choices: null };
          }
          rerenderTaskIfActive(taskId);
          await runSkillWizardStream(taskId, "dialogue", {}, userText, { skipLock: true });
          return;
        }
        if (inClarifyingWizard && !skillCreateIntent) {
          task = getLiveTask(taskId, task);
          if (!task) return;
          task.messages.push({ role: "user", content: userText, sender: "你" });
          rerenderTaskIfActive(taskId);
          await runSkillWizardStream(taskId, "dialogue", {}, userText, { skipLock: true });
          return;
        }
        if (skillCreateIntent && !useTeam) {
          activeComposerIntent = "normal";
          task = getLiveTask(taskId, task);
          if (!task) return;
          const lastLocal = task.messages[task.messages.length - 1];
          const alreadyQueued =
            lastLocal?.role === "user" && String(lastLocal.content || "").trim() === userText.trim();
          if (!alreadyQueued) {
            task.messages.push({ role: "user", content: userText, sender: "你" });
          }
          clearSkillWizardDismissTimer();
          currentSkillWizard = {
            kind: "skill_create",
            status: "skill_clarifying",
            questions: [],
            answers: {},
          };
          wizardDraftAnswers = {};
          wizardTouchedIds = new Set();
          wizardStepIndex = 0;
          wizardSubmitting = false;
          rerenderTaskIfActive(taskId);
          await runSkillWizardStream(taskId, "start", {}, userText, { skipLock: true });
          return;
        }
        if (
          !skillCreateIntent &&
          !inBranchDialogue &&
          !inClarifyingWizard &&
          currentSkillWizard &&
          String(currentSkillWizard.status || "").startsWith("skill_")
        ) {
          currentSkillWizard = null;
          wizardSubmitting = false;
          wizardDraftAnswers = {};
          wizardTouchedIds = new Set();
          wizardStepIndex = 0;
        }
        isTaskStreaming = true;
        streamingTaskId = taskId;
        chatStickToBottom = true;
        chatUserDetached = false;
        setChatStreamingUi(true);
        resetStreamTrace();
        setPendingUserMessage(taskId, userText);
        const payload = buildChatPayloadForSend(taskId, userText, {
          forcePlan,
          choiceAnswer: options.choiceAnswer,
        });
        if (skillCreateIntent) {
          payload.intent = "skill_create";
        }

        if (usePlan && currentPlanState.status === "idle") {
          currentPlanState = { ...currentPlanState, status: "planning" };
        }

        task = getLiveTask(taskId, task);
        if (!task) return;
        task.messages.push({ role: "user", content: userText, sender: "你" });
        const assistantMsg = {
          role: "assistant",
          sender:
            assignee.type === "employee"
              ? assignee.name
              : useTeam
                ? "团队"
                : "AgentDesk企伴",
          content: "",
        };
        if (!useTeam) {
          ensureStreamingAssistantShell(assistantMsg);
          task.messages.push(assistantMsg);
          streamingAssistantMsgRef = assistantMsg;
        } else {
          teamStreamActive = true;
          teamStreamAssistant = null;
          teamActiveWorker = "";
          teamPhaseLabel = "Leader 判断中…";
          setChatStreamingUi(true);
        }
        persistAppState();
        rerenderTaskIfActive(taskId, { refreshSidebar: true, forceFullRender: true });
        if (usePlan || useTeam) refreshPlanMessageFooter(taskId);

        try {
          await window.AgentDeskAPI.chatStream(
            payload,
            (evt) => {
              if (streamRequestLock) streamRequestLock = false;
              handleChatStreamEvent(evt, taskId, assistantMsg);
            },
            {
              timeoutMs: 600000,
              idleTimeoutMs: 300000,
              onController: (ctrl) => {
                taskStreamControllers.set(taskId, ctrl);
              },
            },
          );
          if (!useTeam && task.messages.length === 0) {
            await loadTaskMessagesFromServer(taskId);
          }
          await refreshTaskMetaFromServer(taskId);
        } catch (error) {
          if (!streamAbortRequested && !isBenignStreamAbort(error)) {
            task = getLiveTask(taskId, task);
            if (task && !useTeam && isStreamingPlaceholderOnly(assistantMsg.content)) {
              const idx = task.messages.lastIndexOf(assistantMsg);
              if (idx >= 0) task.messages.splice(idx, 1);
              if (streamingAssistantMsgRef === assistantMsg) clearStreamingAssistantRef();
            }
            if (task) {
              task.messages.push({
                role: "system",
                sender: "系统",
                content: error instanceof Error ? error.message : "调用失败",
              });
            }
            appendTraceEvent({
              step: "error",
              label: "请求失败",
              detail: error instanceof Error ? error.message : "调用失败",
            });
            rerenderTaskIfActive(taskId);
          }
        } finally {
          streamAbortRequested = false;
          isTaskStreaming = false;
          streamingTaskId = null;
          teamStreamActive = false;
          teamStreamAssistant = null;
          teamActiveWorker = "";
          setChatStreamingUi(false);
          cancelStreamBubblePaint();
          flushTurnRuntimePanelRefresh();
          flushChatMessagesRefresh(taskId);
          taskStreamControllers.delete(taskId);
          flushTaskCheckpointPersist();
          task = getLiveTask(taskId, task);
          const streamMsg = streamingAssistantMsgRef;
          if (streamMsg) {
            streamMsg.streaming = false;
            if (isStreamingPlaceholderOnly(streamMsg.content)) {
              streamMsg.content = "";
            }
          }
          if (task) {
            pruneEmptyAssistantMessages(task);
            if (!useTeam) coalesceTaskAssistantTail(task);
          }
          const lastAssistant =
            task &&
            streamMsg &&
            streamMsg.role === "assistant"
              ? streamMsg
              : task
                ? [...task.messages].reverse().find((m) => m.role === "assistant")
                : null;
          if (lastAssistant?.content) {
            patchStreamingAssistantBubble(lastAssistant.content, { finalize: true });
          }
          if (lastAssistant && task) {
            if (currentTurnRuntime) {
              currentTurnRuntime.stats = currentTaskStats ? { ...currentTaskStats } : null;
            }
            const turnIdx = task.messages.lastIndexOf(lastAssistant);
            finalizeTurnRuntimeOnMessage(
              lastAssistant,
              turnIdx >= 0 ? turnIdx : task.messages.length - 1,
            );
          }
          clearStreamingAssistantRef();
          flushPersistAppState();
          restoreChatChoicesForTask(taskId);
          refreshChatChoicesComposer();
          rerenderTaskIfActive(taskId, { refreshSidebar: true, forceFullRender: true });
        }
        } finally {
          streamRequestLock = false;
        }
      };

      const bindPlanPanelActions = (taskId) => {
        mainPanel.querySelectorAll("[data-plan-action]").forEach((btn) => {
          if (btn.dataset.planBound === "1") return;
          btn.dataset.planBound = "1";
          btn.addEventListener("click", async () => {
            const action = btn.getAttribute("data-plan-action");
            try {
              const plan = await window.AgentDeskAPI.confirmTaskPlan(taskId, action);
              currentPlanState = { status: plan.status, tasks: plan.tasks || [] };
              refreshPlanMessageFooter(taskId);
              persistAppState();
              if (action === "confirm") {
                const task = getTaskById(taskId);
                if (task) {
                  await executeTaskFlow(taskId, "请按已确认的计划开始执行。", {
                    forcePlan: true,
                  });
                }
              } else if (activeTaskId === taskId) {
                rerenderTaskIfActive(taskId);
              }
            } catch (err) {
              window.alert(err instanceof Error ? err.message : "操作失败");
            }
          });
        });
      };

      const buildTaskConversationMessagesHtml = (task) => {
        syncStreamingAssistantIntoTask(task);
        const renderMessages = getRenderableTaskMessages(task);
        const showEmptyChatHint =
          renderMessages.length === 0 &&
          !isTaskStreamingNow(task.id) &&
          (currentPlanState.status || "idle") === "idle";
        if (showEmptyChatHint) {
          return '<div class="rounded-xl border border-dashed border-gray-300 bg-white/90 px-4 py-6 text-center text-[13px] text-gray-500">暂无消息，请在下方输入框发送第一条消息</div>';
        }
        const planAnchorIdx = findPlanAnchorMessageIndex(renderMessages);
        const planFooterHtml = renderPlanMessageFooterHtml();
        const streamingAssistantIdx =
          isTaskStreamingNow(task.id) && (streamingAssistantMsgRef || teamStreamAssistant)
            ? renderMessages.reduce((last, msg, idx) => {
                if (msg.role !== "assistant" || msg.synthetic) return last;
                if (streamingAssistantMsgRef === msg || teamStreamAssistant === msg) return idx;
                return last;
              }, -1)
            : -1;
        return renderMessages
          .map((message, idx) => {
            const isUser = message.role === "user";
            const isStreamingBubble =
              isTaskStreamingNow(task.id) &&
              !isUser &&
              message.role === "assistant" &&
              !message.synthetic &&
              (streamingAssistantMsgRef === message ||
                teamStreamAssistant === message ||
                idx === streamingAssistantIdx);
            const isPlanAnchor = idx === planAnchorIdx && planFooterHtml;
            const md = window.AgentDeskMarkdown;
            const useMarkdown =
              md && md.bubbleClassForMessage(message) === "wm-markdown" && !isStreamingBubble;
            const bubbleClass = [
              useMarkdown
                ? "block w-full max-w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 text-[13px] text-gray-700"
                : isUser
                  ? "inline-block max-w-[75%] rounded-2xl border border-emerald-100 bg-emerald-50 px-4 py-3 text-[13px] text-gray-800"
                  : "inline-block max-w-[75%] rounded-2xl border border-gray-200 bg-white px-4 py-3 text-[13px] text-gray-700",
              isStreamingBubble || !md
                ? "whitespace-pre-wrap"
                : md.bubbleClassForMessage(message),
              isStreamingBubble ? "min-h-[2.5rem]" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const bubbleId = isStreamingBubble ? ' id="streamingAssistantBubble"' : "";
            const bubbleContent = isUser
              ? extractOriginalUserTaskFromMessage(message.content)
              : isStreamingBubble && isStreamingPlaceholderOnly(message.content)
                ? STREAMING_PLACEHOLDER
                : message.content;
            const bubbleBody =
              isStreamingBubble || !md
                ? escapeHtml(bubbleContent)
                : md.renderMessageBubbleHtml(message);
            const bubbleHtml = `<div${bubbleId} class="${bubbleClass}">${bubbleBody}</div>`;
            const anchored = isPlanAnchor
              ? `<div class="plan-message-anchor" data-plan-anchor-root="1">${bubbleHtml}${planFooterHtml}</div>`
              : bubbleHtml;
            const turnAttr = !isUser ? ` data-assistant-turn="${idx}"` : "";
            const runtimeSource =
              isStreamingBubble && currentTurnRuntime ? currentTurnRuntime : message.runtime;
            const runtimeHtml =
              !isUser && message.role === "assistant" && runtimeSource
                ? renderTurnRuntimeHtml(runtimeSource, {
                    phase: isStreamingBubble ? "streaming" : "complete",
                    turnKey: isStreamingBubble ? "live" : String(idx),
                  })
                : "";
            const artifactsHtml =
              !isUser &&
              !isStreamingBubble &&
              message.role === "assistant" &&
              message.artifacts?.length
                ? renderTurnArtifactsHtml(message.artifacts, { turnKey: idx })
                : "";
            return `
            <div class="${isUser ? "text-right" : ""}"${turnAttr}>
              ${renderMessageLabelHtml(message)}
              ${runtimeHtml}
              ${anchored}
              ${artifactsHtml}
            </div>
          `;
          })
          .join("");
      };

      const refreshChatMessagesInPlace = (taskId) => {
        const task = getTaskById(taskId);
        if (!task || activeTaskId !== taskId || currentView !== "task-conversation") return;
        const scrollContainer = document.getElementById("chatScrollContainer");
        const root = document.getElementById("chatMessagesRoot");
        if (!scrollContainer || !root) {
          renderTaskConversation(taskId, { skipServerSync: true, forceFullRender: true });
          return;
        }
        const preserveScroll = chatUserDetached || !chatStickToBottom;
        const savedScrollTop = preserveScroll ? scrollContainer.scrollTop : 0;
        const savedScrollHeight = preserveScroll ? scrollContainer.scrollHeight : 0;
        root.innerHTML = buildTaskConversationMessagesHtml(task);
        bindArtifactChips(mainPanel, taskId);
        ensureTurnRuntimeToggle();
        traceScrollListenerBound = false;
        ensureTraceScrollBehavior();
        if (isTaskStreaming && streamBubblePendingText) {
          paintStreamingAssistantBubble(streamBubblePendingText, { finalize: false });
        } else if (streamingAssistantMsgRef?.content) {
          paintStreamingAssistantBubble(streamingAssistantMsgRef.content, { finalize: false });
        }
        scrollLiveTraceStreamToBottom();
        requestAnimationFrame(() => {
          if (preserveScroll) {
            const delta = scrollContainer.scrollHeight - savedScrollHeight;
            scrollContainer.scrollTop = Math.max(0, savedScrollTop + delta);
            return;
          }
          scrollChatToBottom({ force: isTaskStreaming && !chatUserDetached });
        });
      };

      const renderTaskConversation = (taskId, options = {}) => {
        const skipServerSync = Boolean(options.skipServerSync);
        const task = getTaskById(taskId);
        if (!task) {
          if (tasksData.length) {
            renderTaskConversation(tasksData[0].id, options);
          }
          return;
        }
        const switchingTask = activeTaskId !== taskId;
        if (switchingTask) {
          taskConversationHydrateSeq += 1;
          if (streamingTaskId && streamingTaskId !== taskId) {
            cancelStreamBubblePaint();
            setChatStreamingUi(false);
          }
          currentPlanState = { status: "idle", tasks: [] };
          currentSkillWizard = null;
          activeComposerIntent = "normal";
          pendingComposerSkillTag = null;
          wizardDraftAnswers = {};
          wizardTouchedIds = new Set();
          wizardStepIndex = 0;
          wizardSubmitting = false;
          clearChatChoices();
        }
        const prevScrollContainer = document.getElementById("chatScrollContainer");
        const preserveScroll =
          isTaskStreamingNow(taskId) &&
          activeTaskId === taskId &&
          prevScrollContainer &&
          (chatUserDetached || !chatStickToBottom);
        const savedScrollTop = preserveScroll ? prevScrollContainer.scrollTop : 0;
        const savedScrollHeight = preserveScroll ? prevScrollContainer.scrollHeight : 0;
        currentView = "task-conversation";
        activeTaskId = taskId;
        syncTaskRouteToUrl(taskId);
        persistAppState();
        setActiveNav("");
        chatScrollListenerBound = false;

        mainPanel.innerHTML = `
          <div id="taskConversationLayout" class="flex h-full min-h-0 bg-[#f8faf9]">
          <div class="flex min-h-0 min-w-0 flex-1 flex-col">
            <div class="shrink-0 border-b border-gray-200/80 bg-white/95 px-6 py-4 backdrop-blur-sm">
              <div class="mx-auto max-w-[860px]">
                <div class="text-[18px] font-semibold text-gray-900">${escapeHtml(task.title)}</div>
                <div class="mt-1 text-[12px] text-gray-500">任务会话</div>
              </div>
            </div>

            <div id="chatScrollContainer" class="min-h-0 flex-1 overflow-auto px-6 py-4">
              <div id="chatMessagesRoot" class="mx-auto max-w-[860px] space-y-3">
                ${buildTaskConversationMessagesHtml(task)}
              </div>
            </div>

            <div id="chatComposerFooter" class="shrink-0 border-t border-gray-200/80 bg-white/95 px-6 py-4 shadow-[0_-8px_24px_rgba(15,23,42,0.04)] backdrop-blur-sm">
              <div class="mx-auto max-w-[860px]">
                ${
                  pendingComposerSkillTag
                    ? `<div class="mb-2 inline-flex items-center gap-1.5 rounded-lg border border-emerald-100 bg-emerald-50 px-2.5 py-1 text-[12px] font-medium text-emerald-700">
                        <svg viewBox="0 0 20 20" fill="none" class="h-3.5 w-3.5" aria-hidden="true"><path d="M7.5 3.5l-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                        <span>${escapeHtml(pendingComposerSkillTag)}</span>
                      </div>`
                    : ""
                }
                <div id="chatChoicesComposerWrap" class="mb-3">${renderChatChoicesComposerHtml()}</div>

        const [hh, mm] = String(timeStr || "09:00").split(":");
        return `${Number(mm) || 0} ${Number(hh) || 9} * * *`;
      };

      const intervalCronFromHours = (hours) => {
        const n = Math.min(24, Math.max(1, Number(hours) || 1));
        return `0 */${n} * * *`;
      };

      const intervalCronFromMinutes = (minutes) => {
        const allowed = [5, 10, 15, 30, 60];
        const n = allowed.includes(Number(minutes)) ? Number(minutes) : 30;
        if (n === 60) return "0 * * * *";
        return `*/${n} * * * *`;
      };

      const onceCronFromDatetime = (value) => {
        const d = value ? new Date(value) : new Date(Date.now() + 3600000);
        if (Number.isNaN(d.getTime())) return dailyCronFromTime("09:00");
        return `${d.getMinutes()} ${d.getHours()} ${d.getDate()} ${d.getMonth() + 1} *`;
      };

      const periodicCronFromModal = (timeStr, unit) => {
        const [hh, mm] = String(timeStr || "09:00").split(":");
        const m = Number(mm) || 0;
        const h = Number(hh) || 9;
        if (unit === "weekdays") return `${m} ${h} * * 1-5`;
        if (unit === "weekly-mon") return `${m} ${h} * * 1`;
        return `${m} ${h} * * *`;
      };

          const unit =
            els.intervalUnit instanceof HTMLSelectElement ? els.intervalUnit.value : "hours";
          const amount =
            els.intervalAmount instanceof HTMLInputElement ? els.intervalAmount.value : "1";
          const cron =
            unit === "minutes"
              ? intervalCronFromMinutes(amount)
              : intervalCronFromHours(amount);
          return {
            type: "cron",
            cron,
            timezone,
            mode: "interval",
            interval_unit: unit,
            interval_amount: Number(amount) || 1,
          };
        }
        if (mode === "once") {
          const dt =
            els.onceDatetime instanceof HTMLInputElement ? els.onceDatetime.value : "";
          if (dt) {
            const parsed = new Date(dt);
            if (!Number.isNaN(parsed.getTime())) {

                    <input id="automationDateStart" type="date" class="h-10 flex-1 min-w-[8rem] rounded-lg border border-gray-200 px-3 text-[13px] text-gray-700 placeholder:text-gray-400 focus:outline-none" placeholder="开始日期" />
