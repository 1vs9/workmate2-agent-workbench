            : "";
        const actionHtml = `<li class="wm-process-step">
          <div class="wm-process-step-row">
            <span class="wm-process-icon is-tool">${traceProcessIconSvg(iconKind)}</span>
            <div class="wm-process-body">
              <div class="wm-process-title">
                <span class="wm-process-time">[${escapeHtml(step.time)}]</span>
                ${toolBadge}
                ${escapeHtml(title)}
              </div>
              ${showDesc ? `<div class="wm-process-desc">${escapeHtml(desc)}</div>` : ""}
              ${command ? renderProcessCommandHtml(command) : ""}
              ${rawInput
                ? `<div class="wm-process-desc font-mono text-[10px] text-gray-600 whitespace-pre-wrap break-words">${escapeHtml(
                    rawInput,
                  )}</div>`
                : !command && !step.input && !step.pending
                  ? '<div class="wm-process-desc text-[10px] text-gray-400">（参数未记录）</div>'
                  : ""}
            </div>
            <span class="wm-process-status ${statusCls}">${escapeHtml(statusText)}</span>
          </div>
        </li>`;
        return output ? `${actionHtml}${renderProcessOutputCardHtml(step, output)}` : actionHtml;
      };

      const renderLiveTraceItemsHtml = (traces, runtime) => {
        const traceList = traces || [];
        const hasOpenThinking =
          traceList.some((e) => e.step === "thinking_start") &&
          !traceList.some((e) => e.step === "thinking_end");
        const steps = buildProcessStepsFromTraces(
          traceList,
          buildProcessStepOptions(runtime, {
            thinkingPending: Boolean(
              isTaskStreaming && (runtime?.thinking || hasOpenThinking),
            ),
          }),
        );
        if (!steps.length) {
          return '<li class="text-[10px] text-gray-400">等待模型或工具事件…</li>';
        }
        const visible =
          steps.length > LIVE_TRACE_RENDER_CAP
            ? steps.slice(-LIVE_TRACE_RENDER_CAP)
            : steps;
        const omitted = steps.length - visible.length;
        const prefix =
          omitted > 0
            ? `<li class="text-[10px] text-gray-400">… 已折叠较早 ${omitted} 步</li>`
            : "";
        return prefix + visible.map((s) => renderProcessStepHtml(s)).join("");
      };

      const renderTurnRuntimeDetailHtml = (runtime) => {
        const traces = runtime?.traces || [];
        const stepOptions = {
          thinkingText: runtime?.thinking,
          thinkingPending: false,
        };
        return `
          ${renderRuntimeStatsHeaderHtml(runtime)}
          <div class="wm-runtime-section-title mt-3">过程明细</div>
          <ul class="wm-runtime-trace-stream mt-1 space-y-1 text-[11px] text-gray-600">
            ${
              traces.length || runtime?.thinking
                ? buildProcessStepsFromTraces(traces, stepOptions)
                    .slice(-80)
                    .map((step) => renderProcessStepHtml(step))
                    .join("") ||
                  '<li class="text-[10px] text-gray-400">暂无运行过程记录</li>'
                : '<li class="text-[10px] text-gray-400">暂无运行过程记录</li>'
            }
          </ul>
        `;
      };

      const renderTurnRuntimeHtml = (runtime, options = {}) => {
        if (!runtime) return "";
        const thinking = String(runtime.thinking || "").trim();
        const toolCalls = runtime.toolCallCount || 0;
        const processMsgs = runtime.processMsgCount || countProcessTraceEvents(runtime.traces, runtime);
        const hasTrace =
          toolCalls > 0 ||
          processMsgs > 0 ||
          (runtime.traces || []).length > 0 ||
          Boolean(String(runtime.thinking || "").trim());
        const phase = options.phase || (options.live ? "streaming" : "complete");
        const isStreamingPhase = phase === "streaming";
        if (!isStreamingPhase && !thinking && !hasTrace) return "";
        const showThinking = isStreamingPhase && thinking;
        const showLiveProcess = isStreamingPhase;
        const showSummary = !isStreamingPhase && hasTrace;
        const turnKey = options.turnKey ?? "live";
        const uiState = runtimeUiState.get(turnKey) || { detailOpen: false, thinkOpen: false };
        const detailOpen = isStreamingPhase ? turnRuntimeDetailOpen : uiState.detailOpen;
        const thinkOpen = isStreamingPhase ? thinkingPanelOpen : uiState.thinkOpen;
        const rootId = isStreamingPhase ? ' id="turnRuntimeLive"' : "";
        const detailId = `turn-runtime-detail-${turnKey}`;
        const thinkId = `turn-runtime-thinking-${turnKey}`;
        const traceCount = countProcessTraceEvents(runtime.traces, runtime);

        const thinkingBlock = showThinking
          ? `
            <div class="mb-2">
              <button type="button" class="wm-thinking-toggle" data-turn-toggle="thinking" data-turn-key="${turnKey}">
                <span class="wm-thinking-chevron ${thinkOpen ? "is-open" : ""}">›</span>
                <span class="font-medium text-gray-600">深度思考</span>
              </button>
              <div id="${thinkId}" class="wm-thinking-body ${thinkOpen ? "" : "hidden"}">${escapeHtml(thinking)}</div>
            </div>`
          : "";

        const liveProcessBlock = showLiveProcess
          ? `
            <button type="button" class="wm-runtime-summary is-streaming" data-turn-toggle="detail" data-turn-key="${turnKey}">
              <span class="wm-runtime-chevron ${detailOpen ? "is-open" : ""}">›</span>
              <span data-runtime-live-meta>AgentDesk 运行中 · 工具 ${toolCalls} · 过程 ${traceCount} 步</span>
            </button>
            <div id="${detailId}" class="wm-runtime-detail ${detailOpen ? "" : "hidden"}">
              <div class="wm-runtime-live-panel is-streaming">
                ${renderRuntimeStatsHeaderHtml(runtime)}
                <div class="wm-runtime-section-title mt-3">过程明细</div>
                <ul class="wm-runtime-trace-stream mt-1 space-y-1 text-[11px] text-gray-600">
                  ${renderLiveTraceItemsHtml(runtime.traces, runtime)}
                </ul>
              </div>
            </div>`
          : "";

        const summaryBlock = showSummary
          ? `
            <button type="button" class="wm-runtime-summary is-complete" data-turn-toggle="detail" data-turn-key="${turnKey}">
              <span class="wm-runtime-chevron ${detailOpen ? "is-open" : ""}">›</span>
              <span>工具调用 ${toolCalls}，过程步骤 ${processMsgs}</span>
            </button>
            <div id="${detailId}" class="wm-runtime-detail ${detailOpen ? "" : "hidden"}">
              ${
                thinking
                  ? `<div class="mb-3 border-b border-gray-200 pb-3">
                      <button type="button" class="wm-thinking-toggle" data-turn-toggle="thinking" data-turn-key="${turnKey}">
                        <span class="wm-thinking-chevron ${thinkOpen ? "is-open" : ""}">›</span>
                        <span class="font-medium text-gray-600">深度思考</span>
                      </button>
                      <div id="${thinkId}" class="wm-thinking-body ${thinkOpen ? "" : "hidden"}">${escapeHtml(thinking)}</div>
                    </div>`
                  : ""
              }
              ${renderTurnRuntimeDetailHtml(runtime)}
            </div>`
          : "";

        return `<div class="wm-turn-runtime mb-2 w-full"${rootId}>${thinkingBlock}${liveProcessBlock}${summaryBlock}</div>`;
      };

      const scrollLiveTraceStreamToBottom = () => {
        const traceScrollEl = getLiveTraceScrollContainer();
        const followStream = isTaskStreaming && !chatUserDetached;
        if (traceScrollEl && (traceStickToBottom || followStream)) {
          traceScrollProgrammatic = true;
          const applyTraceScroll = () => {
            traceScrollEl.scrollTop = traceScrollEl.scrollHeight;
          };
          applyTraceScroll();
          requestAnimationFrame(() => {
            applyTraceScroll();
            requestAnimationFrame(() => {
              applyTraceScroll();
              traceScrollProgrammatic = false;
              if (followStream) {
                traceStickToBottom = true;
              }
            });
          });
        }
        scrollChatToBottom({ force: followStream });
      };

      const syncTurnRuntimeOpenStateDom = (turnKey, options = {}) => {
        const key = turnKey == null ? "live" : String(turnKey);
        const detailOpen =
          options.detailOpen ??
          (key === "live"
            ? turnRuntimeDetailOpen
            : (runtimeUiState.get(key) || {}).detailOpen);
        const thinkOpen =
          options.thinkOpen ??
          (key === "live"
            ? thinkingPanelOpen
            : (runtimeUiState.get(key) || {}).thinkOpen);
        const detailEl = document.getElementById(`turn-runtime-detail-${key}`);
        const thinkEl = document.getElementById(`turn-runtime-thinking-${key}`);
        if (detailEl) detailEl.classList.toggle("hidden", !detailOpen);
        if (thinkEl) thinkEl.classList.toggle("hidden", !thinkOpen);
        const scope =
          key === "live"
            ? document.getElementById("turnRuntimeLive")
            : document.querySelector(`[data-assistant-turn="${key}"]`);
        scope?.querySelectorAll("[data-turn-toggle]").forEach((btn) => {
          const kind = btn.getAttribute("data-turn-toggle");
          const chevron = btn.querySelector(".wm-runtime-chevron, .wm-thinking-chevron");
          if (!chevron) return;
          if (kind === "detail") chevron.classList.toggle("is-open", Boolean(detailOpen));
          if (kind === "thinking") chevron.classList.toggle("is-open", Boolean(thinkOpen));
        });
      };

      const markTaskStreamUiComplete = (taskId) => {
        if (taskId && streamingTaskId && streamingTaskId !== taskId) return;
        isTaskStreaming = false;
        streamingTaskId = null;
        teamStreamActive = false;
        teamStreamAssistant = null;
        teamActiveWorker = "";
        teamPhaseLabel = "";
        streamRequestLock = false;
        clearStreamingAssistantRef();
        setChatStreamingUi(false);
        cancelStreamBubblePaint();
        if (teamStreamReducerState && streamTurnReducer?.createTeamStreamState) {
          Object.assign(teamStreamReducerState, streamTurnReducer.createTeamStreamState());
        }
        flushPersistAppState();
      };

      const closeDelegateTracesInRuntime = (runtime) => {
        if (!runtime?.traces?.length) return false;
        const steps = buildProcessStepsFromTraces(runtime.traces);
        const openDelegate = [...steps]
          .reverse()
          .find(
            (s) => s.type === "tool" && s.pending && isDelegateTeamWorkerTool(s.toolName),
          );
        if (!openDelegate) return false;
        runtime.traces.push({
          step: "tool_result_end",
          tool_name: openDelegate.toolName || "delegate_team_worker",
          tool_call_id: openDelegate.id || undefined,
          label: "成员协作完成",
          detail: "",
          state: "success",
          created_at: new Date().toISOString(),
        });
        runtime.toolCallCount = countToolStepsFromTraces(runtime.traces);
        runtime.processMsgCount = countProcessTraceEvents(runtime.traces, runtime);
        return true;
      };

      const closeDelegateTracesInTeamTurn = (task) => {
        let changed = false;
        if (currentTurnRuntime && closeDelegateTracesInRuntime(currentTurnRuntime)) {
          changed = true;
        }
        const messages = task?.messages || [];
        let lastUser = -1;
        messages.forEach((msg, idx) => {
          if (msg?.role === "user") lastUser = idx;
        });
        for (let i = messages.length - 1; i > lastUser; i -= 1) {
          const msg = messages[i];
          if (msg?.role !== "assistant" || !msg.runtime) continue;
          if (closeDelegateTracesInRuntime(msg.runtime)) changed = true;
        }
        if (changed) scheduleTurnRuntimePanelRefreshThrottled();
        return changed;
      };

      const closeOpenDelegateToolTraces = () => {
        closeDelegateTracesInRuntime(currentTurnRuntime);
      };

      const refreshTurnRuntimePanelInPlace = () => {
        if (!currentTurnRuntime || !isTaskStreaming) return;
        const liveRoot = getActiveLiveRuntimeRoot();
        const traceList = liveRoot?.querySelector(".wm-runtime-trace-stream");
        let thinkingBody = liveRoot?.querySelector("#turn-runtime-thinking-live");
        if (traceList && liveRoot) {
          traceList.innerHTML = renderLiveTraceItemsHtml(
            currentTurnRuntime.traces,
            currentTurnRuntime,
          );
          syncTurnRuntimeOpenStateDom("live");
          ensureTraceScrollBehavior();
          scrollLiveTraceStreamToBottom();
          if (thinkingBody) {
            thinkingBody.textContent = currentTurnRuntime.thinking || "";
            if (thinkingPanelOpen || (isTaskStreaming && !chatUserDetached)) {
              thinkingBody.scrollTop = thinkingBody.scrollHeight;
            }
          }
          const meta = liveRoot.querySelector("[data-runtime-live-meta]");
          if (meta) {
            const traceCount = countProcessTraceEvents(currentTurnRuntime.traces, currentTurnRuntime);
            meta.textContent = `AgentDesk 运行中 · 工具 ${currentTurnRuntime.toolCallCount || 0} · 过程 ${traceCount} 步`;
          }
          return;
        }
        const html = renderTurnRuntimeHtml(currentTurnRuntime, {
          phase: "streaming",
          turnKey: "live",
        });
        let el = document.getElementById("turnRuntimeLive");
        if (el) {
          const detailWasOpen = turnRuntimeDetailOpen;
          el.outerHTML = html;
          turnRuntimeDetailOpen = detailWasOpen;
          traceScrollListenerBound = false;
        } else {
          const bubble = document.getElementById("streamingAssistantBubble");
          if (bubble) bubble.insertAdjacentHTML("beforebegin", html);
          traceScrollListenerBound = false;
        }
        thinkingBody = document.getElementById("turn-runtime-thinking-live");
        syncTurnRuntimeOpenStateDom("live");
        ensureTraceScrollBehavior();
        scrollLiveTraceStreamToBottom();
        if (thinkingBody && (thinkingPanelOpen || (isTaskStreaming && !chatUserDetached))) {
          thinkingBody.scrollTop = thinkingBody.scrollHeight;
        }
      };

      let turnRuntimeToggleBound = false;
      const ensureTurnRuntimeToggle = () => {
        if (turnRuntimeToggleBound) return;
        turnRuntimeToggleBound = true;
        mainPanel.addEventListener("click", (event) => {
          const btn = event.target.closest("[data-turn-toggle]");
          if (!btn || !mainPanel.contains(btn)) return;
          event.preventDefault();
          event.stopPropagation();
          const kind = btn.getAttribute("data-turn-toggle");
          const turnKey = btn.getAttribute("data-turn-key");
          if (turnKey === "live") {
            if (kind === "thinking") thinkingPanelOpen = !thinkingPanelOpen;
            if (kind === "detail") turnRuntimeDetailOpen = !turnRuntimeDetailOpen;
            syncTurnRuntimeOpenStateDom("live");
            requestAnimationFrame(() => syncTurnRuntimeOpenStateDom("live"));
            return;
          }
          const state = runtimeUiState.get(turnKey) || { detailOpen: false, thinkOpen: false };
          if (kind === "detail") state.detailOpen = !state.detailOpen;
          if (kind === "thinking") state.thinkOpen = !state.thinkOpen;
          runtimeUiState.set(turnKey, state);
          const detailEl = document.getElementById(`turn-runtime-detail-${turnKey}`);
          const thinkEl = document.getElementById(`turn-runtime-thinking-${turnKey}`);
          if (kind === "detail" && detailEl) {
            detailEl.classList.toggle("hidden", !state.detailOpen);
          } else if (kind === "detail" && activeTaskId) {
            refreshChatMessagesInPlace(activeTaskId);
          }
          if (kind === "thinking" && thinkEl) {
            thinkEl.classList.toggle("hidden", !state.thinkOpen);
          } else if (kind === "thinking" && activeTaskId) {
            refreshChatMessagesInPlace(activeTaskId);
          }
          syncTurnRuntimeOpenStateDom(turnKey, state);
        });
      };

      const trimLiveRuntimeBuffers = () => {
        if (!currentTurnRuntime) return;
        const thinking = String(currentTurnRuntime.thinking || "");
        if (thinking.length > RUNTIME_THINKING_CAP) {
          currentTurnRuntime.thinking = thinking.slice(-RUNTIME_THINKING_CAP);
        }
        const traces = currentTurnRuntime.traces || [];
        if (traces.length > LIVE_RUNTIME_TRACE_CAP) {
          currentTurnRuntime.traces = traces.slice(-LIVE_RUNTIME_TRACE_CAP);
        }
      };

      const resolveActiveTeamTraceSpeaker = () => {
        if (!teamStreamActive) return "";
        if (teamActiveWorker) return normalizeTeamStreamSender(teamActiveWorker);
        if (teamStreamAssistant) return normalizeTeamStreamSender(teamStreamAssistant.sender);
        return "";
      };

      const traceEventSpeaker = (evt) =>
        normalizeTeamStreamSender(
          evt?.actor_id || evt?.source_member || evt?.worker || evt?.sender || "",
        );

      const shouldAbsorbTeamTrace = (evt) => {
        if (!teamStreamActive) return true;
        const active = resolveActiveTeamTraceSpeaker();
        if (!active) return true;
        if (evt?.step === "info") return Boolean(teamActiveWorker);
        const from = traceEventSpeaker(evt);
        if (!from) return true;
        return from === active;
      };

      const absorbTraceIntoTurnRuntime = (evt) => {
        if (teamStreamActive && !shouldAbsorbTeamTrace(evt)) return;
        if (!currentTurnRuntime) currentTurnRuntime = createEmptyTurnRuntime();
        if (evt.step === "thinking_start") {
          currentTurnRuntime.traces.push(evt);
          trimLiveRuntimeBuffers();
          scheduleTurnRuntimePanelRefreshThrottled();
          return;
        }
        if (evt.step === "thinking_delta") {
          currentTurnRuntime.thinking += evt.detail || "";
          trimLiveRuntimeBuffers();
          currentTurnRuntime.processMsgCount = countProcessTraceEvents(
            currentTurnRuntime.traces,
            currentTurnRuntime,
          );
          scheduleTurnRuntimePanelRefreshThrottled();
          return;
        }
        if (evt.step === "thinking_end") {
          if (evt.detail) {
            currentTurnRuntime.thinking = String(evt.detail).slice(-RUNTIME_THINKING_CAP);
          }
          currentTurnRuntime.traces.push(evt);
          trimLiveRuntimeBuffers();
          scheduleTurnRuntimePanelRefreshThrottled();
          return;
        }
        currentTurnRuntime.traces.push(evt);
        trimLiveRuntimeBuffers();
        const traceLen = currentTurnRuntime.traces.length;
        if (traceLen <= 8 || traceLen % 6 === 0) {
          currentTurnRuntime.toolCallCount = countToolStepsFromTraces(currentTurnRuntime.traces);
          currentTurnRuntime.processMsgCount = countProcessTraceEvents(
            currentTurnRuntime.traces,
            currentTurnRuntime,
          );
        }
        scheduleTurnRuntimePanelRefreshThrottled();
      };

      const finalizeTurnRuntimeOnMessage = (assistantMsg, turnKey) => {
        if (!assistantMsg || !currentTurnRuntime) return;
        if (assistantMsg.sender === "skill-creator" && currentSkillWizard?.created_skill) {
          const mode = String(currentSkillWizard.mode || "create");
          ensureSkillFileArtifact(currentSkillWizard.created_skill, {
            op: mode === "create" ? "create" : "edit",
          });
        }
        const artifacts = normalizeArtifactList(currentTurnRuntime.artifacts);
        if (artifacts.length) {
          assistantMsg.artifacts = artifacts;
        }
        assistantMsg.runtime = JSON.parse(
          JSON.stringify({
            ...currentTurnRuntime,
            stats: currentTaskStats ? { ...currentTaskStats } : currentTurnRuntime.stats,
          }),
        );
        const key = turnKey != null ? String(turnKey) : "0";
        runtimeUiState.set(key, { detailOpen: false, thinkOpen: false });
        currentTurnRuntime = null;
        turnRuntimeDetailOpen = false;
        thinkingPanelOpen = true;
      };

      const renderRunStatsPanelHtml = () => "";

      const messageListFingerprint = (messages) =>
        JSON.stringify(
          (messages || []).map((m) => ({
            role: m.role,
            content: m.content,
            sender: m.sender,
            artifacts: m.artifacts || [],
          })),
        );

      const loadTaskMessagesFromServer = async (taskId, sessionEpoch = taskSessionEpoch) => {
        const task = getTaskById(taskId);
        if (!task || isTaskStreamingNow(taskId) || streamRequestLock) return false;
        try {
          const remote = await window.AgentDeskAPI.getTask(taskId);
          if (isTaskSessionEpochStale(sessionEpoch)) return false;
          if (!remote || !Array.isArray(remote.messages)) return false;
          const localLen = (task.messages || []).length;
          const remoteLen = remote.messages.length;
          if (localLen > remoteLen && remoteLen === 0) return false;
          const before = messageListFingerprint(task.messages);
          syncTaskMessages(task, remote.messages);
          syncTaskRunStatusFromRemote(task, remote);
          patchPendingUserTail(task, remote);
          return before !== messageListFingerprint(task.messages);
        } catch (_) {
          return false;
        }
      };

      let taskHydrationInflight = null;
      let taskHydrationTimer = null;
      const lastTaskHydrateAt = new Map();
      const TASK_HYDRATE_MIN_MS = 15000;

      const refreshTaskMetaFromServer = async (taskId) => {
        if (!taskId) return false;
        await refreshTaskPlan(taskId);
        const observabilityChanged = await refreshTaskObservability(taskId);
        if (activeTaskId === taskId && currentView === "task-conversation" && !isTaskStreamingNow(taskId)) {
          refreshPlanMessageFooter(taskId);
          bindPlanPanelActions(taskId);
          if (currentSkillWizard) {
            refreshSkillWizardPanelInPlace(taskId);
          }
        }
        return observabilityChanged;
      };

      const hydrateTaskFromServer = async (taskId, options = {}) => {
        const force = Boolean(options.force);
        const sessionEpoch = taskSessionEpoch;
        if (!taskId) return;
        if (isTaskStreamingNow(taskId) || streamRequestLock) return;
        const now = Date.now();
        const lastAt = lastTaskHydrateAt.get(taskId) || 0;
        if (!force && now - lastAt < TASK_HYDRATE_MIN_MS) return;
        if (taskHydrationInflight === taskId) return;
        taskHydrationInflight = taskId;
        try {
          const messagesChanged = await loadTaskMessagesFromServer(taskId, sessionEpoch);
          if (isTaskSessionEpochStale(sessionEpoch)) return;
          const observabilityChanged = await refreshTaskMetaFromServer(taskId);
          if (isTaskSessionEpochStale(sessionEpoch)) return;
          lastTaskHydrateAt.set(taskId, Date.now());
          if (
            activeTaskId !== taskId ||
            currentView !== "task-conversation" ||
            isTaskStreamingNow(taskId) ||
            streamRequestLock
          ) {
            return;
          }
          if (messagesChanged || observabilityChanged) {
            rerenderTaskIfActive(taskId);
          } else {
            refreshSkillWizardPanelInPlace(taskId);
          }
        } finally {
          if (taskHydrationInflight === taskId) taskHydrationInflight = null;
        }
      };

      const scheduleTaskHydration = (taskId, options = {}) => {
        if (!taskId) return;
        if (isTaskStreaming && streamingTaskId === taskId) return;
        if (taskHydrationTimer) clearTimeout(taskHydrationTimer);
        const delay = Number(options.delay) >= 0 ? Number(options.delay) : 120;
        taskHydrationTimer = setTimeout(() => {
          taskHydrationTimer = null;
          void hydrateTaskFromServer(taskId, options);
        }, delay);
      };

      const readTaskIdFromUrl = () => {
        try {
          return new URLSearchParams(window.location.search).get("task");
        } catch (_) {
          return null;
        }
      };

      const syncTaskRouteToUrl = (taskId) => {
        try {
          const url = new URL(window.location.href);
          if (taskId) url.searchParams.set("task", taskId);
          else url.searchParams.delete("task");
          window.history.replaceState({ taskId, view: currentView }, "", url.toString());
        } catch (_) {
          /* ignore */
        }
      };

      let messageQueueCollapsed = false;

      const renderMessageQueuePanel = (items) => {
        const panel = document.getElementById("messageQueuePanel");
        const list = document.getElementById("messageQueueList");
        const countEl = document.getElementById("messageQueueCount");
        if (!panel || !list || !countEl) return;
        const queue = Array.isArray(items) ? items : [];
        if (!queue.length) {
          panel.classList.add("hidden");
          list.innerHTML = "";
          countEl.textContent = "0";
          return;
        }
        panel.classList.remove("hidden");
        countEl.textContent = String(queue.length);
        list.classList.toggle("hidden", messageQueueCollapsed);
        list.innerHTML = queue
          .map((item, idx) => {
            const id = String(item.id || "");
            const msg = String(item.message || "");
            return `<div class="flex items-center justify-between gap-2 rounded-md bg-white px-2 py-1.5" data-queue-id="${escapeHtml(id)}">
              <span class="min-w-0 flex-1 truncate text-gray-800">${escapeHtml(msg)}</span>
              <div class="flex shrink-0 items-center gap-1 text-[12px]">
                ${idx > 0 ? `<button type="button" class="queue-up-btn rounded px-1 text-gray-400 hover:bg-gray-100 hover:text-gray-700" data-id="${escapeHtml(id)}" title="上调">↑</button>` : ""}
                <button type="button" class="queue-edit-btn rounded px-1 text-gray-400 hover:bg-gray-100 hover:text-gray-700" data-id="${escapeHtml(id)}" title="编辑">✎</button>
                <button type="button" class="queue-del-btn rounded px-1 text-gray-400 hover:bg-gray-100 hover:text-red-600" data-id="${escapeHtml(id)}" title="删除">🗑</button>
              </div>
            </div>`;
          })
          .join("");
      };

      const refreshMessageQueue = async (taskId) => {
        if (!taskId || !window.AgentDeskAPI?.getTaskQueue) return;
        try {
          const items = await window.AgentDeskAPI.getTaskQueue(taskId);
          renderMessageQueuePanel(items);
        } catch (_) {
          /* ignore */
        }
      };

      const ensureMessageQueueDelegated = () => {
        if (document.body.dataset.queueDelegated) return;
        document.body.dataset.queueDelegated = "1";
        document.body.addEventListener("click", async (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement) || !activeTaskId) return;
          const toggle = target.closest("#messageQueueToggle");
          if (toggle) {
            messageQueueCollapsed = !messageQueueCollapsed;
            const list = document.getElementById("messageQueueList");
            if (list) list.classList.toggle("hidden", messageQueueCollapsed);
            return;
          }
          const upBtn = target.closest(".queue-up-btn");
          if (upBtn instanceof HTMLElement) {
            const itemId = upBtn.dataset.id;
            if (!itemId) return;
            try {
              const items = await window.AgentDeskAPI.getTaskQueue(activeTaskId);
              const ids = items.map((i) => i.id);
              const idx = ids.indexOf(itemId);
              if (idx > 0) {
                const next = [...ids];
                [next[idx - 1], next[idx]] = [next[idx], next[idx - 1]];
                const updated = await window.AgentDeskAPI.reorderQueue(activeTaskId, next);
                renderMessageQueuePanel(updated);
              }
            } catch (_) {
              /* ignore */
            }
            return;
          }
          const editBtn = target.closest(".queue-edit-btn");
          if (editBtn instanceof HTMLElement) {
            const itemId = editBtn.dataset.id;
            if (!itemId) return;
            try {
              const items = await window.AgentDeskAPI.getTaskQueue(activeTaskId);
              const row = items.find((i) => i.id === itemId);
              if (!row) return;
              const next = window.prompt("编辑队列消息", row.message || "");
              if (next == null) return;
              const updated = await window.AgentDeskAPI.updateQueueItem(activeTaskId, itemId, next);
              renderMessageQueuePanel(updated);
            } catch (_) {
              /* ignore */
            }
            return;
          }
          const delBtn = target.closest(".queue-del-btn");
          if (delBtn instanceof HTMLElement) {
            const itemId = delBtn.dataset.id;
            if (!itemId) return;
            try {
              const updated = await window.AgentDeskAPI.deleteQueueItem(activeTaskId, itemId);
              renderMessageQueuePanel(updated);
            } catch (_) {
              /* ignore */
            }
          }
        });
      };

      const setPendingUserMessage = (taskId, text) => {
        if (!taskId || !text) return;
        try {
          sessionStorage.setItem(`${PENDING_USER_MSG_PREFIX}${taskId}`, text);
        } catch (_) {
          /* ignore */
        }
      };

      const consumePendingUserMessage = (taskId) => {
        if (!taskId) return null;
        try {
          const key = `${PENDING_USER_MSG_PREFIX}${taskId}`;
          const text = sessionStorage.getItem(key);
          if (text) sessionStorage.removeItem(key);
          return text;
        } catch (_) {
          return null;
        }
      };

      const patchPendingUserTail = (task, remote) => {
        const pending = consumePendingUserMessage(task.id);
        if (!pending) return;
        const msgs = task.messages || [];
        const alreadyHasUser = msgs.some(
          (m) => m.role === "user" && String(m.content || "").trim() === pending.trim(),
        );
        if (alreadyHasUser) return;
        const last = msgs[msgs.length - 1];
        if (last?.role === "user" && !String(last.content || "").trim()) {
          last.content = pending;
          last.sender = last.sender || "你";
          return;
        }
        if (last?.role === "user" && last.content === pending) return;
        if (taskStreamStillRunning(remote)) {
          return;
        }
        if (last?.role === "user") {
          msgs.push({ role: "user", content: pending, sender: "你" });
        }
      };

      const taskStreamStillRunning = (remote) => {
        if (!remote) return false;
        if (remote.runStatus === "running") return true;
        const msgs = remote.messages || [];
        const last = msgs[msgs.length - 1];
        return last?.role === "assistant" && last.streaming === true;
      };

      const taskNeedsRecovery = (remote) => {
        if (!remote) return false;
        if (taskStreamStillRunning(remote)) return true;
        const msgs = remote.messages || [];
        const last = msgs[msgs.length - 1];
        if (last?.role === "user") return true;
        return false;
      };

      let taskRecoveryPollTimer = null;

      const pollTaskUntilSettled = async (taskId, maxMs = 90000) => {
        const started = Date.now();
        while (Date.now() - started < maxMs) {
          if (activeTaskId !== taskId) return;
          if (streamRequestLock || isTaskStreamingNow(taskId)) return;
          let remote;
          try {
            remote = await window.AgentDeskAPI.getTask(taskId);
          } catch (_) {
            return;
          }
          const task = getTaskById(taskId);
          if (!task) return;
          syncTaskMessages(task, remote.messages);
          patchPendingUserTail(task, remote);
          rerenderTaskIfActive(taskId);
          persistAppState();
          if (!taskStreamStillRunning(remote)) {
            if (activeTaskId === taskId) {
              setChatStreamingUi(false);
              teamPhaseLabel = "";
            }
            break;
          }
          await wait(2000);
        }
      };

      const tryReconnectActiveStream = async (taskId) => {
        const task = getTaskById(taskId);
        if (!task) return false;
        if (isTaskStreaming && streamingTaskId && streamingTaskId !== taskId) return false;
        if (isTaskStreamingNow(taskId)) return false;
        let remote;
        try {
          remote = await window.AgentDeskAPI.getTask(taskId);
        } catch (_) {
          return false;
        }
        if (activeTaskId !== taskId) return false;
        if (remote.runStatus !== "running" && !taskStreamStillRunning(remote)) return false;
        syncTaskMessages(task, remote.messages);
        syncTaskRunStatusFromRemote(task, remote);
        patchPendingUserTail(task, remote);
        await refreshTaskObservability(taskId);
        let assistantMsg = [...(task.messages || [])].reverse().find((m) => m.role === "assistant");
        if (!assistantMsg) {
          assistantMsg = { role: "assistant", sender: "AgentDesk企伴", content: "" };
          task.messages.push(assistantMsg);
        }
        assistantMsg.streaming = true;
        ensureStreamingAssistantShell(assistantMsg);
        isTaskStreaming = true;
        streamingTaskId = taskId;
        streamingAssistantMsgRef = assistantMsg;
        chatStickToBottom = true;
        chatUserDetached = false;
        setChatStreamingUi(true);
        resetStreamTurnState();
        restoreLiveTurnRuntimeFromMessage(assistantMsg);
        rerenderTaskIfActive(taskId, { refreshSidebar: true, forceFullRender: true });
        restoreChatChoicesForTask(taskId);
        refreshChatChoicesComposer();
        try {
          await window.AgentDeskAPI.chatStreamReconnect(
            taskId,
            (evt) => {
              if (activeTaskId !== taskId) return;
              handleChatStreamEvent(evt, taskId, assistantMsg);
            },
            {
              onController: (ctrl) => {
                taskStreamControllers.set(taskId, ctrl);
              },
            },
          );
          await refreshTaskMetaFromServer(taskId);
        } catch (error) {
          if (!streamAbortRequested && !isBenignStreamAbort(error) && !assistantMsg.content) {
            appendTraceEvent({
              step: "error",
              label: "重连失败",
              detail: error instanceof Error ? error.message : "重连失败",
            });
          }
          if (!streamAbortRequested && !isBenignStreamAbort(error)) {
            void pollTaskUntilSettled(taskId);
          }
        } finally {
          streamAbortRequested = false;
          isTaskStreaming = false;
          streamingTaskId = null;
          setChatStreamingUi(false);
          cancelStreamBubblePaint();
          taskStreamControllers.delete(taskId);
          clearStreamingAssistantRef();
          flushTaskCheckpointPersist();
          restoreChatChoicesForTask(taskId);
          refreshChatChoicesComposer();
          rerenderTaskIfActive(taskId, { refreshSidebar: true, forceFullRender: true });
        }
        return true;
      };

      const ensureTaskSessionReady = async (taskId) => {
        const sessionEpoch = taskSessionEpoch;
        if (!taskId) return;
        if (streamRequestLock || isTaskStreamingNow(taskId)) return;
        await hydrateTaskFromServer(taskId, { force: true });
        if (isTaskSessionEpochStale(sessionEpoch) || activeTaskId !== taskId) return;
        if (streamRequestLock || isTaskStreamingNow(taskId)) return;
        let remote;
        try {
          remote = await window.AgentDeskAPI.getTask(taskId);
        } catch (_) {
          return;
        }
        if (isTaskSessionEpochStale(sessionEpoch) || activeTaskId !== taskId) return;
        if (streamRequestLock || isTaskStreamingNow(taskId)) return;
        const task = getTaskById(taskId);
        if (!task) return;
        const localLen = (task.messages || []).length;
        const remoteLen = (remote.messages || []).length;
        if (!(localLen > remoteLen && remoteLen === 0)) {
          syncTaskMessages(task, remote.messages);
          syncTaskRunStatusFromRemote(task, remote);
          patchPendingUserTail(task, remote);
          persistAppState();
        }
        if (isTaskSessionEpochStale(sessionEpoch)) return;
        if (activeTaskId === taskId && !isTaskStreamingNow(taskId) && !streamRequestLock) {
          if ((currentSkillWizard?.questions || []).length > 0) {
            refreshSkillWizardPanelInPlace(taskId);
            refreshChatMessagesInPlace(taskId);
          } else {
            rerenderTaskIfActive(taskId);
          }
        }
        if (taskStreamStillRunning(remote) && activeTaskId === taskId) {
          if (streamRequestLock || isTaskStreamingNow(taskId)) return;
          const reconnected = await tryReconnectActiveStream(taskId);
          if (activeTaskId !== taskId) return;
          if (!reconnected && taskNeedsRecovery(remote)) {
            if (taskRecoveryPollTimer) clearTimeout(taskRecoveryPollTimer);
            taskRecoveryPollTimer = setTimeout(() => {
              taskRecoveryPollTimer = null;
              void pollTaskUntilSettled(taskId);
            }, 500);
          }
          return;
        }
        if (taskNeedsRecovery(remote)) {
          void pollTaskUntilSettled(taskId, 30000);
        }
      };

      const refreshTaskObservability = async (taskId) => {
        try {
          const [stats, events] = await Promise.all([
            window.AgentDeskAPI.getTaskStats(taskId).catch(() => null),
            window.AgentDeskAPI.getTaskEvents(taskId).catch(() => []),
          ]);
          currentTaskStats = stats;
          currentTaskEvents = Array.isArray(events) ? events : [];
          return attachHistoricalEventsToLastAssistant(taskId, currentTaskEvents);
        } catch (_) {
          currentTaskStats = null;
          currentTaskEvents = [];
          return false;
        }
      };

      const buildRuntimeFromEvents = (events) => {
        let thinkingFromDeltas = "";
        const traces = [];
        for (const e of events || []) {
          if (!e) continue;
          if (e.step === "thinking_delta") {
            thinkingFromDeltas += e.detail || "";
            continue;
          }
          traces.push({
            step: e.step,
            label: TRACE_STEP_LABELS[e.step] || e.label || e.step,
            detail: e.detail,
            created_at: e.created_at,
            tool_name: e.tool_name,
            tool_call_id: e.tool_call_id,
            state: e.state,
          });
        }
        const thinkingEnd = [...(events || [])].reverse().find((e) => e.step === "thinking_end");
        const thinking = String(thinkingEnd?.detail || thinkingFromDeltas || "").trim();
        const processSteps = buildProcessStepsFromTraces(traces, {
          thinkingText: thinking,
          thinkingPending: false,
        });
        return {
          thinking,
          traces,
          toolCallCount: processSteps.filter((s) => s.type === "tool").length,
          processMsgCount: processSteps.length,
          stats: currentTaskStats ? { ...currentTaskStats } : null,
        };
      };

      const attachHistoricalEventsToLastAssistant = (taskId, events) => {
        const task = getTaskById(taskId);
        if (!task || !Array.isArray(events) || !events.length) return false;
        const messages = task.messages || [];
        const assistantById = new Map(
          messages
            .filter((m) => m.role === "assistant" && m.id != null)
            .map((m) => [String(m.id), m]),
        );
        const grouped = new Map();
        const legacyEvents = [];
        events.forEach((event) => {
          const messageId = event?.message_id;
          if (messageId == null) {
            legacyEvents.push(event);
            return;
          }
          const key = String(messageId);
          if (!assistantById.has(key)) {
            legacyEvents.push(event);
            return;
          }
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(event);
        });
        let runtimeAttached = false;
        grouped.forEach((groupEvents, key) => {
          const msg = assistantById.get(key);
          if (!msg) return;
          msg.runtime = buildRuntimeFromEvents(groupEvents);
          runtimeAttached = true;
        });
        if (legacyEvents.length) {
          const last = [...messages].reverse().find((m) => m.role === "assistant");
          if (last) {
            last.runtime = buildRuntimeFromEvents(legacyEvents);
            runtimeAttached = true;
          }
        }
        if (
          runtimeAttached &&
          activeTaskId === taskId &&
          currentView === "task-conversation"
        ) {
          refreshChatMessagesInPlace(taskId);
        }
        return runtimeAttached;
      };

      const renderAgentTracePanelHtml = () => "";

      const resetStreamTurnState = () => {
        if (streamTurnState?.turns?.clear) {
          streamTurnState.turns.clear();
        }
      };

      const resetStreamTrace = () => {
        resetStreamTurnState();
        cancelStreamBubblePaint();
        currentTurnRuntime = createEmptyTurnRuntime();
        turnRuntimeDetailOpen = false;
        thinkingPanelOpen = true;
        traceStickToBottom = true;
        traceScrollListenerBound = false;
      };

      const appendTraceEvent = (evt) => {
        absorbTraceIntoTurnRuntime(evt);
      };

      const PLAN_FOOTER_STATUSES = new Set([
        "planning",
        "awaiting_confirm",
        "executing",
        "done",
        "cancelled",
      ]);

      const findPlanAnchorMessageIndex = (task) => {
        const messages = Array.isArray(task) ? task : task.messages || [];
        const status = currentPlanState.status || "idle";
        const wizStatus = currentSkillWizard?.status;
        if (wizStatus === "skill_clarifying") return -1;
        const skillPlanFooter =
          wizStatus === "skill_awaiting_confirm" || wizStatus === "skill_iterating_plan";
        if (!PLAN_FOOTER_STATUSES.has(status) && !skillPlanFooter) {
          return -1;
        }
        for (let i = messages.length - 1; i >= 0; i -= 1) {
          if (messages[i].role === "assistant") return i;
        }
        return -1;
      };

      const resolveSkillWizardPlan = (w) => {
        if (!w) return null;
        if (w.plan && (w.plan.subtasks?.length || w.plan.name)) return w.plan;
        if (w.status === "skill_iterating_plan" && w.iterate_plan) {
          const ip = w.iterate_plan;
          const target = w.target_skill || {};
          return {
            name: target.name || target.dir || "",
            description: ip.rationale || "",
            subtasks: ip.subtasks || [],
          };
        }
        return w.plan || null;
      };

      const formatSkillPlanStepsText = (plan) => {
        if (!plan) return "";
        return (plan.subtasks || [])
          .map((t, i) => {
            const subject = String(t.subject || t.description || "").trim();
            const desc = String(t.description || "").trim();
            const extra =
              desc && t.subject && desc !== subject ? ` — ${desc}` : desc && !t.subject ? desc : "";
            return `${i + 1}. ${subject || desc}${extra}`;
          })
          .filter((line) => line.replace(/^\d+\.\s*/, "").trim())
          .join("\n");
      };

      const parseSkillPlanStepsText = (text) => {
        const lines = String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
        return lines.map((line, idx) => {
          const stripped = line.replace(/^\d+[\.\)、]\s*/, "").trim();
          const dashParts = stripped.split(/\s+[—–-]\s+/);
          if (dashParts.length >= 2) {
            return {
              id: `s${idx + 1}`,
              subject: dashParts[0].trim(),
              description: dashParts.slice(1).join(" — ").trim(),
              state: "pending",
            };
          }
          return {
            id: `s${idx + 1}`,
            subject: stripped,
            description: "",
            state: "pending",
          };
        });
      };

      const formatSkillPlanDocumentText = (plan, w) => {
        if (!plan) return "";
        const isIterate = w?.status === "skill_iterating_plan";
        const ip = w?.iterate_plan || {};
        const lines = [];
        const rationale = String(ip.rationale || "").trim();
        const desc = String(plan.description || "").trim();
        if (isIterate && rationale) lines.push(rationale);
        else if (desc) lines.push(desc);
        else if (rationale) lines.push(rationale);
        if (plan.focus) lines.push(`主题：${plan.focus}`);
        if (plan.inputs) lines.push(`输入：${plan.inputs}`);
        const stepsText = formatSkillPlanStepsText(plan);
        if (stepsText) {
          if (lines.length) lines.push("");
          lines.push(stepsText);
        }
        return lines.join("\n");
      };

      const parseSkillPlanStepsFromDocument = (text) => {
        const lines = String(text || "").split("\n");
        const stepLines = [];
        let inStepsSection = false;
        for (const line of lines) {
          const trimmed = line.trim();
          if (/^步骤[：:]?\s*$/i.test(trimmed)) {
            inStepsSection = true;
            continue;
          }
          if (/^\d+[\.\)、]\s*.+/.test(trimmed)) {
            stepLines.push(trimmed);
            inStepsSection = true;
            continue;
          }
          if (inStepsSection && trimmed) stepLines.push(trimmed);
        }
        if (stepLines.length) return parseSkillPlanStepsText(stepLines.join("\n"));
        return parseSkillPlanStepsText(
          lines
            .map((l) => l.trim())
            .filter((l) => /^\d+[\.\)、]\s*/.test(l))
            .join("\n"),
        );
      };

      const applySkillPlanEditorValue = (text) => {
        const w = currentSkillWizard;
        if (!w) return;
        const value = String(text || "");
        w.plan_edit_text = value;
        const plan = resolveSkillWizardPlan(w);
        if (!plan) return;
        const subtasks = parseSkillPlanStepsFromDocument(value);
        if (subtasks.length) {
          plan.subtasks = subtasks;
          if (w.status === "skill_iterating_plan" && w.iterate_plan) {
            w.iterate_plan.subtasks = subtasks;
          } else if (w.plan) {
            w.plan.subtasks = subtasks;
          }
        }
        const narrative = value
          .split("\n")
          .filter((line) => !/^\d+[\.\)、]\s*/.test(line.trim()) && !/^步骤[：:]?\s*$/i.test(line.trim()))
          .join("\n")
          .trim();
        if (narrative) {
          if (w.status === "skill_iterating_plan") {
            if (!w.iterate_plan) w.iterate_plan = {};
            w.iterate_plan.rationale = narrative;
          } else {
            plan.description = narrative;
            if (w.plan) w.plan.description = narrative;
          }
        }
      };

      const readSkillPlanEditorPayload = () => {
        const editor = mainPanel.querySelector("[data-skill-plan-editor]");
        if (!(editor instanceof HTMLTextAreaElement)) return {};
        const text = editor.value.trim();
        if (!text) return {};
        const payload = { plan_text: text };
        const subtasks = parseSkillPlanStepsFromDocument(text);
        if (subtasks.length) payload.plan_subtasks = subtasks;
        return payload;
      };

      const skillPlanDocumentText = (plan, w) => {
        const saved = String(w?.plan_edit_text || "").trim();
        if (saved) return saved;
        return formatSkillPlanDocumentText(plan, w);
      };

      const escapeTextareaContent = (text) =>
        String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      const fillSkillPlanEditors = () => {
        const w = currentSkillWizard;
        const plan = resolveSkillWizardPlan(w);
        const text = skillPlanDocumentText(plan, w);
        mainPanel.querySelectorAll("[data-skill-plan-editor]").forEach((el) => {
          if (el instanceof HTMLTextAreaElement && el.value !== text) el.value = text;
        });
      };

      const renderSkillPlanConfirmBlockHtml = (plan, w) => {
        const isIterate = w?.status === "skill_iterating_plan";
        const title = isIterate
          ? `迭代计划 · ${plan.name || "技能"}`
          : plan.name || "技能方案";
        const body = escapeTextareaContent(skillPlanDocumentText(plan, w));
        return `
          <div class="mb-2 text-[12px] font-semibold text-gray-800">${escapeHtml(title)}</div>
          <div class="skill-plan-document max-h-[240px] overflow-y-auto rounded-lg border border-gray-200 bg-white">
            <textarea
              data-skill-plan-editor
              rows="9"
              class="min-h-[160px] w-full resize-y border-0 bg-transparent px-3 py-2 text-[13px] leading-relaxed text-gray-800 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#2d8f6f]/25"
              placeholder="在此编辑方案说明与步骤（编号行会作为子任务）"
            >${body}</textarea>
          </div>
        `;
      };

      const renderSkillPlanConfirmFooterButtons = (isIterate) => {
        const confirmLabel = isIterate ? "确认迭代" : "确认创建";
        return `
          <div class="flex flex-wrap justify-end gap-2">
            <button type="button" data-wizard-action="cancel" class="rounded-md px-3 py-1.5 text-[12px] text-gray-500 hover:bg-gray-50">取消</button>
            <button type="button" data-wizard-action="confirm" class="rounded-lg wm-btn-primary px-3 py-1.5 text-[13px] font-medium">${confirmLabel}</button>
          </div>
        `;
      };

      const renderSkillPlanMessageContent = () => {
        const w = currentSkillWizard;
        const plan = resolveSkillWizardPlan(w);
        if (!plan) return "技能方案已生成，请确认后创建。";
        if (w?.status === "skill_iterating_plan") {
          const ip = w.iterate_plan || {};
          const steps = (ip.subtasks || plan.subtasks || [])
            .map((t, i) => `${i + 1}. ${t.subject || t.description || ""}`)
            .join("\n");
          return [
            ip.rationale || plan.description || "已生成迭代子计划，请确认后再执行。",
            "",
            `**迭代技能：${plan.name || "技能"}**`,
            steps ? `迭代步骤：\n${steps}` : "",
          ]
            .filter(Boolean)
            .join("\n");
        }
        return [
          "我已根据你的回答生成技能方案，请确认后再创建。",
          "",
          `**${plan.name || "技能方案"}**`,
          plan.description || "",
        ]
          .filter(Boolean)
          .join("\n");
      };

      const isWizardInternalUserMessage = (message) => {
        if (message?.role !== "user") return false;
        const text = String(message.content || "").trim();
        if (/^对齐选择/.test(text)) return true;
        return [
          "提交技能选项",
          "提交重名选项",
          "提交对齐选项",
          "确认创建技能",
          "取消技能创建",
        ].includes(text);
      };

      const getRenderableTaskMessages = (task) => {
        let messages = (Array.isArray(task.messages) ? task.messages : []).filter(
          (message) => !isWizardInternalUserMessage(message),
        ).filter(
          (message) =>
            message.role !== "assistant" ||
            String(message.content || "").trim().length > 0 ||
            message.streaming === true ||
            (teamStreamActive &&
              isTaskStreamingNow(task?.id) &&
              (message === streamingAssistantMsgRef || message === teamStreamAssistant)),
        );
        /* Team stream keeps separate Leader/member bubbles — no same-sender coalesce. */
        const w = currentSkillWizard;
        const planConfirmStatuses = ["skill_awaiting_confirm", "skill_iterating_plan"];
        if (!planConfirmStatuses.includes(w?.status) || !resolveSkillWizardPlan(w)) return messages;
        const lastUserIdx = messages.reduce(
          (last, msg, idx) => (msg.role === "user" ? idx : last),
          -1,
        );
        const lastAssistantIdx = messages.reduce(
          (last, msg, idx) => (msg.role === "assistant" ? idx : last),
          -1,
        );
        const lastAssistant = lastAssistantIdx >= 0 ? messages[lastAssistantIdx] : null;
        const hasPlanNarrative =
          lastAssistant &&
          String(lastAssistant.content || "").trim().length > 80 &&
          !lastAssistant.synthetic;
        if ((lastAssistantIdx < lastUserIdx || lastAssistantIdx < 0) && !hasPlanNarrative) {
          messages.push({
            role: "assistant",
            sender: "skill-creator",
            content: renderSkillPlanMessageContent(),
            synthetic: true,
          });
        }
        return messages;
      };

      const renderPlanMessageFooterHtml = () => {
        const tasks = currentPlanState.tasks || [];
        const status = currentPlanState.status || "idle";
        const wizStatus = currentSkillWizard?.status;
        const wizPlan = resolveSkillWizardPlan(currentSkillWizard);
        if (
          (wizStatus === "skill_awaiting_confirm" || wizStatus === "skill_iterating_plan") &&
          wizPlan
        ) {
          const isIterate = wizStatus === "skill_iterating_plan";
          return `
            <div class="plan-message-footer mt-3 flex flex-wrap justify-end gap-2 border-t border-gray-100 pt-3">
              ${renderSkillPlanConfirmFooterButtons(isIterate)}
            </div>`;
        }
        if (status === "awaiting_confirm") {
          return `
            <div class="plan-message-footer flex flex-wrap justify-end gap-2">
              <button type="button" data-plan-action="cancel" class="rounded-md px-3 py-1.5 text-[12px] text-gray-500 hover:bg-gray-50">取消</button>
              <button type="button" data-plan-action="revise" class="rounded-md border border-gray-200 px-3 py-1.5 text-[12px] hover:bg-gray-50">修改计划</button>
              <button type="button" data-plan-action="confirm" class="rounded-md wm-btn-primary px-3 py-1.5 text-[12px]">确认执行</button>
            </div>`;
        }
        if (status === "executing" && tasks.length > 0) {
          const done = tasks.filter((t) =>
            ["done", "completed"].includes(String(t.state || "").toLowerCase())
          ).length;
          const pending = tasks.length - done;
          if (pending > 0) {
            return `
            <div class="plan-message-footer flex flex-col items-end gap-1 text-[11px] text-gray-500">
              <span>执行中 · 已完成 ${done}/${tasks.length} 步</span>
              <span>发送「继续执行」可推进剩余子任务</span>
            </div>`;
          }
          return `
            <div class="plan-message-footer flex justify-end text-[11px] text-emerald-600">
              <span>计划已执行完成</span>
            </div>`;
        }
        if (status === "done") {
          return `
            <div class="plan-message-footer flex justify-end text-[11px] text-emerald-600">
              <span>计划已执行完成</span>
            </div>`;
        }
        if (status === "cancelled") {
          return `
            <div class="plan-message-footer flex justify-end text-[11px] text-gray-400">
              <span>计划已取消</span>
            </div>`;
        }
        if (status === "planning") {
          return `
            <div class="plan-message-footer flex justify-end text-[11px] text-gray-400">
              <span>规划中…</span>
            </div>`;
        }
        if (status === "team_planning" || status === "team_executing") {
          const done = tasks.filter((t) =>
            ["done", "completed"].includes(String(t.state || "").toLowerCase())
          ).length;
          const phase = teamPhaseLabel || (status === "team_planning" ? "Leader 判断中…" : "成员协作中…");
          return `
            <div class="plan-message-footer flex flex-col items-end gap-1 text-[11px] text-gray-500">
              <span>${phase}${tasks.length ? ` · 已完成 ${done}/${tasks.length} 步` : ""}</span>
            </div>`;
        }
        if (status === "team_done") {
          return `
            <div class="plan-message-footer flex justify-end text-[11px] text-emerald-600">
              <span>团队协作已完成</span>
            </div>`;
        }
        return "";
      };

      const ensurePlanMessageAnchor = () => {
        let anchor = document.querySelector("[data-plan-anchor-root]");
        if (anchor) return anchor;
        const streamingBubble = document.getElementById("streamingAssistantBubble");
        if (streamingBubble) {
          const parent = streamingBubble.parentElement;
          if (parent?.classList.contains("plan-message-anchor")) return parent;
          const wrap = document.createElement("div");
          wrap.className = "plan-message-anchor";
          wrap.setAttribute("data-plan-anchor-root", "1");
          streamingBubble.parentNode.insertBefore(wrap, streamingBubble);
          wrap.appendChild(streamingBubble);
          return wrap;
        }
        const turns = mainPanel.querySelectorAll("[data-assistant-turn]");
        const lastTurn = turns[turns.length - 1];
        if (!lastTurn) return null;
        const bubble =
          lastTurn.querySelector(".plan-message-anchor") ||
          lastTurn.querySelector(".wm-markdown") ||
          lastTurn.querySelector(".rounded-2xl");
        if (!bubble) return null;
        let wrap = bubble.closest(".plan-message-anchor");
        if (!wrap) {
          wrap = document.createElement("div");
          wrap.className = "plan-message-anchor";
          wrap.setAttribute("data-plan-anchor-root", "1");
          bubble.parentNode.insertBefore(wrap, bubble);
          wrap.appendChild(bubble);
        }
        return wrap;
      };

      const refreshPlanMessageFooter = (taskId) => {
        const footerHtml = renderPlanMessageFooterHtml();
        const anchor = ensurePlanMessageAnchor();
        if (!anchor) {
          if (
            (currentSkillWizard?.status === "skill_awaiting_confirm" ||
              currentSkillWizard?.status === "skill_iterating_plan") &&
            activeTaskId === taskId &&
            currentView === "task-conversation"
          ) {
            refreshChatMessagesInPlace(taskId);
          }
          return;
        }
        let footer = anchor.querySelector(".plan-message-footer");
        if (!footerHtml) {
          footer?.remove();
          bindPlanPanelActions(taskId);
          return;
        }
        if (!footer) {
          footer = document.createElement("div");
          anchor.appendChild(footer);
        }
        footer.outerHTML = footerHtml.trim();
        bindPlanPanelActions(taskId);
        fillSkillPlanEditors();
        scrollChatToBottom();
      };

      const defaultWizardAnswers = (questions) => {
        const values = {};
        (questions || []).forEach((q) => {
          if (q.default !== undefined) {
            values[q.id] = q.default;
          } else if (q.type === "multiple") {
            values[q.id] = [];
          } else {
            values[q.id] = "";
          }
        });
        return values;
      };

      const wizardQuestionAnswered = (q, answers) => {
        const v = answers[q.id];
        if (q.type === "multiple") return Array.isArray(v) && v.length > 0;
        if (q.type === "text") return String(v ?? "").trim().length > 0;
        return v !== undefined && v !== null && String(v) !== "";
      };

      const wizardStepIsDone = (q) =>
        wizardTouchedIds.has(q.id) ||
        Object.prototype.hasOwnProperty.call(currentSkillWizard?.answers || {}, q.id);

      const normalizeWizardStatus = (wizard) =>
        String(wizard?.status || "skill_clarifying");

      const findWizardQuestion = (wizard, qid, stepIndex = wizardStepIndex) => {
        const questions = wizard?.questions || [];
        const needle = String(qid || "");
        if (needle) {
          const matched = questions.find((item) => String(item.id) === needle);
          if (matched) return matched;
        }
        const atStep = questions[stepIndex];
        if (atStep && (!needle || String(atStep.id) === needle)) return atStep;
        return null;
      };

      const syncWizardClarifyProgress = () => {
        if (
          !currentSkillWizard ||
          (currentSkillWizard.status !== "skill_clarifying" &&
            currentSkillWizard.status !== "skill_branch_dialogue")
        ) {
          return;
        }
        if (wizardSubmitting) return;
        const questions = currentSkillWizard.questions || [];
        const serverAnswers = currentSkillWizard.answers || {};
        wizardDraftAnswers = {
          ...defaultWizardAnswers(questions),
          ...wizardDraftAnswers,
          ...serverAnswers,
        };
        Object.keys(serverAnswers).forEach((id) => wizardTouchedIds.add(id));
        let completed = 0;
        for (const q of questions) {
          if (!wizardStepIsDone(q)) break;
          completed++;
        }
        wizardStepIndex = Math.min(completed, Math.max(questions.length - 1, 0));
      };

      const wizardTypeLabel = (type) => {
        if (type === "multiple") return "多选";
        if (type === "text") return "填空";
        return "单选";
      };

      const formatWizardQuestionPrompt = (prompt) =>
        String(prompt || "")
          .trim()
          .replace(/^\d+\.\s*/, "");

      const renderSkillWizardClarifyStepHtml = (q, questionNo, val) => {
        if (q.type === "single" || q.type === "multiple") {
          const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
          const isMulti = q.type === "multiple";
          const selected = isMulti ? (Array.isArray(val) ? val : []) : val;
          const opts = (q.options || [])
            .map((o, idx) => {
              const letter = letters[idx] || String(idx + 1);
              const active = isMulti ? selected.includes(o.id) : selected === o.id;
              return `
                <button
                  type="button"
                  data-wizard-option="${escapeHtml(o.id)}"
                  data-wizard-qid="${escapeHtml(q.id)}"
                  data-wizard-multi="${isMulti ? "1" : "0"}"
                  ${active ? 'data-wizard-selected="1"' : ""}
                  class="flex min-w-0 flex-1 items-center gap-2 rounded-lg border px-3 py-2.5 text-left text-[13px] transition-colors ${
                    active
                      ? "border-gray-900 bg-gray-50 font-medium text-gray-900"
                      : "border-gray-200 bg-white text-gray-700 hover:border-gray-300"
                  }"
                >
                  <span class="shrink-0 text-[12px] text-gray-400">${letter}</span>
                  <span class="truncate">${escapeHtml(o.label)}</span>
                </button>`;
            })
            .join("");
          return `
            <div class="mt-3 flex flex-wrap gap-2" data-wizard-q="${escapeHtml(q.id)}">${opts}</div>
          `;
        }
        return `
          <div class="mt-3" data-wizard-q="${escapeHtml(q.id)}">
            <input
              type="text"
              data-wizard-text="${escapeHtml(q.id)}"
              value="${escapeHtml(String(val || ""))}"
              placeholder="${escapeHtml(q.placeholder || "请输入…")}"
              class="h-10 w-full rounded-lg border border-gray-200 px-3 text-[13px] text-gray-800 focus:border-gray-400 focus:outline-none"
            />
          </div>
        `;
      };

      const renderChoiceCardsPanelHtml = (choiceSpec, prefix, customDraft = "") => {
        const reason = String(choiceSpec.reason || "").trim();
        const options = Array.isArray(choiceSpec.options) ? choiceSpec.options : [];
        const allowCustom = choiceSpec.allow_custom !== false;
        const reasonHtml = reason
          ? `<p class="mb-2 text-[13px] leading-snug text-gray-900">${escapeHtml(reason)}</p>`
          : "";
        const optHtml = options
          .map((opt) => {
            const letter = String(opt.letter || "").trim();
            const label = String(opt.label || "").trim();
            const payload = escapeHtml(
              JSON.stringify({
                choice_id: String(opt.id || ""),
                letter,
                label,
              }),
            );
            return `
              <button
                type="button"
                data-${prefix}-option="1"
                data-${prefix}-payload="${payload}"
                class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2.5 text-left text-[13px] text-gray-800 transition hover:border-indigo-300 hover:bg-indigo-50/60"
              >
                <span class="font-semibold text-indigo-900">${escapeHtml(letter)}.</span>
                ${escapeHtml(label)}
              </button>`;
          })
          .join("");
        const customHtml = allowCustom
          ? `
            <div class="mt-3 flex items-center gap-2 border-t border-gray-100 pt-3">
              <span class="shrink-0 text-[13px] font-semibold text-indigo-900">E.</span>
              <input
                type="text"
                data-${prefix}-custom-input
                value="${escapeHtml(customDraft)}"
                placeholder="其他（自定义输入）"
                class="h-9 min-w-0 flex-1 rounded-lg border border-gray-200 px-3 text-[13px] text-gray-800 focus:border-indigo-300 focus:outline-none"
              />
              <button
                type="button"
                data-${prefix}-action="submit-custom"
                class="shrink-0 rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-[13px] font-medium text-gray-800 hover:bg-gray-50"
              >提交</button>
            </div>
            <p class="mt-2 text-[11px] text-gray-400">点选 A–D 自动提交；也可填 E 或用最下方输入框自由回复。</p>`
          : `<p class="mt-2 text-[11px] text-gray-400">点选选项自动提交；也可在最下方输入框自由回复。</p>`;
        return `${reasonHtml}<div class="space-y-2">${optHtml}</div>${customHtml}`;
      };

      const renderBranchChoicesPanelHtml = (branchChoices) =>
        renderChoiceCardsPanelHtml(branchChoices, "branch", branchCustomDraft);

      const renderChatChoicesComposerHtml = () => {
        if (!currentChatChoices || chatChoicesTaskId !== activeTaskId) return "";
        const body = renderChoiceCardsPanelHtml(currentChatChoices, "chat", chatChoiceCustomDraft);
        return `
          <div class="overflow-hidden rounded-xl border border-indigo-100 bg-white shadow-sm">
            <div class="border-b border-indigo-50 bg-indigo-50/50 px-4 py-2">
              <p class="text-[13px] font-medium text-indigo-900">请选择</p>
            </div>
            <div class="px-4 py-3">${body}</div>
          </div>
        `;
      };

      const refreshChatChoicesComposer = () => {
        const wrap = document.getElementById("chatChoicesComposerWrap");
        if (!wrap) return;
        wrap.innerHTML = renderChatChoicesComposerHtml();
        if (currentChatChoices && chatChoicesTaskId === activeTaskId) {
          ensureSkillWizardDelegatedEvents();
        }
      };

      const skillWizardRetryInflight = new Set();
      const skillWizardAutoRetried = new Set();
      let skillWizardPlanPollTimer = null;

      const stopSkillWizardPlanPoll = () => {
        if (skillWizardPlanPollTimer) {
          clearInterval(skillWizardPlanPollTimer);
          skillWizardPlanPollTimer = null;
        }
      };

      const startSkillWizardPlanPoll = (taskId) => {
        stopSkillWizardPlanPoll();
        if (!taskId) return;
        skillWizardPlanPollTimer = setInterval(() => {
          void (async () => {
            if (!isTaskStreamingNow(taskId)) {
              stopSkillWizardPlanPoll();
              return;
            }
            const prevCount = (currentSkillWizard?.questions || []).length;
            try {
              await hydrateSkillWizardFromServer(taskId, { allowWhileStreaming: true });
            } catch (_) {
              return;
            }
            const nextCount = (currentSkillWizard?.questions || []).length;
            if (nextCount > prevCount && shouldApplyStreamUi(taskId)) {
              wizardSubmitting = false;
              refreshSkillWizardPanelInPlace(taskId);
            }
          })();
        }, 2000);
      };

      const renderSkillWizardComposerHtml = () => {
        const w = currentSkillWizard;
        if (!w) return "";
        const status = w.status || "skill_clarifying";
        const questions = w.questions || [];
        const total = questions.length;

        if (status === "skill_branch_dialogue") {
          const modeLabel =
            { replace: "替换", iterate: "迭代", new: "新建" }[w.mode] || "分支";
          const bc = w.branch_choices;
          const hasCards = bc && Array.isArray(bc.options) && bc.options.length;
          const showCards = hasCards && !isActiveTaskStreaming() && !wizardSubmitting;
          const choicesHtml = showCards
            ? renderBranchChoicesPanelHtml(bc)
            : wizardSubmitting
              ? `<p class="mt-1 text-[12px] text-indigo-800/90">正在根据你的选择生成回复，请稍候…</p>`
              : isActiveTaskStreaming()
                ? `<p class="mt-1 text-[12px] text-indigo-800/90">助手正在回复，完成后将显示选项卡…</p>`
                : `<p class="mt-1 text-[12px] text-indigo-800/90">等待助手生成对齐选项，或直接在页面底部输入框回复。</p>
                   <button type="button" data-wizard-action="retry-branch-choices" class="mt-2 rounded-lg border border-indigo-200 bg-white px-3 py-1.5 text-[12px] text-indigo-800 hover:bg-indigo-50">重新生成选项</button>`;
          return `
            <div id="skillWizardPanel" class="mb-3 overflow-hidden rounded-xl border border-indigo-100 bg-white shadow-sm">
              <div class="border-b border-indigo-50 bg-indigo-50/50 px-4 py-2">
                <p class="text-[13px] font-medium text-indigo-900">对齐对话中 · ${escapeHtml(modeLabel)}</p>
              </div>
              <div class="px-4 py-3">${choicesHtml}</div>
            </div>
          `;
        }

        if (status === "skill_clarifying" && (total === 0 || wizardSubmitting)) {
          const hint = wizardSubmitting
            ? "正在根据你的描述创建技能…"
            : skillWizardRetryInflight.has(activeTaskId)
              ? "正在重新提交技能创建请求…"
            : isActiveTaskStreaming()
              ? "正在创建技能，请稍候…"
              : "技能创建未完成，可点击下方按钮重试";
          return `
            <div id="skillWizardPanel" class="mb-3 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm px-4 py-3">
              <p class="text-[13px] text-gray-500">${hint}</p>
              ${
                !isActiveTaskStreaming() && !skillWizardRetryInflight.has(activeTaskId)
                  ? `<button type="button" data-wizard-action="retry-start" class="mt-2 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-[12px] text-gray-700 hover:bg-gray-50">重新创建技能</button>`
                  : ""
              }
            </div>
          `;
        }

        if (status === "skill_clarifying" && total > 0) {
          const merged = {
            ...defaultWizardAnswers(questions),
            ...wizardDraftAnswers,
            ...(w.answers || {}),
          };
          const q = questions[wizardStepIndex] || questions[0];
          const questionNo = wizardStepIndex + 1;
          const val = merged[q.id];
          const bodyHidden = wizardComposerCollapsed ? "hidden" : "";

          return `
            <div id="skillWizardPanel" class="mb-3 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
              <div class="flex items-center justify-between border-b border-gray-100 px-4 py-2.5">
                <div class="flex items-center gap-2 text-[13px] font-medium text-gray-800">
                  <span class="flex h-6 w-6 items-center justify-center rounded-md bg-gray-100 text-[12px] text-gray-600">?</span>
                  <span>问题</span>
                </div>
                <div class="flex items-center gap-2 text-[12px] text-gray-500">
                  <span class="tabular-nums">${questionNo} / ${total}</span>
                  <button type="button" data-wizard-action="toggle-collapse" class="rounded p-0.5 text-gray-400 hover:bg-gray-100 hover:text-gray-600" aria-label="折叠">
                    <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4 transition-transform ${wizardComposerCollapsed ? "-rotate-90" : ""}">
                      <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                  <button type="button" data-wizard-action="cancel" class="rounded p-0.5 text-gray-400 hover:bg-gray-100 hover:text-gray-600" aria-label="关闭问卷">
                    <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4">
                      <path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="${bodyHidden} max-h-[220px] overflow-y-auto px-4 py-3">
                <div class="flex items-start gap-2">
                  <span class="shrink-0 text-[13px] font-medium text-gray-900">${questionNo}.</span>
                  <div class="min-w-0 flex-1">
                    <div class="flex flex-wrap items-center gap-2">
                      <span class="text-[13px] leading-snug text-gray-900">${escapeHtml(formatWizardQuestionPrompt(q.prompt))}</span>
                      <span class="shrink-0 rounded border border-purple-100 bg-purple-50 px-1.5 py-0.5 text-[10px] font-medium text-purple-600">${wizardTypeLabel(q.type)}</span>
                    </div>
                    ${renderSkillWizardClarifyStepHtml(q, questionNo, val)}
                  </div>
                </div>
              </div>
              <div class="${bodyHidden} flex items-center justify-end gap-2 border-t border-gray-100 px-4 py-2.5">
                <button type="button" data-wizard-action="skip-step" class="px-2 py-1 text-[13px] text-gray-500 hover:text-gray-800">跳过</button>
                ${
                  q.type === "single"
                    ? '<span class="text-[11px] text-gray-400">点选选项后自动下一题</span>'
                    : `<button type="button" data-wizard-action="complete-step" class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-[13px] font-medium text-gray-800 hover:bg-gray-50">
                  完成 <span class="text-gray-400">↵</span>
                </button>`
                }
              </div>
            </div>
          `;
        }

        if (status === "skill_executing" || status === "skill_done" || status === "skill_cancelled") {
          return "";
        }

        const confirmPlan = resolveSkillWizardPlan(w);
        if (
          (status === "skill_awaiting_confirm" || status === "skill_iterating_plan") &&
          confirmPlan
        ) {
          const isIterate = status === "skill_iterating_plan";
          return `
            <div id="skillWizardPanel" class="mb-3 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
              <div class="border-b border-gray-100 px-4 py-2.5">
                <span class="text-[13px] font-medium text-gray-800">${isIterate ? "迭代计划待确认" : "技能方案待确认"}</span>
              </div>
              <div class="px-4 py-3">${renderSkillPlanConfirmBlockHtml(confirmPlan, w)}</div>
              <div class="border-t border-gray-100 px-4 py-2.5">${renderSkillPlanConfirmFooterButtons(isIterate)}</div>
            </div>
          `;
        }

        let body = "";
        if (status === "skill_done" && w.created_skill) {
          body = `
            <p class="px-4 py-3 text-[13px] text-emerald-700">已创建技能「${escapeHtml(w.created_skill.name || "")}」，可到侧栏「技能」查看。</p>
            <div class="flex justify-end border-t border-gray-100 px-4 py-2.5">
              <button type="button" data-wizard-action="dismiss" class="rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-[13px] text-gray-700 hover:bg-gray-50">关闭</button>
            </div>`;
        } else if (status === "skill_cancelled") {
          body = `
            <p class="px-4 py-3 text-[13px] text-gray-500">技能创建已取消。</p>
            <div class="flex justify-end border-t border-gray-100 px-4 py-2.5">
              <button type="button" data-wizard-action="dismiss" class="rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-[13px] text-gray-700 hover:bg-gray-50">关闭</button>
            </div>`;
        }

        return `
          <div id="skillWizardPanel" class="mb-3 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
            <div class="flex items-center justify-between border-b border-gray-100 px-4 py-2.5">
              <span class="text-[13px] font-medium text-gray-800">技能创建</span>
              ${
                status === "skill_done" || status === "skill_cancelled"
                  ? '<button type="button" data-wizard-action="dismiss" class="text-[12px] text-gray-400 hover:text-gray-700">×</button>'
                  : ""
              }
            </div>
            ${body}
          </div>
        `;
      };

      let skillWizardDismissTimer = null;

      const clearSkillWizardDismissTimer = () => {
        if (skillWizardDismissTimer) {
          clearTimeout(skillWizardDismissTimer);
          skillWizardDismissTimer = null;
        }
      };

      const dismissSkillWizardComposer = (taskId) => {
        clearSkillWizardDismissTimer();
        if (taskId) skillWizardDismissedTaskIds.add(taskId);
        currentSkillWizard = null;
        wizardDraftAnswers = {};
        wizardTouchedIds = new Set();
        wizardStepIndex = 0;
        wizardSubmitting = false;
        wizardComposerCollapsed = false;
        pendingComposerSkillTag = null;
        activeComposerIntent = "normal";
        const wrap = document.getElementById("skillWizardComposerWrap");
        if (wrap) wrap.innerHTML = "";
        refreshPlanMessageFooter(taskId);
      };

      const scheduleSkillWizardDismiss = (taskId, delayMs = 2800) => {
        clearSkillWizardDismissTimer();
        skillWizardDismissTimer = setTimeout(() => {
          skillWizardDismissTimer = null;
          if (activeTaskId === taskId) dismissSkillWizardComposer(taskId);
        }, delayMs);
      };

      const skillWizardRecoverInflight = new Set();

      const refreshSkillWizardComposer = (taskId) => {
        const wrap = document.getElementById("skillWizardComposerWrap");
        if (!wrap) return;
        wrap.innerHTML = currentSkillWizard ? renderSkillWizardComposerHtml() : "";
        if (currentSkillWizard) {
          ensureSkillWizardDelegatedEvents();
          fillSkillPlanEditors();
        }
        refreshPlanMessageFooter(taskId);
        if (currentSkillWizard) fillSkillPlanEditors();
        const w = currentSkillWizard;
        const shouldRecover =
          w?.status === "skill_clarifying" &&
          !(w.questions || []).length &&
          !isActiveTaskStreaming() &&
          !wizardSubmitting &&
          !skillWizardRecoverInflight.has(taskId);
        if (shouldRecover) {
          skillWizardRecoverInflight.add(taskId);
          void (async () => {
            try {
              let remote = null;
