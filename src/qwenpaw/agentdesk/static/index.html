<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentDesk企伴</title>
    <link rel="icon" href="agentdesk-icon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .wm-chat-brand {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .wm-chat-icon-wrap {
        position: relative;
        display: inline-grid;
        place-items: center;
        width: 20px;
        height: 20px;
        border-radius: 9999px;
        background: #fafafa;
        animation: wm-icon-float 2.6s ease-in-out infinite;
      }

      .wm-chat-icon-wrap::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.22), rgba(59, 130, 246, 0.14));
        opacity: 0;
        animation: wm-icon-glow 2.6s ease-in-out infinite;
        z-index: 0;
      }

      .wm-chat-icon {
        position: relative;
        z-index: 1;
        width: 14px;
        height: 14px;
        border-radius: 4px;
        object-fit: cover;
        animation: wm-icon-tilt 4s ease-in-out infinite;
      }

      .wm-chat-brand-text {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #1f2937;
      }

      .wm-chat-brand-text--leader {
        color: #047857;
      }

      .wm-chat-avatar-emoji {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 14px;
        height: 14px;
        font-size: 11px;
        line-height: 1;
      }

      /* Chat markdown (QwenPaw / XMarkdown-like typography) */
      .wm-markdown {
        max-width: 100%;
        font-size: 13px;
        line-height: 1.7;
        color: #374151;
        word-break: break-word;
      }

      .wm-markdown > *:first-child {
        margin-top: 0;
      }

      .wm-markdown > *:last-child {
        margin-bottom: 0;
      }

      .wm-markdown h1,
      .wm-markdown h2,
      .wm-markdown h3,
      .wm-markdown h4 {
        margin: 0.75em 0 0.4em;
        font-weight: 600;
        line-height: 1.45;
        color: #111827;
      }

      .wm-markdown h1 {
        font-size: 1.2em;
      }

      .wm-markdown h2 {
        font-size: 1.1em;
      }

      .wm-markdown h3,
      .wm-markdown h4 {
        font-size: 1em;
      }

      .wm-markdown p {
        margin: 0 0 0.55em;
      }

      .wm-markdown hr {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin: 1em 0;
      }

      .wm-markdown blockquote {
        margin: 0.75em 0;
        padding: 0.1em 0 0.1em 0.75em;
        border-left: 4px solid #d1d5db;
        color: #4b5563;
      }

      .wm-markdown ul,
      .wm-markdown ol {
        margin: 0.4em 0 0.65em;
        padding-left: 1.35em;
      }

      .wm-markdown li + li {
        margin-top: 0.2em;
      }

      .wm-markdown table {
        border-collapse: collapse;
        display: block;
        width: max-content;
        max-width: 100%;
        overflow-x: auto;
        margin: 0.65em 0;
      }

      .wm-markdown th {
        background: #f3f4f6;
        text-align: left;
        font-weight: 600;
      }

      .wm-markdown th,
      .wm-markdown td {
        padding: 0.55em 0.9em;
        border: 1px solid #e5e7eb;
        white-space: nowrap;
      }

      .wm-markdown code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9em;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 0.1em 0.35em;
      }

      .wm-markdown pre {
        margin: 0.65em 0;
        padding: 0.75em 0.9em;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        overflow-x: auto;
      }

      .wm-markdown pre code {
        border: none;
        padding: 0;
        background: transparent;
      }

      .wm-markdown a {
        color: #2563eb;
        text-decoration: underline;
      }

      /* Plan confirm / status footer inside assistant bubble */
      .plan-message-anchor {
        display: block;
        width: 100%;
        max-width: 100%;
      }

      .plan-message-footer {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #f3f4f6;
      }

      /* Per-turn runtime: thinking + merged trace/stats (QwenPaw-style) */
      .wm-turn-runtime {
        max-width: 100%;
      }

      .wm-thinking-toggle,
      .wm-runtime-summary {
        display: flex;
        width: 100%;
        align-items: center;
        gap: 6px;
        border: none;
        background: transparent;
        padding: 0;
        text-align: left;
        cursor: pointer;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.5;
      }

      .wm-thinking-toggle:hover,
      .wm-runtime-summary:hover {
        color: #374151;
      }

      .wm-thinking-chevron,
      .wm-runtime-chevron {
        flex-shrink: 0;
        font-size: 10px;
        color: #9ca3af;
        transition: transform 0.15s ease;
      }

      .wm-thinking-chevron.is-open,
      .wm-runtime-chevron.is-open {
        transform: rotate(90deg);
      }

      .wm-thinking-body {
        margin-top: 6px;
        max-height: 132px;
        overflow-y: auto;
        padding: 8px 10px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px solid #f3f4f6;
        font-size: 12px;
        line-height: 1.65;
        color: #9ca3af;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wm-runtime-detail {
        margin-top: 8px;
        max-height: min(480px, 62vh);
        overflow-y: auto;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fafafa;
      }

      .wm-runtime-live-panel {
        margin-bottom: 0;
        padding: 0;
        border: none;
        background: transparent;
      }

      .wm-runtime-live-panel.is-streaming {
        border: none;
        background: transparent;
      }

      .wm-runtime-trace-stream {
        max-height: none;
        overflow: visible;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .hidden {
        display: none !important;
      }

      .wm-runtime-summary.is-streaming {
        color: #2563eb;
      }

      .wm-runtime-summary.is-streaming:hover {
        color: #1d4ed8;
      }

      .wm-runtime-trace-stream li {
        padding: 2px 0;
      }

      .wm-trace-tool {
        margin: 4px 0;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        overflow: hidden;
      }

      .wm-trace-tool-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        font-size: 11px;
        color: #374151;
      }

      .wm-trace-tool-badge {
        flex-shrink: 0;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 600;
      }

      .wm-trace-tool-body {
        border-top: 1px solid #f3f4f6;
        padding: 6px 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        line-height: 1.45;
        color: #4b5563;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 180px;
        overflow-y: auto;
      }

      .wm-trace-line {
        padding: 2px 0;
      }

      .wm-trace-line-detail {
        margin-top: 2px;
        padding-left: 8px;
        border-left: 2px solid #e5e7eb;
        font-size: 10px;
        color: #6b7280;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 160px;
        overflow-y: auto;
      }

      .wm-process-step {
        margin: 6px 0;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        overflow: hidden;
      }

      .wm-process-step-row {
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        align-items: flex-start;
      }

      .wm-process-icon {
        flex-shrink: 0;
        display: flex;
        height: 22px;
        width: 22px;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: #f3f4f6;
        color: #6b7280;
      }

      .wm-process-icon.is-tool {
        background: #eff6ff;
        color: #2563eb;
      }

      .wm-process-icon.is-model {
        background: #f5f3ff;
        color: #7c3aed;
      }

      .wm-process-icon.is-thinking {
        background: #faf5ff;
        color: #9333ea;
      }

      .wm-process-step.is-thinking .wm-process-desc {
        color: #6b7280;
        font-size: 11px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wm-process-body {
        min-width: 0;
        flex: 1;
      }

      .wm-process-title {
        font-size: 11px;
        line-height: 1.45;
        color: #374151;
        word-break: break-word;
      }

      .wm-process-time {
        color: #9ca3af;
        font-variant-numeric: tabular-nums;
      }

      .wm-process-desc {
        margin-top: 4px;
        font-size: 11px;
        line-height: 1.5;
        color: #4b5563;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wm-process-command {
        margin-top: 4px;
        display: flex;
        gap: 6px;
        align-items: flex-start;
        border-radius: 6px;
        background: #f9fafb;
        border: 1px solid #f3f4f6;
        padding: 6px 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        line-height: 1.5;
        color: #1f2937;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wm-process-command-prefix {
        flex-shrink: 0;
        color: #9ca3af;
        user-select: none;
      }

      .wm-process-output {
        margin-top: 6px;
        border-top: 1px solid #f3f4f6;
        padding: 6px 10px 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        line-height: 1.45;
        color: #6b7280;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
      }

      .wm-process-status {
        flex-shrink: 0;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
      }

      .wm-process-status.is-success {
        background: #ecfdf5;
        color: #047857;
      }

      .wm-process-status.is-pending {
        background: #fef3c7;
        color: #b45309;
      }

      .wm-process-status.is-error {
        background: #fef2f2;
        color: #b91c1c;
      }

      .wm-process-plain {
        display: flex;
        gap: 6px;
        align-items: flex-start;
        padding: 4px 0;
        font-size: 11px;
        line-height: 1.45;
        color: #6b7280;
      }

      .wm-process-simple {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 5px 2px;
        font-size: 11px;
        line-height: 1.5;
        color: #374151;
      }

      .wm-process-simple-text {
        min-width: 0;
        flex: 1;
        word-break: break-word;
      }

      .wm-process-output-card {
        margin: 0 0 6px 0;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        overflow: hidden;
      }

      .wm-process-output-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        font-size: 11px;
        color: #374151;
      }

      .wm-process-output-badge {
        flex-shrink: 0;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 600;
      }

      .wm-runtime-stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        font-size: 11px;
      }

      .wm-runtime-stat-cell {
        border-radius: 6px;
        border: 1px solid #f3f4f6;
        background: #fff;
        padding: 6px 8px;
        color: #374151;
      }

      .wm-runtime-section-title {
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
      }

      @keyframes wm-runtime-live-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }

      .wm-runtime-live-badge {
        animation: wm-runtime-live-pulse 1.4s ease-in-out infinite;
      }

      .wm-runtime-summary.is-complete {
        color: #059669;
      }

      .wm-runtime-summary.is-complete:hover {
        color: #047857;
      }

      .wm-runtime-summary.is-complete .wm-runtime-chevron {
        color: #10b981;
      }

      .wm-turn-artifacts {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #f3f4f6;
      }

      .wm-turn-artifacts-title {
        font-size: 12px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
      }

      .wm-artifact-chip {
        display: inline-flex;
        max-width: 100%;
        align-items: center;
        gap: 4px;
        margin: 0 6px 6px 0;
        padding: 4px 10px;
        border-radius: 9999px;
        border: 1px solid #d1fae5;
        background: #ecfdf5;
        color: #047857;
        font-size: 12px;
        line-height: 1.4;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease;
      }

      .wm-artifact-chip:hover {
        background: #d1fae5;
        border-color: #6ee7b7;
      }

      .wm-artifact-chip.is-product {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .wm-artifact-chip.is-product:hover {
        background: #dbeafe;
        border-color: #93c5fd;
      }

      .wm-artifact-context-menu {
        position: fixed;
        z-index: 10050;
        min-width: 160px;
        padding: 4px 0;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }

      .wm-artifact-context-menu button {
        display: block;
        width: 100%;
        padding: 8px 14px;
        border: none;
        background: transparent;
        color: #111827;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
      }

      .wm-artifact-context-menu button:hover {
        background: #f3f4f6;
      }

      .wm-artifact-chip:focus-visible {
        outline: 2px solid #10b981;
        outline-offset: 2px;
      }

      .wm-artifact-link {
        margin-top: 4px;
        font-size: 11px;
        color: #059669;
        cursor: pointer;
        text-decoration: none;
      }

      .wm-artifact-link:hover {
        text-decoration: underline;
      }

      #artifactPanel {
        border-left: 1px solid #e5e7eb;
        background: #fff;
      }

      .wm-artifact-tab {
        cursor: pointer;
        border-bottom: 2px solid transparent;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 500;
        color: #6b7280;
        transition: color 0.15s ease, border-color 0.15s ease;
      }

      .wm-artifact-tab.is-active {
        color: #047857;
        border-bottom-color: #10b981;
      }

      .wm-artifact-tab:hover {
        color: #374151;
      }

      .wm-artifact-file-item {
        display: block;
        width: 100%;
        text-align: left;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 12px;
        color: #374151;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      .wm-artifact-file-item:hover,
      .wm-artifact-file-item.is-selected {
        background: #ecfdf5;
        color: #047857;
      }

      .wm-artifact-preview {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        color: #1f2937;
      }

      @keyframes wm-runtime-summary-in {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .wm-runtime-summary.is-complete {
        animation: wm-runtime-summary-in 0.25s ease-out;
      }

      @keyframes wm-icon-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-2px);
        }
      }

      @keyframes wm-icon-glow {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.92);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes wm-icon-tilt {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-4deg);
        }
        75% {
          transform: rotate(4deg);
        }
      }

      /* New-task home hero */
      .wm-home-bg {
        background:
          radial-gradient(ellipse 70% 45% at 50% -10%, rgba(16, 185, 129, 0.1), transparent 55%),
          radial-gradient(ellipse 45% 35% at 95% 45%, rgba(59, 130, 246, 0.06), transparent 50%),
          radial-gradient(ellipse 40% 30% at 5% 85%, rgba(16, 185, 129, 0.05), transparent 50%);
      }

      .wm-home-logo-ring {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(59, 130, 246, 0.1));
      }

      .wm-home-composer {
        transition:
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .wm-home-composer:focus-within {
        border-color: rgba(16, 185, 129, 0.35);
        box-shadow:
          0 16px 48px rgba(15, 23, 42, 0.06),
          0 0 0 3px rgba(16, 185, 129, 0.08);
      }

      .wm-home-chip {
        flex-shrink: 0;
        white-space: nowrap;
        transition:
          border-color 0.2s ease,
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .wm-home-chip:hover {
        border-color: rgba(16, 185, 129, 0.35);
        background-color: rgba(236, 253, 245, 0.65);
        color: #047857;
      }

      .wm-home-dock {
        width: 100%;
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
        flex-shrink: 0;
      }

      .wm-home-chips-row {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.5rem;
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }

      .wm-home-chips-row::-webkit-scrollbar {
        display: none;
      }

      .wm-home-toolbar-btn {
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      @media (prefers-reduced-motion: reduce) {
        .wm-home-composer,
        .wm-home-chip,
        .wm-home-toolbar-btn {
          transition: none;
        }
      }

      /* AgentDesk global design system */
      .wm-page-shell {
        background-color: #f8faf9;
        background-image:
          radial-gradient(ellipse 60% 40% at 100% 0%, rgba(16, 185, 129, 0.04), transparent 50%),
          radial-gradient(ellipse 50% 35% at 0% 100%, rgba(59, 130, 246, 0.03), transparent 50%);
      }

      .wm-card {
        border: 1px solid rgba(229, 231, 235, 0.9);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 0.75rem;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .wm-card:hover {
        border-color: rgba(209, 213, 219, 1);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      .wm-card-add {
        border: 1px dashed #d1d5db;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 0.75rem;
        transition:
          border-color 0.2s ease,
          background-color 0.2s ease;
      }

      .wm-card-add:hover {
        border-color: rgba(16, 185, 129, 0.45);
        background: rgba(236, 253, 245, 0.5);
      }

      .wm-btn-primary {
        background-color: #059669;
        color: #fff;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .wm-btn-primary:hover {
        background-color: #047857;
      }

      .wm-btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Composer send ↔ stop (streaming) */
      .wm-composer-send {
        min-height: 2.25rem;
        min-width: 2.25rem;
      }

      .wm-composer-send--send {
        background-color: #059669;
        border: 1px solid transparent;
        color: #fff;
      }

      .wm-composer-send--send:hover {
        background-color: #047857;
      }

      .wm-composer-send--stop {
        background-color: #fff;
        color: #dc2626;
        border: 1px solid #fecaca;
        box-shadow: 0 1px 2px rgba(220, 38, 38, 0.06);
        animation: wm-composer-stop-pulse 2.4s ease-in-out infinite;
      }

      .wm-composer-send--stop:hover {
        background-color: #fef2f2;
        border-color: #f87171;
        color: #b91c1c;

            closeModal();

            window.AgentDeskAPI.deleteTeam(team.id)

            return;

            const exists = members.includes(employeeName);
            const nextMembers = exists
              ? members.filter((name) => name !== employeeName)
              : [...members, employeeName];
            const nextLeader = resolveTeamLeader(nextMembers, team.leader);
            const orderedMembers = orderTeamMembersLeaderFirst(nextMembers, nextLeader);
            const candidate = getTeamMemberCandidates().find((item) => item.name === employeeName);

                    .catch(() => Promise.resolve());

        let selectedUpload = null;

        const setSelectedUpload = (payload, label) => {
          selectedUpload = payload;
          if (fileName) fileName.textContent = label || "未选择文件";
        };

        const readDirectoryEntry = async (entry, prefix = "") =>
          new Promise((resolve) => {
            if (!entry) {
              resolve([]);
              return;
            }
            if (entry.isFile) {
              entry.file(
                (file) => {
                  const rel = prefix ? `${prefix}/${file.name}` : file.name;
                  Object.defineProperty(file, "webkitRelativePath", { value: rel });
                  resolve([file]);
                },
                () => resolve([]),
              );
              return;
            }
            if (!entry.isDirectory) {
              resolve([]);
              return;
            }
            const reader = entry.createReader();
            reader.readEntries(async (entries) => {
              const nested = await Promise.all(
                entries.map((child) =>
                  readDirectoryEntry(child, prefix ? `${prefix}/${entry.name}` : entry.name),
                ),
              );
              resolve(nested.flat());
            });
          });

        const collectDroppedFiles = async (dataTransfer) => {
          const items = Array.from(dataTransfer?.items || []);
          if (!items.length) return [];
          const fromEntries = (
            await Promise.all(
              items.map((item) => {
                const entry = item.webkitGetAsEntry?.();
                return readDirectoryEntry(entry);
              }),
            )
          ).flat();
          if (fromEntries.length) return fromEntries;
          return Array.from(dataTransfer.files || []);
        };

        if (fileInput instanceof HTMLInputElement && fileName) {
          fileInput.addEventListener("change", () => {
            const file = fileInput.files?.[0];

            setSelectedUpload(files.length ? files : null, files.length ? `${root}（${files.length} 个文件）` : "未选择文件");
          });

        modalRoot.querySelector('[data-action="pick-skill-folder"]')?.addEventListener("click", (event) => {

        if (dropZone instanceof HTMLElement) {

            event.preventDefault();
            dropZone.classList.add("border-emerald-400", "bg-emerald-50");
          });
          dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("border-emerald-400", "bg-emerald-50");
          });
          dropZone.addEventListener("drop", async (event) => {
            event.preventDefault();
            dropZone.classList.remove("border-emerald-400", "bg-emerald-50");
            const files = await collectDroppedFiles(event.dataTransfer);
            if (!files.length) return;
            if (files.length === 1) {
              setSelectedUpload(files[0], files[0].name);
              return;
            }
            const root = files[0]?.webkitRelativePath?.split("/")?.[0] || "文件夹";
            setSelectedUpload(files, `${root}（${files.length} 个文件）`);
          });
          dropZone.addEventListener("click", (event) => {
            if (event.target?.closest?.('[data-action="pick-skill-file"], [data-action="pick-skill-folder"]')) {
              return;
            }
            fileInput?.click();
          });

        if (uploadBtn instanceof HTMLButtonElement) {

                  type="button"
                  class="inline-flex h-10 items-center gap-2 rounded-full border border-gray-200 bg-white px-4 text-[13px] text-gray-700 hover:bg-gray-50"
                >
                  <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4 shrink-0 text-gray-500" aria-hidden="true"><path d="M10 4.5l1 4h4l-3.2 2.4 1.2 3.9L10 12.8 7 14.8l1.2-3.9L5 8.5h4l1-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                  <span>自定义MCP工具</span>
                </button>
              </div>

              <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                ${links.map(cardHtml).join("")}
              </div>
            </div>
          </div>

          <div id="cloudLinksModal" class="pointer-events-none fixed inset-0 z-40 flex items-center justify-center bg-black/30 opacity-0 transition-all duration-200">
            <div class="w-[640px] rounded-2xl border border-gray-200 bg-white shadow-2xl">
              <div class="flex items-start justify-between px-6 pb-3 pt-5">
                <div>
                  <h2 class="text-[30px] font-semibold tracking-tight text-gray-900">MCP服务管理</h2>
                  <p class="mt-1 text-[13px] text-gray-500">安装MCP服务，为 AI 扩展更多工具能力</p>
                </div>
                <div class="flex items-center gap-3">
                  <button type="button" class="rounded-full border border-gray-200 px-4 py-1.5 text-[13px] text-gray-700 hover:bg-gray-50">配置MCP</button>
                  <button id="closeCloudLinksModal" type="button" class="text-[20px] text-gray-400 hover:text-gray-600">×</button>
                </div>
              </div>
              <div class="border-t border-gray-100 px-6 py-4">
                <div class="flex items-center gap-2">
                  <label class="flex h-9 flex-1 items-center rounded-lg border border-gray-200 bg-white px-3 text-[13px]">
                    <span class="text-gray-400">⌕</span>
                    <input type="text" placeholder="搜索服务器..." class="ml-2 w-full bg-transparent text-gray-700 placeholder:text-gray-400 focus:outline-none" />
                  </label>
                  <button type="button" class="h-9 rounded-full border border-gray-200 px-4 text-[13px] text-gray-700 hover:bg-gray-50">↗ MCP Hub</button>
                </div>

                <div class="mt-4 flex items-center justify-between text-[12px]">
                  <div class="font-medium text-gray-600">我的MCP工具 <span class="rounded-full bg-gray-100 px-1.5 py-0.5 text-[11px] text-gray-500">${mcpServersState.length}</span></div>
                  <div class="text-gray-400">${mcpServersState.length} 已配置</div>
                </div>

                <div class="mt-3 rounded-xl bg-gray-50 px-3 py-3">
                  <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                      <button type="button" class="text-gray-400">›</button>
                      <div class="grid h-8 w-8 place-items-center rounded-md bg-indigo-500 text-white">T</div>
                      <div>
                        <div class="text-[22px] font-medium text-gray-800">${mcpServersState[0]?.name || "暂无服务"}</div>
                        <div class="text-[12px] text-gray-500">${mcpServersState[0]?.transport || "请先配置 mcp.json"}</div>
                      </div>
                    </div>
                    <button type="button" class="relative h-7 w-12 rounded-full bg-emerald-500">
                      <span class="absolute right-1 top-1 h-5 w-5 rounded-full bg-white shadow-sm"></span>
                    </button>
                  </div>

                  <div class="mt-3 rounded-lg border border-red-200 bg-red-50 p-3">
                    <div class="text-[20px] text-red-500">MCP 配置来自后端 /api/mcp</div>
                    <div class="mt-2 flex items-center gap-4 text-[12px] text-gray-500">
                      <button type="button" class="hover:text-gray-700">↻ 重连</button>
                      <button type="button" class="hover:text-gray-700">⎘ 操作指引</button>
                      <button type="button" class="hover:text-gray-700">⎘ 复制日志</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

        const openModalBtn = document.getElementById("openCloudLinksModal");
        const closeModalBtn = document.getElementById("closeCloudLinksModal");
        const modal = document.getElementById("cloudLinksModal");

        const openModal = () => {
          if (!modal) return;
          modal.classList.remove("pointer-events-none", "opacity-0");
        };
        const closeModal = () => {
          if (!modal) return;
          modal.classList.add("pointer-events-none", "opacity-0");
        };

        if (openModalBtn) openModalBtn.addEventListener("click", openModal);
        if (closeModalBtn) closeModalBtn.addEventListener("click", closeModal);
      };

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const MAX_RECENT_SUMMON = 3;

      const getDefaultAssignee = () => ({
        type: "default",
        name: "AgentDesk企伴",
        subtitle: "单智能体 · 通用助手",
      });

      const assigneePickKey = (assignee) => `${assignee.type}:${assignee.name}`;

      const isSameAssignee = (a, b) =>
        Boolean(a && b && a.type === b.type && a.name === b.name);

      const getAssigneeDisplayLabel = (assignee) => {
        if (!assignee) return "AgentDesk企伴";
        if (assignee.type === "default") return "AgentDesk企伴";
        return assignee.name || "AgentDesk企伴";
      };

      const COMPOSER_SKILL_NONE = "不使用技能";

      const normalizeComposerSkillNamesFromState = (raw) => {
        const enabled = new Set(getEnabledInstalledSkillNames());
        if (Array.isArray(raw)) {
          const out = [];
          const seen = new Set();
          raw.forEach((name) => {
            const n = typeof name === "string" ? name.trim() : "";
            if (!n || !enabled.has(n) || seen.has(n)) return;
            seen.add(n);
            out.push(n);
          });
          return out;
        }
        if (typeof raw === "string" && raw.trim() && raw !== COMPOSER_SKILL_NONE && enabled.has(raw.trim())) {
          return [raw.trim()];
        }
        return [];
      };

      const getComposerSkillToolbarLabel = () => {
        if (!selectedComposerSkillNames.length) return COMPOSER_SKILL_NONE;
        if (selectedComposerSkillNames.length === 1) return selectedComposerSkillNames[0];
        if (selectedComposerSkillNames.length === 2) {
          return `${selectedComposerSkillNames[0]}、${selectedComposerSkillNames[1]}`;
        }
        return `技能·${selectedComposerSkillNames.length}`;
      };

      const isComposerSkillSelected = (name) => selectedComposerSkillNames.includes(name);

      const getEmployeeBoundSkillNamesFromApi = (assignee) => {
        if (!assignee || assignee.type !== "employee") return [];
        const emp =
          joinedEmployees.find((e) => e.name === assignee.name) ||
          plazaCardsData.find((c) => c.name === assignee.name);
        const raw = Array.isArray(emp?.skills) ? emp.skills : [];
        const enabled = new Set(getEnabledInstalledSkillNames());
        return raw.filter((name) => enabled.has(name));
      };

      const isLegacyAgentSkillMirror = (composerNames, assignee) => {
        const bound = getEmployeeBoundSkillNamesFromApi(assignee);
        if (!bound.length || !composerNames.length) return false;
        if (composerNames.length !== bound.length) return false;
        return (
          composerNames.every((n) => bound.includes(n)) && bound.every((n) => composerNames.includes(n))
        );
      };

      const refreshComposerSkillMenuUi = (scope = mainPanel) => {
        const root = scope || mainPanel;
        const label = root.querySelector("#selectedSkillLabel");
        if (label) label.textContent = getComposerSkillToolbarLabel();
        root.querySelectorAll("[data-skill-toggle]").forEach((row) => {
          const skillName = row.dataset.skillName || "";
          const check = row.querySelector("[data-skill-check]");
          if (!check) return;
          const on = isComposerSkillSelected(skillName);
          check.classList.toggle("invisible", !on);
          check.classList.toggle("text-emerald-500", on);
        });
        const clearRow = root.querySelector("[data-skill-clear]");
        if (clearRow) {
          const clearCheck = clearRow.querySelector("[data-skill-check]");
          if (clearCheck) {
            const empty = selectedComposerSkillNames.length === 0;
            clearCheck.classList.toggle("invisible", !empty);
            clearCheck.classList.toggle("text-emerald-500", empty);
          }
        }
      };

      const bindComposerSkillMenu = (scope = mainPanel) => {
        const root = scope || mainPanel;
        const skillBtn = root.querySelector("#skillBtn");
        const skillMenu = root.querySelector("#skillMenu");
        const modelModeMenu = root.querySelector("#modelModeMenu");
        if (!skillBtn || !skillMenu) return;

        skillBtn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          modelModeMenu?.classList.add("hidden");
          root.querySelector("#assigneeMenu")?.classList.add("hidden");
          skillMenu.classList.toggle("hidden");
        });

        skillMenu.querySelector("[data-skill-clear]")?.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          selectedComposerSkillNames = [];
          persistAppState();
          refreshComposerSkillMenuUi(root);
          scheduleContextBudgetRefresh(root);
        });

        skillMenu.querySelectorAll("[data-skill-toggle]").forEach((row) => {
          row.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const skillName = row.dataset.skillName || "";
            if (!skillName) return;
            const idx = selectedComposerSkillNames.indexOf(skillName);
            if (idx >= 0) {
              selectedComposerSkillNames = selectedComposerSkillNames.filter((n) => n !== skillName);
            } else {
              selectedComposerSkillNames = [...selectedComposerSkillNames, skillName];
            }
            persistAppState();
            refreshComposerSkillMenuUi(root);
            scheduleContextBudgetRefresh(root);
          });
        });

        refreshComposerSkillMenuUi(root);
        scheduleContextBudgetRefresh(root);
      };

      const sanitizeComposerState = () => {
        selectedAssignee = normalizeAssignee(selectedAssignee);
        if (!selectedModelName || !String(selectedModelName).trim()) {
          selectedModelName = "Auto";
        }
        const enabledSkills = new Set(getEnabledInstalledSkillNames());
        selectedComposerSkillNames = selectedComposerSkillNames.filter((name) =>
          enabledSkills.has(name),
        );
        if (!selectedWorkspaceName || !String(selectedWorkspaceName).trim()) {
          selectedWorkspaceName = "默认工作空间";
        }
      };

      const syncComposerToolbarLabels = (scope = mainPanel) => {
        sanitizeComposerState();
        const root = scope || mainPanel;
        const assigneeLabel = root.querySelector("#selectedAssigneeLabel");
        if (assigneeLabel) assigneeLabel.textContent = getAssigneeDisplayLabel(selectedAssignee);
        const modelLabel = root.querySelector("#selectedModelLabel");
        if (modelLabel) modelLabel.textContent = getComposerModelToolbarLabel();
        const skillLabel = root.querySelector("#selectedSkillLabel");
        if (skillLabel) skillLabel.textContent = getComposerSkillToolbarLabel();
        const workspaceLabel = root.querySelector("#selectedWorkspaceLabel");
        if (workspaceLabel) workspaceLabel.textContent = selectedWorkspaceName;
        const planToggle = root.querySelector("#planModeToggle");
        if (planToggle instanceof HTMLInputElement) {
          planToggle.checked = Boolean(planModeEnabled);
        }
      };

      const beginNewTaskSession = ({ resetComposer = true } = {}) => {
        activeTaskId = null;
        hasSubmittedFirstInput = false;
        hasCurrentTaskListed = false;
        currentPlanState = { status: "idle", tasks: [] };
        currentSkillWizard = null;
        activeComposerIntent = "normal";
        pendingComposerSkillTag = null;
        clearChatChoices();
        resetTaskStreamUiState();
        currentTurnRuntime = null;
        if (resetComposer) {
          selectedAssignee = getDefaultAssignee();
          selectedModelName = "Auto";
          modelAutoModeEnabled = true;
          selectedModelSlot = null;
          selectedComposerSkillNames = [];
          selectedWorkspaceName = "默认工作空间";
          planModeEnabled = false;
        } else {
          sanitizeComposerState();
        }
        persistAppState();
      };

      const findTeamByName = (name) => {
        const normalized = typeof name === "string" ? name.trim() : "";
        if (!normalized) return null;
        return teamCards.find((team) => team.name === normalized) || null;
      };

      const findTeamById = (teamId) => {
        const normalized = typeof teamId === "string" ? teamId.trim() : "";
        if (!normalized) return null;
        return teamCards.find((team) => team.id === normalized) || null;
      };

      const findEmployeeByName = (name) => {
        const joined = joinedEmployees.find((e) => e.name === name);
        if (joined) return joined;
        return plazaCardsData.find((c) => c.name === name);
      };

      const buildEmployeeAssignee = (card) => ({
        type: "employee",
        name: card.name,
        subtitle: (card.tags || []).slice(0, 2).join(" / ") || "单智能体",
        avatar: card.avatar || "🤖",
      });

      const buildTeamAssignee = (team) => ({
        type: "team",
        name: team.name,
        teamId: team.id,
        subtitle: (team.tags || []).slice(0, 3).join(" / ") || "多智能体团队",
        avatar: team.avatar || "🧠",
      });

      const normalizeAssignee = (raw, legacyName) => {
        if (raw && typeof raw === "object" && raw.type && raw.name) {
          if (raw.type === "team") {
            const team = findTeamById(raw.teamId) || findTeamByName(raw.name);
            if (team) return buildTeamAssignee(team);
            if (raw.name) {
              return {
                type: "team",
                name: raw.name,
                teamId: raw.teamId,
                subtitle: raw.subtitle || "多智能体团队",
                avatar: raw.avatar || "🧠",
              };
            }
          }
          if (raw.type === "employee") {
            const card = findEmployeeByName(raw.name);
            if (card) return buildEmployeeAssignee(card);
          }
          if (raw.type === "default") return getDefaultAssignee();
        }
        const legacy = legacyName || "不使用团队";
        if (legacy === "不使用团队") return getDefaultAssignee();
        const team = findTeamByName(legacy);
        if (team) return buildTeamAssignee(team);
        const card = findEmployeeByName(legacy);
        if (card) return buildEmployeeAssignee(card);
        return getDefaultAssignee();
      };

      const normalizeRecentSummons = (raw) => {
        const empty = { employee: [], team: [] };
        if (!raw || typeof raw !== "object") return empty;
        const fixList = (list, type) => {
          if (!Array.isArray(list)) return [];
          return list
            .map((item) => normalizeAssignee(item))
            .filter((item) => item.type === type)
            .slice(0, MAX_RECENT_SUMMON);
        };
        return {
          employee: fixList(raw.employee, "employee"),
          team: fixList(raw.team, "team"),
        };
      };

      const rememberRecentSummon = (assignee) => {
        if (!assignee || assignee.type === "default") return;
        const bucket = assignee.type === "team" ? "team" : "employee";
        const key = assigneePickKey(assignee);
        const list = (recentSummonExperts[bucket] || []).filter((item) => assigneePickKey(item) !== key);
        list.unshift({ ...assignee });
        recentSummonExperts[bucket] = list.slice(0, MAX_RECENT_SUMMON);
      };

      const applySelectedAssignee = (assignee, { remember = true } = {}) => {
        const composerSkillsSnapshot = [...selectedComposerSkillNames];
        selectedAssignee = normalizeAssignee(assignee);
        // 对话框技能与智能体绑定完全独立：切换智能体不得改写用户多选。
        // 若本地仍残留「与绑定列表完全一致」的旧版自动同步结果，则清空。
        if (isLegacyAgentSkillMirror(composerSkillsSnapshot, selectedAssignee)) {
          selectedComposerSkillNames = [];
        } else {
          selectedComposerSkillNames = composerSkillsSnapshot;
        }
        if (remember && selectedAssignee.type !== "default") {
          rememberRecentSummon(selectedAssignee);
        }
        persistAppState();
        syncComposerToolbarLabels();
        scheduleContextBudgetRefresh(mainPanel);
        return selectedAssignee;
      };

      const renderAgentDeskBrandIconHtml = (px = 32) => {
        const logo =
          document.getElementById("agentdesk-brand-icon")?.src || "agentdesk-icon.svg";
        const radius = Math.round(px * 0.28);
        return `<img src="${logo}" alt="" width="${px}" height="${px}" class="shrink-0 object-contain" style="border-radius:${radius}px" />`;
      };

      const renderAssigneeIcon = (avatar, assigneeName = "") => {
        if (
          assigneeName === "AgentDesk企伴" ||
          assigneeName === "AgentDesk" ||
          assigneeName === "Default Agent"
        ) {
          return `<span class="grid h-8 w-8 shrink-0 place-items-center">${renderAgentDeskBrandIconHtml(32)}</span>`;
        }
        const safe = escapeHtml(avatar || "🤖");
        return `<span class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-[#fafafa] text-[15px] ring-1 ring-gray-100">${safe}</span>`;
      };

      const renderAssigneePickRow = (assignee, { checked = false } = {}) => {
        const isChecked =
          checked || isSameAssignee(assignee, selectedAssignee);
        return `
          <button
            type="button"
            data-assignee-pick
            data-assignee-type="${escapeHtml(assignee.type)}"
            data-assignee-name="${escapeHtml(assignee.name)}"
            data-assignee-team-id="${escapeHtml(assignee.teamId || "")}"
            data-assignee-subtitle="${escapeHtml(assignee.subtitle || "")}"
            data-assignee-avatar="${escapeHtml(assignee.avatar || "🤖")}"
            class="flex w-full items-center gap-2.5 rounded-lg px-2 py-2 text-left hover:bg-gray-50 ${isChecked ? "bg-gray-50" : ""}"
          >
            ${renderAssigneeIcon(assignee.avatar, assignee.name)}
            <span class="min-w-0 flex-1">
              <span class="block truncate text-[13px] font-medium text-gray-900">${escapeHtml(assignee.name)}</span>
              <span class="block truncate text-[11px] text-gray-500">${escapeHtml(assignee.subtitle || "")}</span>
            </span>
            <span data-assignee-check class="${isChecked ? "text-emerald-500" : "invisible"}">✓</span>
          </button>
        `;
      };

      const renderRecentSummonBlock = (category) => {
        const title = category === "team" ? "多智能体团队" : "单智能体";
        const list = recentSummonExperts[category] || [];
        const summonTarget = category === "team" ? "team" : "plaza";
        const rows =
          list.length > 0
            ? list.map((item) => renderAssigneePickRow(item)).join("")
            : `<div class="px-2 py-2 text-[11px] text-gray-400">暂无最近使用，点击下方去召唤</div>`;
        const defaultRow =
          category === "employee"
            ? renderAssigneePickRow(getDefaultAssignee(), {
                checked: selectedAssignee.type === "default",
              })
            : "";
        return `
          <div class="mb-2">
            <div class="px-2 py-1 text-[12px] font-medium text-gray-700">${title}</div>
            <div class="px-2 pb-1 text-[11px] text-gray-400">最近召唤专家</div>
            ${defaultRow}
            ${rows}
            <button
              type="button"
              data-assignee-summon="${summonTarget}"
              class="mt-1 flex w-full cursor-pointer items-center gap-2 rounded-lg px-2 py-2 text-left text-[12px] text-emerald-700 hover:bg-emerald-50"
            >
              <span class="grid h-6 w-6 place-items-center rounded-full bg-emerald-50 text-emerald-600">
                <svg viewBox="0 0 20 20" fill="none" class="h-3.5 w-3.5" aria-hidden="true"><path d="M10 3l1.4 4.3L15.5 8l-4.1 1.4L10 13.5 8.6 9.4 4.5 8l4.1-1.4L10 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
              </span>
              <span>召唤其它专家</span>
            </button>
          </div>
        `;
      };

      const buildComposerModelOptions = (providers) => {
        const options = [];
        (providers || []).forEach((provider) => {
          const configured =
            Boolean(provider.api_key_configured) || !provider.require_api_key;
          (provider.models || []).forEach((model) => {
            const modelId = String(model.id || model.name || "").trim();
            if (!modelId) return;
            options.push({
              providerId: provider.id,
              modelId,
              displayName: String(model.name || modelId).trim(),
              providerName: String(provider.name || provider.id).trim(),
              configured,
              value: `${provider.id}::${modelId}`,
            });
          });
        });
        return options;
      };

      const getComposerModelToolbarLabel = () => {
        if (modelAutoModeEnabled || !selectedModelSlot) return "Auto";
        return selectedModelName || selectedModelSlot.modelId || "Auto";
      };

      const isComposerModelOptionActive = (option) =>
        !modelAutoModeEnabled
        && selectedModelSlot
        && option.providerId === selectedModelSlot.providerId
        && option.modelId === selectedModelSlot.modelId;

      const syncComposerModelFromConfig = (configSnapshot) => {
        composerModelConfigSnapshot = configSnapshot;
        composerModelOptions = buildComposerModelOptions(configSnapshot?.providers);
        const active = configSnapshot?.active_model;
        if (active?.provider_id && active?.model) {
          selectedModelSlot = {
            providerId: active.provider_id,
            modelId: active.model,
          };
          const match = composerModelOptions.find(
            (option) =>
              option.providerId === active.provider_id && option.modelId === active.model,
          );
          selectedModelName = match ? match.displayName : active.model;
          modelAutoModeEnabled = false;
          return;
        }
        if (modelAutoModeEnabled) {
          selectedModelName = "Auto";
          selectedModelSlot = null;
        }
      };

      const loadComposerModelConfig = async () => {
        try {
          const config = await window.AgentDeskAPI.getConfig();
          syncComposerModelFromConfig(config);
          return config;
        } catch (_) {
          return null;
        }
      };

      const applyComposerModelSelection = async ({ autoMode, option }) => {
        if (autoMode) {
          modelAutoModeEnabled = true;
          selectedModelName = "Auto";
          selectedModelSlot = null;
          persistAppState();
          refreshModelModeMenuUi();
          syncComposerToolbarLabels();
          return;
        }
        if (!option?.configured) return;
        modelAutoModeEnabled = false;
        try {
          const result = await apiCall(
            () => window.AgentDeskAPI.setActiveModel(option.providerId, option.modelId),
            "切换模型失败",
          );
          selectedModelSlot = {
            providerId: option.providerId,
            modelId: option.modelId,
          };
          selectedModelName = option.displayName;
          if (composerModelConfigSnapshot) {
            composerModelConfigSnapshot.active_model = result.active_model || {
              provider_id: option.providerId,
              model: option.modelId,
            };
            composerModelConfigSnapshot.model_ready = Boolean(result.model_ready);
          }
          await window.AgentDeskAPI.probe();
        } catch (_) {
          return;
        }
        persistAppState();
        refreshModelModeMenuUi();
        syncComposerToolbarLabels();
      };

      const renderModelModeMenuHtml = () => {
        const usableOptions = composerModelOptions.filter((option) => option.configured);
        const autoActive = modelAutoModeEnabled || !selectedModelSlot;
        const autoToggleClass = modelAutoModeEnabled ? "bg-emerald-500" : "bg-gray-200";
        const autoKnobClass = modelAutoModeEnabled ? "left-[18px]" : "left-0.5";
        return `
        <div
          id="modelModeMenu"
          class="absolute bottom-[calc(100%+10px)] left-14 z-[60] hidden max-h-[320px] w-[280px] overflow-y-auto rounded-xl border border-gray-200 bg-white p-2 text-[12px] text-gray-700 shadow-[0_14px_35px_rgba(0,0,0,0.12)]"
        >
          <div class="mb-2 flex items-center justify-between rounded-md px-2 py-1.5 hover:bg-gray-50">
            <span class="text-[13px] text-gray-700">自动模式</span>
            <button
              type="button"
              data-model-auto-toggle
              aria-pressed="${modelAutoModeEnabled ? "true" : "false"}"
              class="relative h-5 w-9 rounded-full ${autoToggleClass}"
            >
              <span class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow-sm transition-all ${autoKnobClass}"></span>
            </button>
          </div>
          <div class="mb-1 border-t border-gray-100 pt-1.5 text-[12px] text-gray-500">已配置模型</div>
          <button
            type="button"
            data-model-auto

      const renderSkillMenuHtml = () => {

          ${

                  class="flex w-full cursor-pointer items-center justify-between rounded-md px-2 py-1.5 text-left hover:bg-gray-50"

      const CONTEXT_BUDGET_COLORS = {
        system: "#8c8c8c",
        tools: "#722ed1",
        skills: "#faad14",
        summary: "#52c41a",
        conversation: "#d46b08",
        draft: "#eb2f96",
        plan: "#1677ff",
      };

      let contextBudgetTimer = null;
      let contextBudgetCache = null;

      const formatContextBudgetK = (n) => {
        const v = Number(n) || 0;
        if (v >= 1000) return `${(v / 1000).toFixed(1)}K`;
        return String(v);
      };

      const contextBudgetRingGradient = (segments, limit) => {
        if (!segments?.length || !limit) return "#e5e7eb";
        let cursor = 0;
        const stops = [];
        for (const seg of segments) {
          const pct = Math.min(100, (seg.tokens / limit) * 100);
          const color = CONTEXT_BUDGET_COLORS[seg.key] || "#bfbfbf";
          const start = cursor;
          cursor += pct;
          stops.push(`${color} ${start}% ${cursor}%`);
        }
        if (cursor < 100) stops.push(`#e5e7eb ${cursor}% 100%`);
        return `conic-gradient(${stops.join(", ")})`;
      };

      const contextBudgetMonoRingGradient = (percent) => {
        const p = Math.min(100, Math.max(0, Number(percent) || 0));
        if (p <= 0) return "#f3f4f6";
        if (p >= 85) {
          return `conic-gradient(#9ca3af 0% ${p}%, #f3f4f6 ${p}% 100%)`;
        }
        return `conic-gradient(#d1d5db 0% ${p}%, #f3f4f6 ${p}% 100%)`;
      };

      const taskHasConversationForBudget = (taskId) => {
        const task = getTaskById(taskId);
        if (!task || !Array.isArray(task.messages)) return false;
        return task.messages.some((m) => String(m?.content || "").trim().length > 0);
      };

      const setContextBudgetWrapVisible = (ringEl, visible) => {
        const wrap = ringEl?.closest(".wm-context-budget-wrap");
        if (!wrap) return;
        wrap.classList.toggle("wm-context-budget-wrap--hidden", !visible);
        wrap.classList.toggle("wm-context-budget-wrap--visible", visible);
        ringEl.setAttribute("aria-hidden", visible ? "false" : "true");
        ringEl.tabIndex = visible ? 0 : -1;
      };

      const renderContextBudgetPopoverHtml = (budget, { hidden = false, error = false } = {}) => {
        if (hidden) {
          return `<div class="font-medium text-gray-800">上下文占用</div>
            <p class="mt-1 text-[11px] text-gray-500">开始对话后将显示窗口占用比例。</p>`;
        }
        if (error) {
          return `<div class="font-medium text-gray-800">上下文占用</div>
            <p class="mt-1 text-[11px] text-gray-500">估算失败，请确认后端已重启并包含 /context/budget 接口。</p>`;
        }
        if (!budget) {
          return `<div class="text-[11px] text-gray-500">加载中…</div>`;
        }
        const segs = budget.segments || [];
        const list = segs.length
          ? `<ul class="mt-2 space-y-1 p-0 list-none">
              ${segs
                .map((s) => {
                  const inactive = !s.tokens;
                  return `<li class="flex items-center justify-between gap-2 ${inactive ? "opacity-45" : ""}">
                    <span class="flex items-center gap-1.5 min-w-0">
                      <span class="inline-block h-2 w-2 shrink-0 rounded-sm" style="background:${inactive ? "#e5e7eb" : CONTEXT_BUDGET_COLORS[s.key] || "#bfbfbf"}"></span>
                      <span class="truncate">${escapeHtml(s.label)}</span>
                    </span>
                    <span class="shrink-0 tabular-nums ${inactive ? "text-gray-300" : "text-gray-400"}">${formatContextBudgetK(s.tokens)}</span>
                  </li>`;
                })
                .join("")}
            </ul>`
          : `<p class="mt-1 text-[11px] text-gray-500">暂无分项</p>`;
        return `<div class="font-medium text-gray-800">上下文占用（估算）</div>
          <p class="mt-0.5 text-[11px] text-gray-500">${formatContextBudgetK(budget.used_tokens)} / ${formatContextBudgetK(budget.context_limit)} · ${budget.percent}%</p>
          ${list}
          <p class="mt-2 text-[10px] text-gray-400">${escapeHtml(budget.estimate_note || "")}</p>`;
      };

      const paintContextBudgetRing = (
        ringEl,
        budget,
        { loading = false, hidden = false, error = false } = {},
      ) => {
        if (!ringEl) return;
        const pop = ringEl.closest(".wm-context-budget-wrap")?.querySelector(".wm-context-budget-popover");
        if (pop) pop.innerHTML = renderContextBudgetPopoverHtml(budget, { hidden, error });

        const donut = ringEl.querySelector(".wm-context-budget-ring__donut");
        const inner = ringEl.querySelector(".wm-context-budget-ring__inner");
        if (!donut || !inner) return;

        if (hidden) {
          setContextBudgetWrapVisible(ringEl, false);
          return;
        }

        setContextBudgetWrapVisible(ringEl, true);

        inner.textContent = "";
        if (loading) {
          const pct = contextBudgetCache?.percent || 0;
          donut.style.background = contextBudgetMonoRingGradient(pct);
          donut.classList.toggle("wm-context-budget-ring__donut--warn", pct >= 85);
          return;
        }
        if (error) {
          donut.style.background = "#f3f4f6";
          donut.classList.remove("wm-context-budget-ring__donut--warn");
          return;
        }
        const pct = budget?.percent || 0;
        donut.style.background = contextBudgetMonoRingGradient(pct);
        donut.classList.toggle("wm-context-budget-ring__donut--warn", pct >= 85);
        if (pop && budget) {
          pop.innerHTML = renderContextBudgetPopoverHtml(budget, { error: false });
        }
      };

      const getContextBudgetDraftFromScope = (scope) => {
        const chat = scope?.querySelector("#chatComposerInput");
        const home = scope?.querySelector("#taskInput");
        if (currentView === "task-conversation" && chat instanceof HTMLTextAreaElement) {
          return chat.value;
        }
        if (home instanceof HTMLTextAreaElement) return home.value;
        return "";
      };

      const buildContextBudgetRequestBody = (draft) => {
        const assignee = normalizeAssignee(selectedAssignee);
        const useTeam = assignee.type === "team";
        return {
          message: draft || "",
          employee_name: assignee.type === "employee" ? assignee.name : null,
          skill_names: [...selectedComposerSkillNames],
          mode: useTeam ? "team" : "single",
          chat_mode: planModeEnabled ? "plan" : "chat",
        };
      };

      const refreshContextBudgetUi = async (scope) => {
        const root = scope || mainPanel;
        const ring = root.querySelector("#wmContextBudgetRing");
        if (!ring) return;
        const taskId = activeTaskId;
        if (!taskId || !taskHasConversationForBudget(taskId)) {
          contextBudgetCache = null;
          paintContextBudgetRing(ring, null, { hidden: true });
          return;
        }
        paintContextBudgetRing(ring, contextBudgetCache, { loading: true });
        try {
          const draft = getContextBudgetDraftFromScope(root);
          const data = await window.AgentDeskAPI.previewTaskContextBudget(
            taskId,
            buildContextBudgetRequestBody(draft)
          );
          contextBudgetCache = data;
          paintContextBudgetRing(ring, data);
        } catch {
          paintContextBudgetRing(ring, null, { error: true });
        }
      };

      const scheduleContextBudgetRefresh = (scope) => {
        if (contextBudgetTimer) clearTimeout(contextBudgetTimer);
        contextBudgetTimer = setTimeout(() => {
          void refreshContextBudgetUi(scope || mainPanel);
        }, 450);
      };

      const setupContextBudgetUi = (scope) => {
        const root = scope || mainPanel;
        const ring = root.querySelector("#wmContextBudgetRing");
        if (!ring) return;
        scheduleContextBudgetRefresh(root);
        ["#chatComposerInput", "#taskInput"].forEach((sel) => {
          const el = root.querySelector(sel);
          if (!(el instanceof HTMLTextAreaElement) || el.dataset.ctxBudgetBound) return;
          el.dataset.ctxBudgetBound = "1";
          el.addEventListener("input", () => scheduleContextBudgetRefresh(root));
        });
        const planToggle = root.querySelector("#planModeToggle");
        if (planToggle instanceof HTMLInputElement && !planToggle.dataset.ctxBudgetBound) {
          planToggle.dataset.ctxBudgetBound = "1";
          planToggle.addEventListener("change", () => scheduleContextBudgetRefresh(root));
        }
      };

      const renderComposerToolbarHtml = ({
        submitButtonId = "submitInputBtn",
        submitDisabled = false,
        submitLabel = "发送",
      } = {}) => `
        <div class="wm-composer-toolbar mt-3 flex flex-nowrap items-center gap-2 border-t border-gray-100 pt-3 text-[12px] text-gray-500">
          <div class="wm-composer-toolbar__left relative flex min-w-0 flex-1 flex-nowrap items-center">
            <div class="wm-composer-toolbar__scroll flex min-w-0 flex-1 flex-nowrap items-center gap-1 overflow-x-auto">
              <button
                id="assigneeBtn"
                type="button"
                class="wm-composer-toolbar-btn inline-flex shrink-0 cursor-pointer items-center gap-1.5 whitespace-nowrap rounded-lg px-2 py-1 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
              >
                <span id="selectedAssigneeIcon" class="shrink-0">${selectedAssignee.type === "default" ? renderAgentDeskBrandIconHtml(16) : renderAssigneeIcon(selectedAssignee.avatar, selectedAssignee.name)}</span>
                <span id="selectedAssigneeLabel" class="max-w-[9rem] truncate">${escapeHtml(getAssigneeDisplayLabel(selectedAssignee))}</span>
              </button>
              <button
                id="modelModeBtn"

                class="wm-composer-toolbar-btn inline-flex shrink-0 cursor-pointer items-center gap-1.5 whitespace-nowrap rounded-lg px-2 py-1 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
              >
                <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4 shrink-0" aria-hidden="true">
                  <path d="M4 6h12M4 10h8M4 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="selectedModelLabel" class="max-w-[8rem] truncate">${escapeHtml(getComposerModelToolbarLabel())}</span>
              </button>
              <button
                id="skillBtn"
                type="button"
                class="wm-composer-toolbar-btn inline-flex shrink-0 cursor-pointer items-center gap-1.5 whitespace-nowrap rounded-lg px-2 py-1 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
              >
                <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4 shrink-0" aria-hidden="true">
                  <path d="M7.5 3.5l-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3zM14 10l-.8 2.4L11 13l2.2.6L14 16l.8-2.4L17 13l-2.2-.6L14 10z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                <span id="selectedSkillLabel" class="max-w-[7rem] truncate">${escapeHtml(getComposerSkillToolbarLabel())}</span>
              </button>
            </div>
            ${renderModelModeMenuHtml()}

            ${renderSkillMenuHtml()}
          </div>
          <div class="flex shrink-0 flex-nowrap items-center gap-1.5 border-l border-gray-100 pl-2">
            <label class="inline-flex shrink-0 cursor-pointer items-center gap-1.5 whitespace-nowrap rounded-lg px-2 py-1 text-gray-600 hover:bg-gray-100">
              <input id="planModeToggle" type="checkbox" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500" ${planModeEnabled ? "checked" : ""} />
              <span>计划模式</span>
            </label>
            <button
              type="button"
              id="workspaceBtn"
              class="wm-composer-toolbar-btn inline-flex shrink-0 cursor-pointer items-center gap-1 whitespace-nowrap rounded-lg px-2 py-1 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
              title="工作空间"
            >
              <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4 shrink-0" aria-hidden="true">
                <path d="M3.5 6.5A1.5 1.5 0 015 5h10a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0115 16H5a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 8h6M7 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span id="selectedWorkspaceLabel" class="max-w-[6rem] truncate">${escapeHtml(selectedWorkspaceName)}</span>
            </button>
            <div class="wm-context-budget-wrap wm-context-budget-wrap--hidden relative shrink-0">
              <div class="wm-context-budget-popover" aria-hidden="true"></div>
              <button
                type="button"
                id="wmContextBudgetRing"
                class="wm-context-budget-ring"
                aria-label="上下文窗口占用"
                aria-hidden="true"

                  <span class="wm-context-budget-ring__inner"></span>
                </span>
              </button>
            </div>
            <button
              id="${submitButtonId}"
              type="button"
              class="wm-composer-send wm-composer-send--send inline-flex shrink-0 cursor-pointer items-center justify-center gap-1.5 whitespace-nowrap rounded-xl px-3.5 py-1.5 text-[13px] font-medium shadow-sm transition-colors duration-200 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-500 disabled:cursor-not-allowed disabled:opacity-45"
              data-composer-mode="send"
              aria-label="发送消息"
              ${submitDisabled ? "disabled" : ""}
            >
              <span data-composer-send-label class="wm-composer-send__label">${submitLabel}</span>
              <svg data-composer-send-icon="send" viewBox="0 0 20 20" fill="none" class="h-4 w-4 shrink-0" aria-hidden="true">
                <path d="M4 10h10M11 6l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg data-composer-send-icon="stop" viewBox="0 0 20 20" fill="none" class="wm-composer-send__stop-icon hidden" aria-hidden="true">
                <rect x="6" y="6" width="8" height="8" rx="1.5" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
      `;

      const renderAssigneeMenuHtml = () => `
        <div
          id="assigneeMenu"
          class="absolute bottom-[calc(100%+10px)] left-0 z-[60] hidden w-[300px] max-h-[min(420px,52vh)] overflow-y-auto rounded-xl border border-gray-200 bg-white p-2 text-[12px] text-gray-700 shadow-[0_14px_35px_rgba(0,0,0,0.12)] scrollbar-hide"
        >
          ${renderRecentSummonBlock("employee")}
          <div class="my-2 border-t border-gray-100"></div>
          ${renderRecentSummonBlock("team")}
        </div>
      `;

      const refreshAssigneeMenuUi = (root) => {
        const scope = root || mainPanel;
        const label = scope.querySelector("#selectedAssigneeLabel");
        if (label) label.textContent = getAssigneeDisplayLabel(selectedAssignee);
        const menu = scope.querySelector("#assigneeMenu");
        if (menu) {
          const parent = menu.parentElement;
          const wasOpen = !menu.classList.contains("hidden");
          menu.outerHTML = renderAssigneeMenuHtml();
          const nextMenu = parent?.querySelector("#assigneeMenu");
          if (nextMenu && wasOpen) nextMenu.classList.remove("hidden");
        }
      };

      const bindAssigneeMenuInteractions = (root) => {
        const scope = root || mainPanel;
        const assigneeBtn = scope.querySelector("#assigneeBtn");
        const assigneeMenu = scope.querySelector("#assigneeMenu");
        const modelModeMenu = scope.querySelector("#modelModeMenu");
        const skillMenu = scope.querySelector("#skillMenu");

        if (assigneeBtn && assigneeMenu && !assigneeBtn.dataset.boundToggle) {
          assigneeBtn.dataset.boundToggle = "1";
          assigneeBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (modelModeMenu) modelModeMenu.classList.add("hidden");
            if (skillMenu) skillMenu.classList.add("hidden");
            scope.querySelector("#assigneeMenu")?.classList.toggle("hidden");
          });
        }

        if (!scope.dataset.assigneeDelegateBound) {
          scope.dataset.assigneeDelegateBound = "1";
          scope.addEventListener("click", (event) => {
            const pickBtn = event.target.closest("[data-assignee-pick]");
            if (pickBtn && scope.contains(pickBtn)) {
              event.preventDefault();
              event.stopPropagation();
              const assignee = normalizeAssignee({
                type: pickBtn.dataset.assigneeType,
                name: pickBtn.dataset.assigneeName,
                teamId: pickBtn.dataset.assigneeTeamId || undefined,
                subtitle: pickBtn.dataset.assigneeSubtitle,
                avatar: pickBtn.dataset.assigneeAvatar,
              });
              applySelectedAssignee(assignee);
              const label = scope.querySelector("#selectedAssigneeLabel");
              if (label) label.textContent = getAssigneeDisplayLabel(selectedAssignee);
              refreshAssigneeMenuUi(scope);
              scope.querySelector("#assigneeMenu")?.classList.add("hidden");
              return;
            }

            const summonBtn = event.target.closest("[data-assignee-summon]");
            if (summonBtn && scope.contains(summonBtn)) {
              event.preventDefault();
              event.stopPropagation();
              scope.querySelector("#assigneeMenu")?.classList.add("hidden");
              if (summonBtn.dataset.assigneeSummon === "team") {
                setActiveNav("team");
                renderMyTeamPage();
                return;
              }
              setActiveNav("digital-plaza");
              renderDigitalEmployeePlaza();
            }
          });
        }
      };

      const navigateToChatWithAssignee = (assignee) => {
        beginNewTaskSession({ resetComposer: false });
        applySelectedAssignee(assignee);
        hasRenderedTaskHome = true;
        syncTaskRouteToUrl(null);
        renderNewTaskHome();
        if (!taskExpanded) {
          taskExpanded = true;
          taskList.classList.remove("hidden");
          taskChevron.classList.remove("-rotate-90");
        }
      };

      const bindDispatchTaskButtons = (root) => {
        root.querySelectorAll('[data-action="dispatch-task"]').forEach((button) => {
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const type = button.dataset.assigneeType;
            const name = button.dataset.assigneeName;
            if (!name || !type) return;
            let assignee;
            if (type === "team") {
              const team =
                findTeamById(button.dataset.assigneeTeamId) || findTeamByName(name);
              if (!team) return;
              assignee = buildTeamAssignee(team);
            } else {
              const card = findEmployeeByName(name);
              if (!card) return;
              assignee = buildEmployeeAssignee(card);
            }
            navigateToChatWithAssignee(assignee);
          });
        });
      };

      const getTeamByName = (teamName) => teamCards.find((team) => team.name === teamName);

      const WM_BRAND_NAME = "AgentDesk企伴";

      const getAgentDeskLogoSrc = () =>
        document.getElementById("agentdesk-brand-icon")?.src || "agentdesk-icon.svg";

      const stripSenderRoleSuffix = (label) =>
        String(label || "")
          .trim()
          .replace(/\s*[\(（](Leader|队长)[\)）]\s*$/i, "")
          .trim();

      const isAgentDeskSenderLabel = (label) => {
        const s = String(label || "").trim();
        return !s || s === WM_BRAND_NAME || s === "AgentDesk企伴";
      };

      const resolveChatSenderBrand = (senderLabel) => {
        const raw = String(senderLabel || "").trim();
        if (isAgentDeskSenderLabel(raw)) return { kind: "agentdesk" };
        if (raw === "skill-creator") return { kind: "plain", label: raw };

        const isLeader = /\(Leader\)|（Leader）|队长|Leader/i.test(raw);
        const employeeName = stripSenderRoleSuffix(raw);

        if (raw === "团队") {
          if (selectedAssignee?.type === "team") {
            return {
              kind: "agent",
              avatar: selectedAssignee.avatar || "🧠",
              label: selectedAssignee.name || "团队",
              isLeader: false,
            };
          }
          return { kind: "agent", avatar: "🧠", label: "团队", isLeader: false };
        }

        const employee = findEmployeeByName(employeeName);
        if (employee) {
          return {
            kind: "agent",
            avatar: employee.avatar || "🤖",
            label: raw,
            isLeader,
          };
        }

        if (selectedAssignee?.type === "employee" && selectedAssignee.name === employeeName) {
          return {
            kind: "agent",
            avatar: selectedAssignee.avatar || "🤖",
            label: raw,
            isLeader,
          };
        }

        return {
          kind: "agent",
          avatar: "🤖",
          label: raw,
          isLeader,
        };
      };

      const renderChatAgentBrandHtml = (brand) => `
        <div class="mb-1">
          <span class="wm-chat-brand">
            <span class="wm-chat-icon-wrap">
              <span class="wm-chat-avatar-emoji" aria-hidden="true">${escapeHtml(brand.avatar)}</span>
            </span>
            <span class="wm-chat-brand-text${brand.isLeader ? " wm-chat-brand-text--leader" : ""}">${escapeHtml(brand.label)}</span>
          </span>
        </div>
      `;

      const renderMessageLabelHtml = (message) => {
        if (message.role === "user") {
          return '<div class="mb-1 text-right text-[11px] text-gray-400">你</div>';
        }
        if (message.role === "system") {
          return '<div class="mb-1 text-[11px] text-gray-400">系统</div>';
        }
        const senderLabel = String(message.sender || "").trim();
        const brand = resolveChatSenderBrand(senderLabel);
        if (brand.kind === "agent") {
          return renderChatAgentBrandHtml(brand);
        }
        if (brand.kind === "plain") {
          return `<div class="mb-1 text-[11px] font-medium text-gray-600">${escapeHtml(brand.label)}</div>`;
        }
        const logo = getAgentDeskLogoSrc();
        return `
          <div class="mb-1">
            <span class="wm-chat-brand">
              <span class="wm-chat-icon-wrap">
                <img src="${logo}" alt="" class="wm-chat-icon" />
              </span>
              <span class="wm-chat-brand-text">${WM_BRAND_NAME}</span>
            </span>
          </div>
        `;
      };

      /** Keep the in-flight assistant bubble bound to streamingAssistantMsgRef after merges. */
      const rebindStreamingAssistantMsg = (messages) => {
        if (!streamingAssistantMsgRef) return messages;
        const list = Array.isArray(messages) ? messages : [];
        for (let i = list.length - 1; i >= 0; i -= 1) {
          if (list[i]?.role === "assistant") {
            list[i] = streamingAssistantMsgRef;
            return list;
          }
        }
        list.push(streamingAssistantMsgRef);
        return list;
      };

      const syncStreamingAssistantIntoTask = (task) => {
        if (!task || !streamingAssistantMsgRef || !isTaskStreamingNow(task.id)) return;
        if (!Array.isArray(task.messages)) task.messages = [];
        if (teamStreamActive && teamStreamAssistant) {
          if (!task.messages.includes(teamStreamAssistant)) {
            task.messages.push(teamStreamAssistant);
          }
          return;
        }
        rebindStreamingAssistantMsg(task.messages);
      };

      const cloneOrPreserveStreamingMessage = (localMsg) =>
        streamingAssistantMsgRef && localMsg === streamingAssistantMsgRef
          ? localMsg
          : cloneTaskMessage(localMsg);

      const syncTaskMessages = (task, apiMessages) => {
        if (isTaskStreaming && streamingAssistantMsgRef && streamingTaskId === task.id) {
          const prev = task.messages || [];
          const merged = mergeTaskMessages(prev, apiMessages || []);
          rebindStreamingAssistantMsg(merged);
          task.messages = merged;
          return;
        }
        const prev = task.messages || [];
        task.messages = mergeTaskMessages(prev, apiMessages || []);
        syncStreamingAssistantIntoTask(task);
      };

      const findLastUserMessageIdx = (messages) => {
        let idx = -1;
        (messages || []).forEach((msg, i) => {
          if (msg?.role === "user") idx = i;
        });
        return idx;
      };

      const pickTeamTurnMessagesPreservingContent = (merged, sanitized) => {
        const mergedUserIdx = findLastUserMessageIdx(merged);
        const sanitizedUserIdx = findLastUserMessageIdx(sanitized);
        if (mergedUserIdx < 0) return sanitized;
        const mergedTail = merged.slice(mergedUserIdx + 1);
        const sanitizedTail =
          sanitizedUserIdx >= 0 ? sanitized.slice(sanitizedUserIdx + 1) : [];
        const mergedHasAssistant = mergedTail.some(
          (m) => m?.role === "assistant" && messageBodyLen(m) > 0,
        );
        const sanitizedHasAssistant = sanitizedTail.some(
          (m) => m?.role === "assistant" && messageBodyLen(m) > 0,
        );
        if (mergedHasAssistant && !sanitizedHasAssistant) {
          const head = sanitizedUserIdx >= 0 ? sanitized.slice(0, sanitizedUserIdx + 1) : [];
          return dedupeAdjacentAssistantMessages([...head, ...mergedTail]);
        }
        return sanitized;
      };

      /** Team done: merge server history with live stream, then sanitize. */
      const syncTeamDoneMessages = (task, apiMessages) => {
        const merged = mergeTaskMessages(task.messages || [], apiMessages || [], {
          coalesce: false,
        });
        const sanitized = streamTurnReducer?.sanitizeTeamTurnMessages
          ? streamTurnReducer.sanitizeTeamTurnMessages(merged)
          : merged;
        task.messages = pickTeamTurnMessagesPreservingContent(merged, sanitized);
        clearStreamingAssistantRef();
        teamStreamAssistant = null;
      };

      const cloneTaskMessage = (m) => ({
        ...(m.id != null ? { id: m.id } : {}),
        role: m.role,
        content: m.content || "",
        sender: m.sender,
        ...(m.streaming ? { streaming: true } : {}),
        ...(m.updatedAt != null ? { updatedAt: m.updatedAt } : {}),
        ...(Array.isArray(m.artifacts) && m.artifacts.length ? { artifacts: [...m.artifacts] } : {}),
        ...(m.runtime ? { runtime: JSON.parse(JSON.stringify(m.runtime)) } : {}),
      });

      const mapApiMessage = (m, prev) => ({
        ...(m.id != null ? { id: m.id } : {}),
        role: m.role,
        content:
          m.role === "user"
            ? extractOriginalUserTaskFromMessage(m.content)
            : m.content,
        sender: m.sender,
        ...(m.streaming ? { streaming: true } : {}),
        ...(m.updatedAt != null ? { updatedAt: m.updatedAt } : {}),
        ...(Array.isArray(m.artifacts) && m.artifacts.length
          ? { artifacts: m.artifacts }
          : prev?.artifacts
            ? { artifacts: prev.artifacts }
            : {}),
        ...(m.runtime
          ? { runtime: m.runtime }
          : prev?.runtime
            ? { runtime: prev.runtime }
            : {}),
      });
