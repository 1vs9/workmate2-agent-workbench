              </div>
            </div>
          </div>
        `;

        const modal = document.getElementById("addAutomationModal");
        const openBtn = document.getElementById("openAddAutomationBtn");
        const cancelBtn = document.getElementById("cancelAddAutomationBtn");
        const submitBtn = document.getElementById("submitAddAutomationBtn");
        const nameInput = document.getElementById("automationNameInput");
        const workspaceInput = document.getElementById("automationWorkspaceInput");
        const timeInput = document.getElementById("automationTimeInput");
        const periodicUnit = document.getElementById("automationPeriodicUnit");
        const scheduleTabs = document.getElementById("automationScheduleTabs");
        const panelPeriodic = document.getElementById("automationSchedulePeriodic");
        const panelInterval = document.getElementById("automationScheduleInterval");
        const panelOnce = document.getElementById("automationScheduleOnce");
        const intervalAmount = document.getElementById("automationIntervalAmount");
        const intervalUnit = document.getElementById("automationIntervalUnit");
        const onceDatetime = document.getElementById("automationOnceDatetime");

        let scheduleMode = "periodic";

        const setScheduleMode = (mode) => {
          scheduleMode = mode === "interval" || mode === "once" ? mode : "periodic";
          scheduleTabs?.querySelectorAll("[data-schedule-mode]").forEach((btn) => {
            const active = btn.getAttribute("data-schedule-mode") === scheduleMode;
            btn.classList.toggle("bg-white", active);
            btn.classList.toggle("text-gray-900", active);
            btn.classList.toggle("shadow-sm", active);
            btn.classList.toggle("text-gray-500", !active);
          });
          panelPeriodic?.classList.toggle("hidden", scheduleMode !== "periodic");
          panelInterval?.classList.toggle("hidden", scheduleMode !== "interval");
          panelOnce?.classList.toggle("hidden", scheduleMode !== "once");
          if (scheduleMode === "once" && onceDatetime instanceof HTMLInputElement && !onceDatetime.value) {
            const next = new Date(Date.now() + 3600000);
            next.setMinutes(0, 0, 0);
            const pad = (n) => String(n).padStart(2, "0");
            onceDatetime.value = `${next.getFullYear()}-${pad(next.getMonth() + 1)}-${pad(next.getDate())}T${pad(next.getHours())}:00`;
          }
        };

        scheduleTabs?.querySelectorAll("[data-schedule-mode]").forEach((btn) => {
          btn.addEventListener("click", () => {
            setScheduleMode(btn.getAttribute("data-schedule-mode") || "periodic");
          });
        });

        bindAutomationModalMenus(mainPanel);

        const openModal = () => {
          if (!modal) return;
          setScheduleMode("periodic");
          if (nameInput instanceof HTMLInputElement) nameInput.value = "";
          const promptEl = document.getElementById("automationPromptInput");
          if (promptEl instanceof HTMLTextAreaElement) promptEl.value = "";
          if (workspaceInput instanceof HTMLInputElement) {
            workspaceInput.value =
              selectedWorkspaceName && selectedWorkspaceName !== "默认工作空间"
                ? selectedWorkspaceName
                : "Claw";
          }
          const dateStart = document.getElementById("automationDateStart");
          const dateEnd = document.getElementById("automationDateEnd");
          if (dateStart instanceof HTMLInputElement) dateStart.value = "";
          if (dateEnd instanceof HTMLInputElement) dateEnd.value = "";
          const automationModelLabel = document.getElementById("automationModelLabel");
          if (automationModelLabel) automationModelLabel.textContent = getComposerModelToolbarLabel();
          const automationSkillLabel = document.getElementById("automationSkillLabel");
          if (automationSkillLabel) automationSkillLabel.textContent = getComposerSkillToolbarLabel();
          modal.classList.remove("pointer-events-none", "opacity-0");
        };
        const closeModal = () => {
          if (!modal) return;
          modal.classList.add("pointer-events-none", "opacity-0");
        };

        const openAutomationBoundTask = (taskId) => {
          if (!taskId) return;
          const task = getTaskById(taskId);
          if (task) {
            renderTaskConversation(taskId);
            return;
          }
          void window.AgentDeskAPI.getTask(taskId)
            .then((remote) => {
              tasksData = sortTasksByCreatedAtDesc(
                dedupeTasksById([
                  {
                    id: remote.id,
                    title: remote.title,
                    createdAt: parseTaskCreatedAt(remote),
                    messages: remote.messages || [],
                  },
                  ...tasksData,
                ]),
              );
              persistAppState();
              renderTaskList();
              renderTaskConversation(taskId);
            })
            .catch(() => window.alert("无法打开绑定任务"));
        };

        if (openBtn) openBtn.addEventListener("click", openModal);
        if (cancelBtn) cancelBtn.addEventListener("click", closeModal);

        if (submitBtn instanceof HTMLButtonElement) {
          submitBtn.addEventListener("click", () => {
            void (async () => {
              if (typeof window.AgentDeskAPI?.createAutomationJob !== "function") {
                window.alert(
                  "API 客户端未包含自动化接口，请强制刷新页面（Ctrl+F5）后重试。\n\n入口：http://127.0.0.1:8000/（由 backend 托管 frontend/index.html）",
                );
                return;
              }
              const name =
                nameInput instanceof HTMLInputElement ? nameInput.value.trim() : "";
              const promptEl = document.getElementById("automationPromptInput");
              const prompt =
                promptEl instanceof HTMLTextAreaElement ? promptEl.value.trim() : "";
              if (!name) {
                window.alert("请先填写任务名称");
                return;
              }
              if (!prompt) {
                window.alert("请先填写提示词");
                return;
              }
              const workspace =
                workspaceInput instanceof HTMLInputElement && workspaceInput.value.trim()
                  ? workspaceInput.value.trim()
                  : selectedWorkspaceName || "Claw";
              const schedule = buildAutomationScheduleFromModal(scheduleMode, {
                timeInput,
                periodicUnit,
                intervalAmount,
                intervalUnit,
                onceDatetime,
              });
              const dateStart = document.getElementById("automationDateStart");
              const dateEnd = document.getElementById("automationDateEnd");
              const dateRange = {
                start:
                  dateStart instanceof HTMLInputElement && dateStart.value
                    ? dateStart.value
                    : null,
                end:
                  dateEnd instanceof HTMLInputElement && dateEnd.value ? dateEnd.value : null,
              };
              const employeeName =
                selectedAssignee?.type === "employee" ? selectedAssignee.name : null;
              const skillNames = Array.isArray(selectedComposerSkillNames)
                ? selectedComposerSkillNames.filter(Boolean)
                : [];
              const chatMode = planModeEnabled ? "plan" : "chat";
              const modelName =
                !modelAutoModeEnabled && selectedModelSlot
                  ? selectedModelSlot.modelId
                  : null;
              submitBtn.disabled = true;
              try {
                const job = await window.AgentDeskAPI.createAutomationJob({
                  name,
                  workspace,
                  prompt,
                  employee_name: employeeName,
                  model_name: modelName,
                  skill_names: skillNames,
                  chat_mode: chatMode,
                  schedule,
                  date_range: dateRange,
                });
                if (job?.task_id) {
                  const exists = tasksData.some((t) => t.id === job.task_id);
                  if (!exists) {
                    tasksData = sortTasksByCreatedAtDesc(
                      dedupeTasksById([
                        {
                          id: job.task_id,
                          title: job.name || name,
                          createdAt: Date.now(),
                          messages: [],
                        },
                        ...tasksData,
                      ]),
                    );
                    persistAppState();
                    renderTaskList();
                  }
                }
                closeModal();
                await renderAutomationPage();
              } catch (err) {
                window.alert(err instanceof Error ? err.message : "创建失败");
              } finally {
                submitBtn.disabled = false;
              }
            })();
          });
        }

        mainPanel.querySelectorAll("[data-automation-row]").forEach((row) => {
          const jobId = row.getAttribute("data-automation-job-id") || "";
          const taskId = row.getAttribute("data-automation-task-id") || "";

          row.querySelector("[data-automation-open-task]")?.addEventListener("click", () => {
            openAutomationBoundTask(taskId);
          });

          row.querySelectorAll("[data-automation-action]").forEach((btn) => {
            btn.addEventListener("click", (event) => {
              event.stopPropagation();
              const action = btn.getAttribute("data-automation-action");
              if (!jobId || !action) return;
              void (async () => {
                try {
                  if (action === "run") {
                    await window.AgentDeskAPI.runAutomationJob(jobId);
                    window.alert("已触发运行");
                  } else if (action === "pause") {
                    await window.AgentDeskAPI.pauseAutomationJob(jobId);
                  } else if (action === "resume") {
                    await window.AgentDeskAPI.resumeAutomationJob(jobId);
                  } else if (action === "delete") {
                    if (!window.confirm("确定删除该定时任务？")) return;
                    await window.AgentDeskAPI.deleteAutomationJob(jobId);
                  }
                  await renderAutomationPage();
                } catch (err) {
                  window.alert(err instanceof Error ? err.message : "操作失败");
                }
              })();
            });
          });
        });
      };

      const persistedState = loadAppState();
      if (Array.isArray(persistedState.installedSkillsCache) && persistedState.installedSkillsCache.length) {
        syncInstalledSkillsFromApi(persistedState.installedSkillsCache, { allowClearOnEmpty: true });
      }
      installedSkillsState.forEach((skill) => {
        if (Object.prototype.hasOwnProperty.call(persistedState.installedSkillToggles, skill.name)) {
          skill.withToggle = Boolean(persistedState.installedSkillToggles[skill.name]);
        }
      });

      let taskIndex = Number.isFinite(persistedState.taskIndex) ? persistedState.taskIndex : 0;
      let taskExpanded = Boolean(persistedState.taskExpanded);
      let hasSubmittedFirstInput = Boolean(persistedState.hasSubmittedFirstInput);
      let hasCurrentTaskListed = Boolean(persistedState.hasCurrentTaskListed);
      let hasRenderedTaskHome = Boolean(persistedState.hasRenderedTaskHome);
      let currentView = persistedState.currentView || "digital-plaza";
      let myTeamSection = persistedState.myTeamSection === "employee-list" ? "employee-list" : "team-list";
      let joinedEmployees = persistedState.joinedEmployees;
      let plazaCardsData = persistedState.plazaCardsData;
      let teamCards = persistedState.teamCards;
      let selectedAssignee = normalizeAssignee(
        persistedState.selectedAssignee,
        persistedState.selectedAssigneeName,
      );
      let recentSummonExperts = normalizeRecentSummons(persistedState.recentSummonExperts);
      let selectedModelName = persistedState.selectedModelName || "Auto";
      let modelAutoModeEnabled =
        persistedState.modelAutoModeEnabled !== undefined
          ? Boolean(persistedState.modelAutoModeEnabled)
          : selectedModelName === "Auto";
      let selectedModelSlot =
        persistedState.selectedModelSlot && typeof persistedState.selectedModelSlot === "object"
          ? persistedState.selectedModelSlot
          : null;
      let composerModelOptions = [];
      let composerModelConfigSnapshot = null;
      let modelModeMenuDelegated = false;
      let selectedComposerSkillNames = normalizeComposerSkillNamesFromState(
        persistedState.selectedComposerSkillNames,
      );
      let selectedWorkspaceName = persistedState.selectedWorkspaceName || "默认工作空间";
      let taskItems = persistedState.taskItems;
      let tasksData = persistedState.tasksData;
      let pinnedTaskIds = Array.isArray(persistedState.pinnedTaskIds)
        ? persistedState.pinnedTaskIds.filter((id) => typeof id === "string")
        : [];
      let activeTaskId = persistedState.activeTaskId;
      let openTaskMenuId = null;
      let pendingComposerDraft = null;
      let pendingComposerDraftTaskId = null;
      let pendingComposerSkillTag = null;
      let activeComposerIntent = "normal";
      let automationScheduled = persistedState.automationScheduled;
      let automationHistory = persistedState.automationHistory;
      let planModeEnabled = Boolean(persistedState.planModeEnabled);
      let currentPlanState = { status: "idle", tasks: [] };
      let currentSkillWizard = null;
      let currentChatChoices = null;
      let chatChoiceCustomDraft = "";
      let wizardStepIndex = 0;
      let wizardDraftAnswers = {};
      let branchCustomDraft = "";
      let wizardTouchedIds = new Set();
      let wizardSubmitting = false;
      let taskConversationHydrateSeq = 0;
      let wizardComposerCollapsed = false;
      const skillWizardDismissedTaskIds = new Set();
      let currentTaskStats = null;
      let currentTaskEvents = [];

      if (!Array.isArray(joinedEmployees)) joinedEmployees = [];
      if (!Array.isArray(plazaCardsData) || plazaCardsData.length === 0) {
        plazaCardsData = createInitialPlazaCards();
      }
      if (!Array.isArray(taskItems)) taskItems = [];
      if (!Array.isArray(tasksData)) tasksData = [];
      if (!Array.isArray(automationScheduled)) automationScheduled = createInitialAutomationScheduled();
      if (!Array.isArray(automationHistory)) automationHistory = createInitialAutomationHistory();
      tasksData = sortTasksByCreatedAtDesc(
        dedupeTasksById(tasksData).map((task, idx) => ({
          id: task.id || `task-restored-${idx + 1}`,
          title: task.title || `新任务 ${idx + 1}`,
          createdAt: parseTaskCreatedAt(task),
          messages: Array.isArray(task.messages)
            ? task.messages.map(stripMessageForLocalStorage)
            : [],
        })),
      );
      if (tasksData.length) {
        taskItems = tasksData.map((task) => task.title || "新任务");
      }
      if (!Array.isArray(teamCards) || teamCards.length === 0) {
        teamCards = createInitialTeamCards();
      }
      teamCards = normalizeTeamCards(teamCards);
      if (!Array.isArray(plazaCardsData) || plazaCardsData.length === 0) {
        plazaCardsData = createInitialPlazaCards();
      } else {
        plazaCardsData = normalizePlazaCards(plazaCardsData);
      }
      joinedEmployees = normalizeJoinedEmployees(joinedEmployees);
      selectedAssignee = normalizeAssignee(selectedAssignee);
      recentSummonExperts = normalizeRecentSummons(recentSummonExperts);
      sanitizeComposerState();
      if (isLegacyAgentSkillMirror(selectedComposerSkillNames, selectedAssignee)) {
        selectedComposerSkillNames = [];
      }
      if (activeTaskId && !tasksData.some((task) => task.id === activeTaskId)) {
        activeTaskId = null;
      }
      try {
        const bootstrapUrlTaskId = new URLSearchParams(window.location.search).get("task");
        if (bootstrapUrlTaskId && tasksData.some((task) => task.id === bootstrapUrlTaskId)) {
          activeTaskId = bootstrapUrlTaskId;
          currentView = "task-conversation";
        }
      } catch (_) {
        /* ignore */
      }

      const persistAppStateCore = () => {
        const installedSkillToggles = {};
        installedSkillsState.forEach((skill) => {
          installedSkillToggles[skill.name] = Boolean(skill.withToggle);
        });

        const stateToSave = {
          taskIndex,
          taskExpanded,
          hasSubmittedFirstInput,
          hasCurrentTaskListed,
          hasRenderedTaskHome,
          currentView,
          myTeamSection,
          selectedAssignee,
          recentSummonExperts,
          selectedModelName,
          modelAutoModeEnabled,
          selectedModelSlot,
          selectedComposerSkillNames,
          selectedWorkspaceName,
          activeTaskId,
          pinnedTaskIds,
          installedSkillToggles,
          installedSkillsCache: serializeInstalledSkillsForCache(),
          planModeEnabled,
          tasksData: serializeTasksForStorage(tasksData),
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(stateToSave));
        } catch (error) {
          try {
            localStorage.removeItem(STORAGE_KEY);
          } catch (_) {
            /* ignore */
          }
        }
      };

      const flushPersistAppState = () => {
        if (persistAppStateDeferredTimer) {
          clearTimeout(persistAppStateDeferredTimer);
          persistAppStateDeferredTimer = null;
        }
        persistAppStateCore();
      };

      const persistAppState = () => {
        if (isTaskStreaming || streamRequestLock) {
          if (persistAppStateDeferredTimer) return;
          persistAppStateDeferredTimer = setTimeout(() => {
            persistAppStateDeferredTimer = null;
            persistAppStateCore();
          }, PERSIST_DURING_STREAM_MS);
          return;
        }
        flushPersistAppState();
      };

      const buildTaskTitle = (text) => {
        const normalized = (text || "").replace(/\s+/g, " ").trim();
        if (!normalized) return `新任务 ${taskIndex}`;
        return normalized.length > 18 ? `${normalized.slice(0, 18)}...` : normalized;
      };

      const escapeHtml = (raw) =>
        String(raw || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const getTaskById = (taskId) => tasksData.find((task) => task.id === taskId);

      const prunePinnedTaskIds = () => {
        const ids = new Set(tasksData.map((t) => t.id));
        pinnedTaskIds = pinnedTaskIds.filter((id) => ids.has(id));
      };

      const getSortedTasksForList = () => {
        prunePinnedTaskIds();
        const pinnedSet = new Set(pinnedTaskIds);
        const pinned = pinnedTaskIds
          .map((id) => tasksData.find((t) => t.id === id))
          .filter(Boolean);
        const unpinned = tasksData
          .filter((t) => !pinnedSet.has(t.id))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        return [...pinned, ...unpinned];
      };

      const isTaskPinned = (taskId) => pinnedTaskIds.includes(taskId);

      const closeTaskMenus = () => {
        openTaskMenuId = null;
        taskList?.querySelectorAll("[data-task-menu]").forEach((menu) => {
          menu.classList.add("hidden");
        });
      };

      const togglePinTask = (taskId) => {
        if (isTaskPinned(taskId)) {
          pinnedTaskIds = pinnedTaskIds.filter((id) => id !== taskId);
        } else {
          pinnedTaskIds = [taskId, ...pinnedTaskIds.filter((id) => id !== taskId)];
        }
        persistAppState();
        closeTaskMenus();
        renderTaskList();
      };

      const deleteTaskById = async (taskId) => {
        const task = getTaskById(taskId);
        const label = task?.title || taskId;
        if (!window.confirm(`确定删除任务「${label}」？此操作不可恢复。`)) return;
        closeTaskMenus();
        try {
          await apiCall(() => window.AgentDeskAPI.deleteTask(taskId), "删除任务失败");
        } catch (_) {
          return;
        }
        const wasActive = activeTaskId === taskId;
        const wasConversation =
          wasActive && (currentView === "task-conversation" || currentView === "new-task");
        tasksData = tasksData.filter((t) => t.id !== taskId);
        pinnedTaskIds = pinnedTaskIds.filter((id) => id !== taskId);
        taskItems = tasksData.map((t) => t.title || "新任务");
        if (wasActive) {
          activeTaskId = tasksData[0]?.id || null;
        }
        persistAppState();
        renderTaskList();
        if (wasConversation) {
          beginNewTaskSession();
          renderNewTaskHome();
        } else if (wasActive && activeTaskId) {
          renderTaskConversation(activeTaskId);
          scheduleTaskHydration(activeTaskId);
        }
      };

      const renderTaskList = () => {
        if (!taskList) return;
        closeTaskMenus();
        taskList.innerHTML = "";
        if (!tasksData.length) {
          const emptyNode = document.createElement("div");
          emptyNode.setAttribute("data-empty-task", "true");
          emptyNode.className = "px-3 py-2 text-[12px] text-gray-400";
          emptyNode.textContent = "暂无任务";
          taskList.appendChild(emptyNode);
          return;
        }

        getSortedTasksForList().forEach((task) => {
          const taskItem = document.createElement("div");
          taskItem.className = `group relative flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 transition-colors duration-200 ${
            task.id === activeTaskId
              ? "wm-task-active"
              : "text-gray-600 hover:bg-white/70 hover:text-gray-900"
          }`;
          taskItem.dataset.taskId = task.id;

          const icon = document.createElement("span");
          icon.className = "shrink-0 text-gray-400";
          icon.innerHTML =
            '<svg viewBox="0 0 20 20" fill="none" class="h-4 w-4"><path d="M5.5 3.5h9a1 1 0 011 1v11a1 1 0 01-1 1h-9a1 1 0 01-1-1v-11a1 1 0 011-1zM7.5 7h5M7.5 10h5M7.5 13h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';

          const title = document.createElement("span");
          title.className = "min-w-0 flex-1 truncate text-[13px]";
          if (isTaskPinned(task.id)) {
            const pinMark = document.createElement("span");
            pinMark.className = "mr-1 inline-flex text-amber-600";
            pinMark.innerHTML =
              '<svg viewBox="0 0 20 20" fill="currentColor" class="h-3 w-3" aria-hidden="true"><path d="M10 3.5l1.2 3.7h3.9l-3.1 2.3 1.2 3.7L10 10.9l-3.2 2.3 1.2-3.7-3.1-2.3h3.9L10 3.5z"/></svg>';
            title.appendChild(pinMark);
          }
          title.appendChild(document.createTextNode(task.title || `新任务 ${task.id}`));

          const menuWrap = document.createElement("div");
          menuWrap.className = "relative shrink-0";

          const menuBtn = document.createElement("button");
          menuBtn.type = "button";
          menuBtn.className =
            "flex h-7 w-7 items-center justify-center rounded-md text-gray-400 opacity-50 transition-opacity hover:bg-gray-300/80 hover:text-gray-700 group-hover:opacity-100 focus:opacity-100";
          menuBtn.setAttribute("aria-label", "任务操作");
          menuBtn.innerHTML =
            '<svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><circle cx="4" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="16" cy="10" r="1.5"/></svg>';

          const menu = document.createElement("div");
          menu.dataset.taskMenu = "true";
          menu.className =
            "absolute right-0 top-full z-50 mt-1 hidden min-w-[120px] overflow-hidden rounded-lg border border-gray-200 bg-white py-1 shadow-lg";
          menu.innerHTML = `
            <button type="button" data-task-action="pin" class="block w-full px-3 py-2 text-left text-[13px] text-gray-700 hover:bg-gray-50">
              ${isTaskPinned(task.id) ? "取消置顶" : "置顶"}
            </button>
            <button type="button" data-task-action="delete" class="block w-full px-3 py-2 text-left text-[13px] text-red-600 hover:bg-red-50">
              删除
            </button>
          `;

          menuBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const willOpen = openTaskMenuId !== task.id;
            closeTaskMenus();
            if (willOpen) {
              openTaskMenuId = task.id;
              menu.classList.remove("hidden");
            }
          });

          menu.querySelector('[data-task-action="pin"]')?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            togglePinTask(task.id);
          });

          menu.querySelector('[data-task-action="delete"]')?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            void deleteTaskById(task.id);
          });

          menuWrap.appendChild(menuBtn);
          menuWrap.appendChild(menu);

          taskItem.appendChild(icon);
          taskItem.appendChild(title);
          taskItem.appendChild(menuWrap);

          taskItem.addEventListener("click", () => {
            activeTaskId = task.id;
            persistAppState();
            closeTaskMenus();
            renderTaskList();
            renderTaskConversation(task.id);
          });

          taskList.appendChild(taskItem);
        });
      };

      if (!window.__agentdeskTaskMenuDocListener) {
        window.__agentdeskTaskMenuDocListener = true;
        document.addEventListener("click", () => {
          if (openTaskMenuId) closeTaskMenus();
        });
      }

      newTaskBtn.addEventListener("click", () => {
        hasRenderedTaskHome = true;
        if (!taskExpanded) {
          taskExpanded = true;
          taskList.classList.remove("hidden");
          taskChevron.classList.remove("-rotate-90");
        }
        if (currentView === "new-task" && !hasSubmittedFirstInput) {
          beginNewTaskSession();
          renderNewTaskHome();
          return;
        }
        if (currentView === "new-task" && hasSubmittedFirstInput) {
          beginNewTaskSession();
          renderNewTaskHome();
          return;
        }
        beginNewTaskSession();
        renderNewTaskHome();
      });

      digitalPlazaLink.addEventListener("click", (event) => {
        event.preventDefault();
        setActiveNav("digital-plaza");
        renderDigitalEmployeePlaza();
      });

      if (teamLink) {
        teamLink.addEventListener("click", (event) => {
          event.preventDefault();
          renderMyTeamPage();
        });
      }

      if (skillsLink) {
        skillsLink.addEventListener("click", async (event) => {
          event.preventDefault();
          await refreshInstalledSkillsFromApi();
          renderSkillsPage();
        });
      }

      if (caseLibraryLink) {
        caseLibraryLink.addEventListener("click", (event) => {
          event.preventDefault();
          renderCaseLibraryPage();
        });
      }

      if (cloudLinksLink) {
        cloudLinksLink.addEventListener("click", (event) => {
          event.preventDefault();
          renderCloudLinksPage();
        });
      }

      if (libraryLink) {
        libraryLink.addEventListener("click", (event) => {
          event.preventDefault();
          renderLibraryPage();
        });
      }

      if (automationLink) {
        automationLink.addEventListener("click", (event) => {
          event.preventDefault();
          renderAutomationPage();
        });
      }

      taskToggle.addEventListener("click", () => {
        taskExpanded = !taskExpanded;
        taskList.classList.toggle("hidden", !taskExpanded);
        taskChevron.classList.toggle("-rotate-90", !taskExpanded);
        persistAppState();
      });

      const renderInitialView = () => {
        resetTaskStreamUiState();
        streamRequestLock = false;
        currentTurnRuntime = null;
        renderTaskList();
        taskList.classList.toggle("hidden", !taskExpanded);
        taskChevron.classList.toggle("-rotate-90", !taskExpanded);

        const urlTaskId = readTaskIdFromUrl();
        if (urlTaskId && tasksData.some((task) => task.id === urlTaskId)) {
          activeTaskId = urlTaskId;
          currentView = "task-conversation";
        }

        if (currentView === "team" || currentView === "team-employee-edit") {
          renderMyTeamPage();
        } else if (currentView === "skills") {
          renderSkillsPage();
        } else if (currentView === "case-library") {
          renderCaseLibraryPage();
        } else if (currentView === "cloud-links") {
          renderCloudLinksPage();
        } else if (currentView === "library") {
          renderLibraryPage();
        } else if (currentView === "automation") {
          renderAutomationPage();
        } else if (currentView === "new-task") {
          renderNewTaskHome();
        } else if (currentView === "task-conversation" && activeTaskId) {
          renderTaskConversation(activeTaskId);
        } else if (currentView === "task-conversation" && tasksData.length) {
          renderTaskConversation(tasksData[0].id);
        } else {
          renderDigitalEmployeePlaza();
        }
      };

      window.addEventListener("pagehide", () => {
        streamAbortRequested = true;
        abortAllTaskStreams();
        clearAllPendingUserMessages();
        persistAppStateOnPageHide();
      });
      window.addEventListener("popstate", () => {
        const taskId = readTaskIdFromUrl();
        if (taskId && getTaskById(taskId)) {
          activeTaskId = taskId;
          currentView = "task-conversation";
          renderTaskList();
          renderTaskConversation(taskId);
          return;
        }
        if (currentView === "task-conversation") {
          activeTaskId = null;
          currentView = "digital-plaza";
          renderTaskList();
          renderDigitalEmployeePlaza();
        }
      });

      const loadDataFromApi = async () => {
        const probe = await window.AgentDeskAPI.probe();
        if (!probe.ok && window.location.protocol.startsWith("http")) {
          window.AgentDeskAPI.setBase(window.location.origin);
        } else if (!probe.ok) {
          return;
        }
        const settled = await Promise.allSettled([
          window.AgentDeskAPI.getEmployees(),
          window.AgentDeskAPI.getPlaza(),
          window.AgentDeskAPI.getTeams(),
          window.AgentDeskAPI.getTasks(),
          window.AgentDeskAPI.getTools(),
          window.AgentDeskAPI.getSkills(),
          window.AgentDeskAPI.getMcpServers(),
          window.AgentDeskAPI.getKnowledge(),
          window.AgentDeskAPI.getCases(),
          window.AgentDeskAPI.getConfig(),
        ]);
        const pick = (index, fallback) => {
          const result = settled[index];
          return result.status === "fulfilled" ? result.value : fallback;
        };
        applyJoinedEmployeesFromApi(pick(0, joinedEmployees));
        applyPlazaCardsFromApi(pick(1, plazaCardsData));
        applyTeamCardsFromApi(pick(2, teamCards));
        const tasksResp = pick(3, []);
        const toolsResp = pick(4, []);
        if (settled[4].status === "rejected") {
          toolsCatalogLoadError = settled[4].reason;
          availableExecutionToolsState = [];
        } else {
          toolsCatalogLoadError = null;
          availableExecutionToolsState = Array.isArray(toolsResp) ? toolsResp : [];
        }
        const skillsResp = settled[5].status === "fulfilled" ? settled[5].value : null;
        const mcpResp = pick(6, []);
        const knowledgeResp = pick(7, []);
        const casesResp = pick(8, []);
        const configResp = pick(9, null);
        const pinnedConversation = pinActiveConversationMessages();
        tasksData = mergeTasksDataFromServer(tasksData, dedupeTasksById(tasksResp));
        restorePinnedConversationMessages(pinnedConversation);
        prunePinnedTaskIds();
        mcpServersState = Array.isArray(mcpResp) ? mcpResp : [];
        knowledgeDocsState = Array.isArray(knowledgeResp) ? knowledgeResp : [];
        caseDocsState = Array.isArray(casesResp) ? casesResp : [];
        if (skillsResp !== null) {
          syncInstalledSkillsFromApi(skillsResp, { allowClearOnEmpty: true });
        }
        if (configResp) {
          syncComposerModelFromConfig(configResp);
        }
        taskItems = tasksData.map((task) => task.title || "新任务");
        selectedAssignee = normalizeAssignee(selectedAssignee);
        recentSummonExperts = normalizeRecentSummons(recentSummonExperts);
        if (isLegacyAgentSkillMirror(selectedComposerSkillNames, selectedAssignee)) {
          selectedComposerSkillNames = [];
        }
        if (activeTaskId && !tasksData.some((task) => task.id === activeTaskId)) {
          activeTaskId = null;
        }
        if (settled.some((result) => result.status === "rejected")) {
          console.warn("Some AgentDesk API requests failed during bootstrap");
        }
      };

      if (configProfileBtn instanceof HTMLButtonElement) {
        configProfileBtn.addEventListener("click", () => {
          void openConfigModal();
        });
      }

      (async () => {
        ensureComposerSendDelegated();
        ensureModelModeMenuDelegated();
        ensureSkillWizardDelegatedEvents();
        persistAppState();
        await loadDataFromApi();
        persistAppState();
        renderInitialView();
      })();
    </script>
  </body>
</html>
