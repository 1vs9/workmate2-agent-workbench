      const messageBodyLen = (m) => String(m?.content || "").trim().length;

      const mergeTaskMessagePair = (local, remote) => {
        if (!local) return cloneTaskMessage(remote);
        if (!remote) return cloneTaskMessage(local);
        if (local.role !== remote.role) {
          return messageBodyLen(local) >= messageBodyLen(remote)
            ? cloneTaskMessage(local)
            : cloneTaskMessage(remote);
        }
        const pickBase = messageBodyLen(remote) > messageBodyLen(local) ? remote : local;
        const pickOther = pickBase === remote ? local : remote;
        const merged = cloneTaskMessage(pickBase);
        if (
          Array.isArray(pickOther.artifacts) &&
          pickOther.artifacts.length &&
          !merged.artifacts?.length
        ) {
          merged.artifacts = [...pickOther.artifacts];
        }
        const localTraces = pickOther.runtime?.traces?.length || 0;
        const remoteTraces = merged.runtime?.traces?.length || 0;
        if (pickOther.runtime && localTraces >= remoteTraces) {
          merged.runtime = JSON.parse(JSON.stringify(pickOther.runtime));
        }
        return merged;
      };

      const normalizeTeamStreamSender = (sender, fallback) => {
        const s = String(sender ?? fallback ?? "").trim();
        return s || "团队";
      };

      /** During worker phase, prefer explicit stream metadata over stale active worker. */
      const resolveTeamStreamSender = (evt) => {
        const fromEvt = normalizeTeamStreamSender(
          evt?.actor_id || evt?.source_member || evt?.worker || evt?.sender || "",
        );
        if (fromEvt && fromEvt !== "团队" && fromEvt !== "AgentDesk企伴") {
          return fromEvt;
        }
        if (teamStreamActive && teamActiveWorker) {
          return normalizeTeamStreamSender(teamActiveWorker);
        }
        return normalizeTeamStreamSender(fromEvt || teamStreamAssistant?.sender);
      };

      const snapshotTurnRuntimeToMessage = (msg, turnKey, { keepLive = false } = {}) => {
        if (!msg || !currentTurnRuntime) return;
        msg.runtime = JSON.parse(
          JSON.stringify({
            ...currentTurnRuntime,
            stats: currentTaskStats ? { ...currentTaskStats } : currentTurnRuntime.stats,
          }),
        );
        if (turnKey != null) {
          runtimeUiState.set(String(turnKey), { detailOpen: false, thinkOpen: false });
        }
        if (!keepLive) {
          currentTurnRuntime = null;
          turnRuntimeDetailOpen = false;
          thinkingPanelOpen = true;
        }
      };

      const mergeAssistantStreamContent = (current, incoming) => {
        const cur = String(current || "").trim();
        const part = String(incoming || "").trim();
        if (!part) return current || "";
        if (!cur) return part;
        if (part === cur || cur.endsWith(part)) return current || cur;
        if (part.startsWith(cur)) return part;
        return `${cur}\n\n${part}`;
      };

      const coalesceSameSenderAssistantRun = (messages) => {
        const list = Array.isArray(messages) ? messages : [];
        if (list.length <= 1) return list;
        let lastUserIdx = -1;
        for (let i = list.length - 1; i >= 0; i -= 1) {
          if (list[i]?.role === "user") {
            lastUserIdx = i;
            break;
          }
        }
        const head = list.slice(0, lastUserIdx + 1);
        const tail = list.slice(lastUserIdx + 1);
        const out = [];
        for (const msg of tail) {
          if (msg?.role !== "assistant") {
            out.push(msg);
            continue;
          }
          const prev = out[out.length - 1];
          const sender = normalizeTeamStreamSender(msg.sender);
          const prevSender =
            prev?.role === "assistant" ? normalizeTeamStreamSender(prev.sender) : "";
          if (prev?.role === "assistant" && prevSender === sender) {
            prev.content = mergeAssistantStreamContent(prev.content, msg.content);
            if (!prev.id && msg.id != null) prev.id = msg.id;
            if (!prev.sender) prev.sender = msg.sender || sender;
            continue;
          }
          out.push(
            streamingAssistantMsgRef && msg === streamingAssistantMsgRef
              ? msg
              : cloneTaskMessage({ ...msg, sender: msg.sender || sender }),
          );
        }
        return [...head, ...out];
      };

      const dedupeAdjacentAssistantMessages = (messages) => {
        const out = [];
        for (const msg of messages || []) {
          const prev = out[out.length - 1];
          if (
            prev &&
            prev.role === "assistant" &&
            msg.role === "assistant" &&
            normalizeTeamStreamSender(prev.sender) === normalizeTeamStreamSender(msg.sender) &&
            String(prev.content || "").trim() === String(msg.content || "").trim()
          ) {
            continue;
          }
          out.push(msg);
        }
        return out;
      };

      const coalesceTaskAssistantTail = (task) => {
        if (!task?.messages?.length || teamStreamActive) return;
        task.messages = dedupeAdjacentAssistantMessages(
          coalesceSameSenderAssistantRun(task.messages),
        );
      };

      const isEphemeralSystemMessage = (msg) => {
        if (msg?.role !== "system") return false;
        const text = String(msg.content || "").trim();
        return /^(network error|Failed to fetch|请求超时|连接长时间无响应)/i.test(text);
      };

      const mergeTaskMessages = (localMsgs = [], remoteMsgs = [], options = {}) => {
        const coalesce = options.coalesce !== false;
        const local = (Array.isArray(localMsgs) ? localMsgs : []).filter(
          (m) => !isEphemeralSystemMessage(m),
        );
        const remote = Array.isArray(remoteMsgs) ? remoteMsgs : [];
        const localById = new Map(local.filter((m) => m.id != null).map((m) => [m.id, m]));
        const usedLocalIds = new Set();
        const merged = remote.map((remoteMsg, i) => {
          const prevLocal = local[i];
          if (remoteMsg?.id != null && localById.has(remoteMsg.id)) {
            const localMsg = localById.get(remoteMsg.id);
            usedLocalIds.add(remoteMsg.id);
            return mergeTaskMessagePair(localMsg, remoteMsg);
          }
          return mergeTaskMessagePair(prevLocal, remoteMsg);
        });
        local.forEach((localMsg, i) => {
          if (localMsg?.id != null && usedLocalIds.has(localMsg.id)) return;
          if (i < merged.length) return;
          if (
            localMsg?.role === "user" &&
            merged.some(
              (m) => m.role === "user" && String(m.content || "").trim() === String(localMsg.content || "").trim(),
            )
          ) {
            return;
          }
          merged.push(cloneOrPreserveStreamingMessage(localMsg));
        });
        const localLast = local[local.length - 1];
        const mergedLast = merged[merged.length - 1];
        const localTailAssistant =
          localLast?.role === "assistant" &&
          (messageBodyLen(localLast) > 0 ||
            localLast.streaming ||
            localLast === streamingAssistantMsgRef);
        const mergedTailAssistant =
          mergedLast?.role === "assistant" &&
          (messageBodyLen(mergedLast) > 0 || mergedLast.streaming);
        if (localTailAssistant && mergedLast?.role !== "assistant") {
          merged.push(cloneOrPreserveStreamingMessage(localLast));
        } else if (localTailAssistant && mergedLast?.role === "assistant") {
          if (streamingAssistantMsgRef && localLast === streamingAssistantMsgRef) {
            Object.assign(streamingAssistantMsgRef, mergeTaskMessagePair(localLast, mergedLast));
            merged[merged.length - 1] = streamingAssistantMsgRef;
          } else {
            merged[merged.length - 1] = mergeTaskMessagePair(localLast, mergedLast);
          }
        } else if (
          localTailAssistant &&
          !mergedTailAssistant &&
          mergedLast?.role === "assistant"
        ) {
          merged[merged.length - 1] = mergeTaskMessagePair(localLast, mergedLast);
        }
        if (isTaskStreaming && streamingAssistantMsgRef) {
          rebindStreamingAssistantMsg(merged);
        }
        const deduped = coalesce
          ? dedupeAdjacentAssistantMessages(coalesceSameSenderAssistantRun(merged))
          : dedupeAdjacentAssistantMessages(merged);
        return deduped;
      };

      const getLiveTask = (taskId, fallback = null) => getTaskById(taskId) || fallback;

      const pinActiveConversationMessages = () => {
        const pinned = new Map();
        if (!streamRequestLock && !isTaskStreaming) return pinned;
        for (const t of tasksData || []) {
          if (!t?.id || !(t.messages || []).length) continue;
          if (streamRequestLock && t.id === activeTaskId) {
            pinned.set(t.id, (t.messages || []).map(cloneTaskMessage));
            continue;
          }
          if (isTaskStreamingNow(t.id)) {
            pinned.set(t.id, (t.messages || []).map(cloneTaskMessage));
          }
        }
        return pinned;
      };

      const restorePinnedConversationMessages = (pinned) => {
        if (!pinned?.size) return;
        for (const [taskId, msgs] of pinned.entries()) {
          const task = getTaskById(taskId);
          if (!task) continue;
          task.messages = mergeTaskMessages(msgs, task.messages || []);
          syncStreamingAssistantIntoTask(task);
        }
      };

      const parseTaskCreatedAt = (task) => {
        const raw = task?.createdAt ?? task?.created_at;
        if (typeof raw === "number" && Number.isFinite(raw)) return raw;
        if (typeof raw === "string" && raw) {
          const parsed = Date.parse(raw);
          if (Number.isFinite(parsed)) return parsed;
        }
        return Date.now();
      };

      const sortTasksByCreatedAtDesc = (tasks) =>
        [...(tasks || [])].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      const mergeTasksDataFromServer = (localTasks = [], remoteTasks = []) => {
        const localById = new Map((localTasks || []).map((t) => [t.id, t]));
        const merged = (remoteTasks || []).map((remote) => {
          const local = localById.get(remote.id);
          localById.delete(remote.id);
          if (!local) {
            return {
              id: remote.id,
              title: remote.title || "新任务",
              createdAt: parseTaskCreatedAt(remote),
              messages: mergeTaskMessages([], remote.messages),
            };
          }
          return {
            id: remote.id,
            title: remote.title || local.title || "新任务",
            createdAt: parseTaskCreatedAt({ ...remote, createdAt: local.createdAt }),
            messages: mergeTaskMessages(local.messages, remote.messages),
          };
        });
        for (const local of localById.values()) {
          merged.push({
            id: local.id,
            title: local.title || "新任务",
            createdAt: parseTaskCreatedAt(local),
            messages: (local.messages || []).map(cloneTaskMessage),
          });
        }
        return sortTasksByCreatedAtDesc(dedupeTasksById(merged));
      };

      /** Strip heavy fields before localStorage — runtime/traces can freeze the tab on save/load. */
      const stripMessageForLocalStorage = (m) => {
        const content = String(m?.content || "");
        return {
          ...(m?.id != null ? { id: m.id } : {}),
          role: m?.role,
          sender: m?.sender,
          content: content.length > 24000 ? `${content.slice(0, 24000)}…` : content,
          ...(m?.updatedAt != null ? { updatedAt: m.updatedAt } : {}),
        };
      };

      const serializeTasksForStorage = (tasks) =>
        (tasks || []).map((t) => ({
          id: t.id,
          title: t.title,
          createdAt: t.createdAt,
          messages: (t.messages || [])
            .filter((m) => !isEphemeralSystemMessage(m))
            .map(stripMessageForLocalStorage),
          ...(t.pendingChatChoices ? { pendingChatChoices: t.pendingChatChoices } : {}),
        }));

      let taskCheckpointPersistTimer = null;
      const TASK_CHECKPOINT_DEBOUNCE_MS = 450;
      /** Cap live trace DOM + localStorage checkpoint size during long team runs. */
      const LIVE_TRACE_RENDER_CAP = 48;
      const RUNTIME_PERSIST_TRACE_CAP = 32;
      const LIVE_RUNTIME_TRACE_CAP = 120;
      const RUNTIME_THINKING_CAP = 8000;
      const PERSIST_DURING_STREAM_MS = 3000;
      const RUNTIME_PANEL_MIN_MS = 120;
      const STORAGE_RAW_MAX_CHARS = 2_500_000;
      let persistAppStateDeferredTimer = null;
      let runtimePanelDeferTimer = null;
      let lastRuntimePanelRefreshAt = 0;
      let turnRuntimeRefreshRaf = 0;
      let chatMessagesRefreshTimer = null;
      const CHAT_MESSAGES_REFRESH_MS = 120;

      const snapshotStreamingRuntimeForPersist = () => {
        if (!streamingAssistantMsgRef || !currentTurnRuntime) return;
        const traces = currentTurnRuntime.traces || [];
        const cappedTraces =
          traces.length > RUNTIME_PERSIST_TRACE_CAP
            ? traces.slice(-RUNTIME_PERSIST_TRACE_CAP)
            : traces;
        streamingAssistantMsgRef.runtime = JSON.parse(
          JSON.stringify({
            ...currentTurnRuntime,
            traces: cappedTraces,
            stats: currentTaskStats ? { ...currentTaskStats } : currentTurnRuntime.stats,
          }),
        );
      };

      const flushChatMessagesRefresh = (taskId) => {
        if (chatMessagesRefreshTimer) {
          clearTimeout(chatMessagesRefreshTimer);
          chatMessagesRefreshTimer = null;
        }
        if (taskId) refreshChatMessagesInPlace(taskId);
      };

      const scheduleChatMessagesRefresh = (taskId, { immediate = false } = {}) => {
        if (!taskId) return;
        if (immediate) {
          flushChatMessagesRefresh(taskId);
          return;
        }
        if (chatMessagesRefreshTimer) return;
        chatMessagesRefreshTimer = setTimeout(() => {
          chatMessagesRefreshTimer = null;
          if (activeTaskId === taskId && currentView === "task-conversation") {
            refreshChatMessagesInPlace(taskId);
          }
        }, CHAT_MESSAGES_REFRESH_MS);
      };

      const flushTurnRuntimePanelRefresh = () => {
        if (turnRuntimeRefreshRaf) {
          cancelAnimationFrame(turnRuntimeRefreshRaf);
          turnRuntimeRefreshRaf = 0;
        }
        refreshTurnRuntimePanelInPlace();
      };

      const scheduleTurnRuntimePanelRefresh = () => {
        if (turnRuntimeRefreshRaf) return;
        turnRuntimeRefreshRaf = requestAnimationFrame(() => {
          turnRuntimeRefreshRaf = 0;
          refreshTurnRuntimePanelInPlace();
        });
      };

      const scheduleTurnRuntimePanelRefreshThrottled = () => {
        const now = Date.now();
        if (now - lastRuntimePanelRefreshAt >= RUNTIME_PANEL_MIN_MS) {
          lastRuntimePanelRefreshAt = now;
          scheduleTurnRuntimePanelRefresh();
          return;
        }
        if (runtimePanelDeferTimer) return;
        runtimePanelDeferTimer = setTimeout(() => {
          runtimePanelDeferTimer = null;
          lastRuntimePanelRefreshAt = Date.now();
          scheduleTurnRuntimePanelRefresh();
        }, RUNTIME_PANEL_MIN_MS);
      };

      const flushTaskCheckpointPersist = () => {
        if (taskCheckpointPersistTimer) {
          clearTimeout(taskCheckpointPersistTimer);
          taskCheckpointPersistTimer = null;
        }
        if (!isTaskStreaming) snapshotStreamingRuntimeForPersist();
        persistAppStateCore();
      };

      /** Lightweight persist on tab close — avoids blocking refresh with runtime snapshot. */
      const persistAppStateOnPageHide = () => {
        if (taskCheckpointPersistTimer) {
          clearTimeout(taskCheckpointPersistTimer);
          taskCheckpointPersistTimer = null;
        }
        if (persistAppStateDeferredTimer) {
          clearTimeout(persistAppStateDeferredTimer);
          persistAppStateDeferredTimer = null;
        }
        try {
          persistAppStateCore();
        } catch (_) {
          /* ignore */
        }
      };

      const scheduleTaskCheckpointPersist = () => {
        if (taskCheckpointPersistTimer) clearTimeout(taskCheckpointPersistTimer);
        taskCheckpointPersistTimer = setTimeout(() => {
          taskCheckpointPersistTimer = null;
          snapshotStreamingRuntimeForPersist();
          persistAppState();
        }, TASK_CHECKPOINT_DEBOUNCE_MS);
      };

      const dedupeTasksById = (tasks) => {
        const seen = new Set();
        return (tasks || []).filter((t) => {
          if (!t?.id || seen.has(t.id)) return false;
          seen.add(t.id);
          return true;
        });
      };

      const rerenderTaskIfActive = (taskId, options = {}) => {
        const refreshSidebar = Boolean(options.refreshSidebar);
        const forceFullRender = Boolean(options.forceFullRender);
        persistAppState();
        if (refreshSidebar) renderTaskList();
        if (activeTaskId !== taskId || currentView !== "task-conversation") return;
        if (isTaskStreamingNow(taskId) && !forceFullRender) {
          if (teamStreamActive) {
            refreshPlanMessageFooter(taskId);
            if (teamStreamAssistant) {
              mountTeamStreamWorkerBubble(taskId, teamStreamAssistant);
              patchStreamingAssistantBubble(streamBubblePendingText || teamStreamAssistant.content || "");
            }
            flushTurnRuntimePanelRefresh();
            return;
          }
          refreshChatMessagesInPlace(taskId);
          return;
        }
        renderTaskConversation(taskId, { skipServerSync: true });
      };

      const streamMessage = async (task, taskId, { role, sender, content }) => {
        const msg = { role: role || "assistant", sender, content: "" };
        task.messages.push(msg);
        rerenderTaskIfActive(taskId, { refreshSidebar: true });

        const chunkSize = 4;
        for (let i = chunkSize; i <= content.length + chunkSize; i += chunkSize) {
          msg.content = content.slice(0, i);
          patchStreamingAssistantBubble(msg.content);
          await wait(28);
        }
        patchStreamingAssistantBubble(msg.content, { finalize: true });
      };

      let isTaskStreaming = false;
      let streamingTaskId = null;
      let streamRequestLock = false;
      /** Bumped when the user sends; stale ensure/hydrate must not overwrite local messages. */
      let taskSessionEpoch = 0;
      const bumpTaskSessionEpoch = () => {
        taskSessionEpoch += 1;
        if (taskHydrationTimer) {
          clearTimeout(taskHydrationTimer);
          taskHydrationTimer = null;
        }
        return taskSessionEpoch;
      };
      const isTaskSessionEpochStale = (epoch) => epoch !== taskSessionEpoch;
      const taskStreamControllers = new Map();
      const isTaskStreamingNow = (taskId) =>
        Boolean(taskId && isTaskStreaming && streamingTaskId === taskId);
      const isActiveTaskStreaming = () => isTaskStreamingNow(activeTaskId);
      /** Object reference for the assistant message currently receiving SSE deltas. */
      let streamingAssistantMsgRef = null;
      let teamStreamActive = false;
      let teamStreamAssistant = null;
      /** Worker name from the latest worker_start until worker_done. */
      let teamActiveWorker = "";
      let teamPhaseLabel = "";
      let streamAbortRequested = false;
      const streamTurnReducer = window.AgentDeskStreamReducer || null;
      const streamTurnState = streamTurnReducer?.createStreamTurnState
        ? streamTurnReducer.createStreamTurnState()
        : null;
      const teamStreamReducerState = streamTurnReducer?.createTeamStreamState
        ? streamTurnReducer.createTeamStreamState()
        : null;

      const reduceIncomingStreamEvent = (evt, taskId) => {
        if (!streamTurnReducer?.applyStreamEvent || !streamTurnState) {
          return { applied: true, turn: null, team: null };
        }
        const result = streamTurnReducer.applyStreamEvent(streamTurnState, evt || {}, { taskId });
        let team = null;
        if (teamStreamReducerState && streamTurnReducer.applyTeamStreamEvent) {
          team = streamTurnReducer.applyTeamStreamEvent(teamStreamReducerState, evt || {}, { taskId });
          if (team?.activeActorId) {
            teamActiveWorker = team.activeActorId;
          }
        }
        return { ...result, team };
      };

      const abortTaskStream = (taskId) => {
        const ctrl = taskStreamControllers.get(taskId);
        if (!ctrl) return;
        try {
          ctrl.abort();
        } catch (_) {
          /* ignore */
        }
        taskStreamControllers.delete(taskId);
      };

      const resetTaskStreamUiState = (taskId = null) => {
        if (taskId) abortTaskStream(taskId);
        isTaskStreaming = false;
        streamingTaskId = null;
        teamStreamActive = false;
        teamStreamAssistant = null;
        teamActiveWorker = "";
        teamPhaseLabel = "";
        if (teamStreamReducerState && streamTurnReducer?.createTeamStreamState) {
          Object.assign(teamStreamReducerState, streamTurnReducer.createTeamStreamState());
        }
        clearStreamingAssistantRef();
        setChatStreamingUi(false);
        cancelStreamBubblePaint();
        if (turnRuntimeRefreshRaf) {
          cancelAnimationFrame(turnRuntimeRefreshRaf);
          turnRuntimeRefreshRaf = 0;
        }
        if (chatMessagesRefreshTimer) {
          clearTimeout(chatMessagesRefreshTimer);
          chatMessagesRefreshTimer = null;
        }
      };

      /** Abort stale reconnect/stream and release lock so the user can send again. */
      const prepareTaskStreamForUserSend = (taskId) => {
        bumpTaskSessionEpoch();
        abortTaskStream(taskId);
        resetTaskStreamUiState(taskId);
        streamRequestLock = false;
      };

      let chatChoicesTaskId = null;

      const clearChatChoices = () => {
        const prevTaskId = chatChoicesTaskId;
        currentChatChoices = null;
        chatChoicesTaskId = null;
        chatChoiceCustomDraft = "";
        if (prevTaskId) {
          const task = getTaskById(prevTaskId);
          if (task) delete task.pendingChatChoices;
        }
      };

      const setChatChoicesForTask = (taskId, choices) => {
        if (!taskId || !choices) return;
        currentChatChoices = choices;
        chatChoicesTaskId = taskId;
        const task = getTaskById(taskId);
        if (task) task.pendingChatChoices = choices;
      };

      const restoreChatChoicesForTask = (taskId) => {
        if (currentChatChoices && chatChoicesTaskId === taskId) return;
        const task = getTaskById(taskId);
        if (!task?.pendingChatChoices) return;
        setChatChoicesForTask(taskId, task.pendingChatChoices);
      };

      /** Only apply SSE side-effects when this task is the one the user is viewing. */
      const shouldApplyStreamUi = (taskId) => taskId === activeTaskId;

      const refreshRunStatsPanelInPlace = () => {};
      let streamBubbleRaf = 0;
      let streamBubblePendingText = "";
      const STREAMING_PLACEHOLDER = "▍";

      const isStreamingPlaceholderOnly = (content) => {
        const trimmed = String(content || "").trim();
        return !trimmed || trimmed === STREAMING_PLACEHOLDER;
      };

      const ensureStreamingAssistantShell = (msg) => {
        if (!msg) return msg;
        msg.streaming = true;
        if (!String(msg.content || "").trim()) {
          msg.content = STREAMING_PLACEHOLDER;
        }
        return msg;
      };

      const stripStreamingPlaceholder = (content) => {
        const trimmed = String(content || "").trim();
        return trimmed === STREAMING_PLACEHOLDER ? "" : content || "";
      };

      let chatStickToBottom = true;
      let chatUserDetached = false;
      let chatScrollListenerBound = false;
      let chatScrollProgrammatic = false;
      let chatResizeObserver = null;
      let traceStickToBottom = true;
      let traceScrollListenerBound = false;
      let traceScrollProgrammatic = false;

      const isChatNearBottom = (container, threshold = 96) => {
        if (!container) return true;
        return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
      };

      const shouldAutoScrollChat = ({ force = false } = {}) => {
        if (force) return true;
        if (isTaskStreaming && !chatUserDetached) return true;
        return chatStickToBottom;
      };

      const scrollChatToBottom = ({ force = false } = {}) => {
        if (!shouldAutoScrollChat({ force })) return;
        const scrollContainer = document.getElementById("chatScrollContainer");
        if (!scrollContainer) return;
        chatScrollProgrammatic = true;
        const apply = () => {
          scrollContainer.scrollTop = scrollContainer.scrollHeight;
        };
        const finish = () => {
          chatScrollProgrammatic = false;
          if (!chatUserDetached) {
            chatStickToBottom = true;
          }
        };
        apply();
        requestAnimationFrame(() => {
          apply();
          requestAnimationFrame(() => {
            apply();
            setTimeout(() => {
              apply();
              finish();
            }, 0);
          });
        });
      };

      const ensureChatMessagesResizeObserver = () => {
        const root = document.getElementById("chatMessagesRoot");
        if (!root || typeof ResizeObserver === "undefined") return;
        if (chatResizeObserver) {
          chatResizeObserver.disconnect();
          chatResizeObserver = null;
        }
        chatResizeObserver = new ResizeObserver(() => {
          if (shouldAutoScrollChat()) {
            scrollChatToBottom({ force: isTaskStreaming && !chatUserDetached });
          }
        });
        chatResizeObserver.observe(root);
      };

      const ensureChatScrollBehavior = () => {
        const scrollContainer = document.getElementById("chatScrollContainer");
        if (!scrollContainer) return;
        ensureChatMessagesResizeObserver();
        if (!chatScrollListenerBound) {
          chatScrollListenerBound = true;
          scrollContainer.addEventListener(
            "wheel",
            (event) => {
              if (event.deltaY < 0) {
                chatUserDetached = true;
                chatStickToBottom = false;
                return;
              }
              if (isChatNearBottom(scrollContainer)) {
                chatUserDetached = false;
                chatStickToBottom = true;
              }
            },
            { passive: true },
          );
          scrollContainer.addEventListener(
            "touchmove",
            () => {
              if (!isChatNearBottom(scrollContainer, 120)) {
                chatUserDetached = true;
                chatStickToBottom = false;
              }
            },
            { passive: true },
          );
          scrollContainer.addEventListener(
            "scroll",
            () => {
              if (chatScrollProgrammatic) return;
              const nearBottom = isChatNearBottom(scrollContainer);
              chatStickToBottom = nearBottom;
              if (nearBottom) {
                chatUserDetached = false;
              }
            },
            { passive: true },
          );
        }
      };

      const getActiveLiveRuntimeRoot = () => document.getElementById("turnRuntimeLive");

      const getLiveTraceScrollContainer = () => {
        const liveRoot = getActiveLiveRuntimeRoot();
        if (!liveRoot) return null;
        const detail = liveRoot.querySelector("#turn-runtime-detail-live");
        if (detail && !detail.classList.contains("hidden")) return detail;
        const traceList = liveRoot.querySelector(".wm-runtime-trace-stream");
        if (!traceList) return null;
        return traceList.closest(".wm-runtime-detail") || traceList;
      };

      const ensureTraceScrollBehavior = () => {
        const traceScrollEl = getLiveTraceScrollContainer();
        if (!traceScrollEl) return;
        if (!traceScrollListenerBound) {
          traceScrollListenerBound = true;
          traceScrollEl.addEventListener(
            "wheel",
            () => {
              traceStickToBottom = false;
            },
            { passive: true },
          );
          traceScrollEl.addEventListener(
            "scroll",
            () => {
              if (traceScrollProgrammatic) return;
              traceStickToBottom = isChatNearBottom(traceScrollEl, 48);
            },
            { passive: true },
          );
        }
      };

      const cancelStreamBubblePaint = () => {
        if (streamBubbleRaf) {
          cancelAnimationFrame(streamBubbleRaf);
          streamBubbleRaf = 0;
        }
      };

      const paintStreamingAssistantBubble = (content, { finalize = false } = {}) => {
        let bubble = document.getElementById("streamingAssistantBubble");
        if (!bubble && isTaskStreaming && activeTaskId) {
          if (teamStreamActive && teamStreamAssistant) {
            mountTeamStreamWorkerBubble(activeTaskId, teamStreamAssistant);
          } else {
            refreshChatMessagesInPlace(activeTaskId);
          }
          bubble = document.getElementById("streamingAssistantBubble");
        }
        if (!bubble) return;
        const text = String(content ?? "");
        if (finalize && window.AgentDeskMarkdown?.renderMarkdown) {
          bubble.classList.add("wm-markdown");
          bubble.classList.remove("whitespace-pre-wrap");
          bubble.innerHTML = window.AgentDeskMarkdown.renderMarkdown(text);
        } else {
          bubble.classList.remove("wm-markdown");
          bubble.classList.add("whitespace-pre-wrap");
          bubble.textContent = text;
        }
        scrollChatToBottom({ force: isTaskStreaming && !chatUserDetached });
      };

      /** Stream deltas as plain text (rAF-throttled); parse Markdown once when done. */
      const patchStreamingAssistantBubble = (content, options = {}) => {
        if (options.finalize) {
          cancelStreamBubblePaint();
          paintStreamingAssistantBubble(content, { finalize: true });
          return;
        }
        streamBubblePendingText = content;
        if (streamBubbleRaf) return;
        streamBubbleRaf = requestAnimationFrame(() => {
          streamBubbleRaf = 0;
          paintStreamingAssistantBubble(streamBubblePendingText, { finalize: false });
        });
      };

      const clearStreamingAssistantRef = () => {
        const msg = streamingAssistantMsgRef;
        if (msg) {
          msg.streaming = false;
          if (isStreamingPlaceholderOnly(msg.content)) {
            msg.content = "";
          }
        }
        streamingAssistantMsgRef = null;
      };

      const paintComposerSubmitButton = (btn, mode, { phaseLabel = "" } = {}) => {
        if (!(btn instanceof HTMLButtonElement)) return;
        const isStop = mode === "stop";
        btn.dataset.composerMode = isStop ? "stop" : "send";
        btn.classList.toggle("wm-composer-send--stop", isStop);
        btn.classList.toggle("wm-composer-send--send", !isStop);
        btn.disabled = false;
        btn.setAttribute("aria-label", isStop ? phaseLabel || "停止生成" : "发送消息");
        const label = btn.querySelector("[data-composer-send-label]");
        const sendIcon = btn.querySelector('[data-composer-send-icon="send"]');
        const stopIcon = btn.querySelector('[data-composer-send-icon="stop"]');
        if (label) {
          if (isStop) {
            label.textContent = phaseLabel || "停止";
            label.classList.remove("hidden");
          } else {
            label.textContent = "发送";
            label.classList.remove("hidden");
          }
        }
        if (sendIcon) sendIcon.classList.toggle("hidden", isStop);
        if (stopIcon) stopIcon.classList.toggle("hidden", !isStop);
      };

      const setChatStreamingUi = (streaming) => {
        const chatSendBtn = document.getElementById("chatSendBtn");
        if (chatSendBtn instanceof HTMLButtonElement) {
          paintComposerSubmitButton(
            chatSendBtn,
            streaming ? "stop" : "send",
            { phaseLabel: streaming && teamPhaseLabel ? teamPhaseLabel : "" },
          );
        }
        if (!streaming) {
          teamPhaseLabel = "";
          scheduleContextBudgetRefresh(mainPanel);
        }
      };

      const finalizeStreamingAssistantOnStop = (taskId) => {
        const task = getLiveTask(taskId);
        if (!task) return;
        const lastAssistant =
          streamingAssistantMsgRef ||
          [...(task.messages || [])].reverse().find((m) => m.role === "assistant");
        if (lastAssistant?.content) {
          patchStreamingAssistantBubble(lastAssistant.content, { finalize: true });
        }
        pruneEmptyAssistantMessages(task);
        flushTaskCheckpointPersist();
      };

      const stopActiveTaskStream = () => {
        const taskId = activeTaskId;
        if (!taskId || !isTaskStreamingNow(taskId)) return;
        streamAbortRequested = true;
        bumpTaskSessionEpoch();
        finalizeStreamingAssistantOnStop(taskId);
        abortTaskStream(taskId);
        isTaskStreaming = false;
        streamingTaskId = null;
        teamStreamActive = false;
        teamStreamAssistant = null;
        teamActiveWorker = "";
        teamPhaseLabel = "";
        cancelStreamBubblePaint();
        taskStreamControllers.delete(taskId);
        streamRequestLock = false;
        clearStreamingAssistantRef();
        setChatStreamingUi(false);
        appendTraceEvent({
          step: "info",
          label: "已停止",
          detail: "用户中止生成",
        });
        flushPersistAppState();
        rerenderTaskIfActive(taskId, { refreshSidebar: false });
        scheduleContextBudgetRefresh(mainPanel);
      };

      const clearPendingComposerDraft = () => {
        pendingComposerDraft = null;
        pendingComposerDraftTaskId = null;
        if (pendingComposerSkillTag) {
          pendingComposerSkillTag = null;
          activeComposerIntent = "normal";
        }
      };

      const applyPendingComposerDraft = (taskId) => {
        if ((currentSkillWizard?.questions || []).length > 0) {
          activeComposerIntent = "normal";
        }
        if (!pendingComposerDraft || pendingComposerDraftTaskId !== taskId) return;
        const composerInput = document.getElementById("chatComposerInput");
        if (!(composerInput instanceof HTMLTextAreaElement)) return;
        if (!composerInput.value.trim() || composerInput.value === pendingComposerDraft) {
          composerInput.value = pendingComposerDraft;
          composerInput.focus();
          const marker = "……";
          const markerStart = pendingComposerDraft.indexOf(marker);
          if (markerStart >= 0) {
            composerInput.setSelectionRange(markerStart, markerStart + marker.length);
          }
        }
        if (!(currentSkillWizard?.questions || []).length) {
          activeComposerIntent =
            pendingComposerSkillTag === "skill-creator" ? "skill_create" : "normal";
        }
      };

      const buildChatPayloadForSend = (taskId, userText, options = {}) => {
        const assignee = normalizeAssignee(selectedAssignee);
        const useTeam = assignee.type === "team";
        const casualChat = isCasualChatMessage(userText);
        const skillCreateIntent = !casualChat && isSkillCreateMessage(userText);
        const usePlan =
          (Boolean(options.forcePlan) ||
            planModeEnabled ||
            currentPlanState.status === "executing") &&
          !useTeam;
        const payload = {
          task_id: taskId,
          message: userText,
          mode: useTeam ? "team" : "single",
          chat_mode: usePlan ? "plan" : "chat",
        };
        if (skillCreateIntent) payload.intent = "skill_create";
        if (useTeam) {
          const team = findTeamByName(assignee.name);
          payload.team_id = assignee.teamId || team?.id;
          payload.team_name = assignee.name;
        } else if (assignee.type === "employee") {
          payload.employee_name = assignee.name;
        }
        if (selectedComposerSkillNames.length) {
          payload.skill_names = [...selectedComposerSkillNames];
        }
        if (options.choiceAnswer) {
          payload.choice_payload = { choice_answer: options.choiceAnswer };
        }
        return payload;
      };

      const enqueueMessageWhileRunning = async (taskId, userText, options = {}) => {
        const trimmed = String(userText || "").trim();
        if (!taskId || !trimmed) return;
        const task = getLiveTask(taskId);
        if (!task) return;
        clearPendingComposerDraft();
        if (!options.choiceAnswer) {
          clearChatChoices();
          refreshChatChoicesComposer();
        }
        const last = task.messages[task.messages.length - 1];
        const alreadyHasUser =
          last?.role === "user" && String(last.content || "").trim() === trimmed;
        if (!alreadyHasUser) {
          task.messages.push({ role: "user", content: trimmed, sender: "你" });
          scheduleChatMessagesRefresh(taskId, { immediate: true });
          persistAppState();
        }
        const payload = buildChatPayloadForSend(taskId, trimmed, options);
        try {
          await window.AgentDeskAPI.chatStream(
            payload,
            (evt) => {
              if (evt.type === "queue_update" && evt.queue) {
                renderMessageQueuePanel(evt.queue);
              }
            },
            { timeoutMs: 30000, idleTimeoutMs: 20000 },
          );
        } catch (error) {
          if (!isBenignStreamAbort(error)) {
            appendTraceEvent({
              step: "error",
              label: "入队失败",
              detail: error instanceof Error ? error.message : "入队失败",
            });
            scheduleChatMessagesRefresh(taskId, { immediate: true });
          }
        }
        void refreshMessageQueue(taskId);
      };

      const handleActiveTaskSend = async () => {
        if (currentView !== "task-conversation" || !activeTaskId) return;
        const composerInput = document.getElementById("chatComposerInput");
        if (!(composerInput instanceof HTMLTextAreaElement)) return;
        const value = composerInput.value.trim();
        if (isActiveTaskStreaming()) {
          if (value) {
            composerInput.value = "";
            await enqueueMessageWhileRunning(activeTaskId, value);
          } else {
            stopActiveTaskStream();
          }
          return;
        }
        if (!value) return;
        if (!getTaskById(activeTaskId)) return;
        clearPendingComposerDraft();
        prepareTaskStreamForUserSend(activeTaskId);
        composerInput.value = "";
        await executeTaskFlow(activeTaskId, value);
      };

      let composerSendDelegated = false;
      let skillWizardEventsBound = false;
      const ensureComposerSendDelegated = () => {
        if (composerSendDelegated) return;
        composerSendDelegated = true;
        mainPanel.addEventListener("click", (event) => {
          if (!event.target.closest("#chatSendBtn")) return;
          void handleActiveTaskSend();
        });
        mainPanel.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" || event.shiftKey) return;
          if (!(event.target instanceof HTMLTextAreaElement)) return;
          if (event.target.id !== "chatComposerInput") return;
          event.preventDefault();
          void handleActiveTaskSend();
        });
      };

      const ensureModelModeMenuDelegated = () => {
        if (modelModeMenuDelegated) return;
        modelModeMenuDelegated = true;
        mainPanel.addEventListener("click", (event) => {
          const autoToggle = event.target.closest("[data-model-auto-toggle]");
          if (autoToggle && mainPanel.contains(autoToggle)) {
            event.preventDefault();
            event.stopPropagation();
            void applyComposerModelSelection({ autoMode: true });
            mainPanel.querySelector("#modelModeMenu")?.classList.add("hidden");
            return;
          }

          const configBtn = event.target.closest("[data-model-config]");
          if (configBtn && mainPanel.contains(configBtn)) {
            event.preventDefault();
            event.stopPropagation();
            mainPanel.querySelector("#modelModeMenu")?.classList.add("hidden");
            void openConfigModal().then(() => loadComposerModelConfig()).then(() => {
              refreshModelModeMenuUi(mainPanel);
              syncComposerToolbarLabels(mainPanel);
            });
            return;
          }

          const autoBtn = event.target.closest("[data-model-auto]");
          if (autoBtn && mainPanel.contains(autoBtn)) {
            event.preventDefault();
            event.stopPropagation();
            void applyComposerModelSelection({ autoMode: true });
            mainPanel.querySelector("#modelModeMenu")?.classList.add("hidden");
            return;
          }

          const itemBtn = event.target.closest("[data-model-item]");
          if (!itemBtn || !mainPanel.contains(itemBtn)) return;
          event.preventDefault();
          event.stopPropagation();
          const providerId = itemBtn.getAttribute("data-provider-id") || "";
          const modelId = itemBtn.getAttribute("data-model-id") || "";
          const option =
            composerModelOptions.find(
              (entry) => entry.providerId === providerId && entry.modelId === modelId,
            ) || {
              providerId,
              modelId,
              displayName: itemBtn.getAttribute("data-model-label") || modelId,
              configured: true,
            };
          void applyComposerModelSelection({ autoMode: false, option }).then(() => {
            mainPanel.querySelector("#modelModeMenu")?.classList.add("hidden");
          });
        });
      };

      const formatEventTime = (value) => {
        const n = Number(value);
        if (!Number.isFinite(n) || n <= 0) return "-";
        return new Date(n).toLocaleTimeString("zh-CN", { hour12: false });
      };

      let currentTurnRuntime = null;
      let turnRuntimeDetailOpen = false;
      let thinkingPanelOpen = true;
      const runtimeUiState = new Map();
      let artifactPanelOpen = false;
      let artifactPanelTab = "changes";
      let artifactPanelPath = null;
      let artifactPanelPreview = null;
      let artifactPanelFiles = [];
      let artifactPanelLoading = false;

      const createEmptyTurnRuntime = () => ({
        thinking: "",
        traces: [],
        toolCallCount: 0,
        processMsgCount: 0,
        stats: null,
        artifacts: [],
        activityText: "",
        pulseAt: 0,
      });

      const cloneTurnRuntime = (runtime) =>
        runtime ? JSON.parse(JSON.stringify(runtime)) : null;

      const restoreLiveTurnRuntimeFromMessage = (msg, { openPanel = true } = {}) => {
        if (!msg?.runtime) return false;
        currentTurnRuntime = cloneTurnRuntime(msg.runtime);
        if (openPanel) {
          turnRuntimeDetailOpen = true;
          thinkingPanelOpen = Boolean(String(currentTurnRuntime.thinking || "").trim());
        }
        return true;
      };

      const syncTaskRunStatusFromRemote = (task, remote) => {
        if (!task || !remote) return;
        if (remote.runStatus != null) task.runStatus = remote.runStatus;
      };

      const WM_PRODUCT_SUFFIXES = new Set([
        ".pptx",
        ".ppt",
        ".docx",
        ".doc",
        ".pdf",
        ".xlsx",
        ".xls",
        ".csv",
        ".zip",
        ".png",
        ".jpg",
        ".jpeg",
        ".gif",
        ".webp",
        ".svg",
        ".mp4",
        ".mov",
        ".html",
        ".htm",
      ]);

      const inferArtifactRole = (artifact) => {
        if (artifact.role === "product" || artifact.role === "change") {
          return artifact.role;
        }
        const name = String(artifact.name || artifact.path || "").trim();
        if (name.startsWith("~$")) return null;
        const dot = name.lastIndexOf(".");
        const suffix = dot >= 0 ? name.slice(dot).toLowerCase() : "";
        if (WM_PRODUCT_SUFFIXES.has(suffix)) return "product";
        return "change";
      };

      let artifactContextMenuEl = null;

      const closeArtifactContextMenu = () => {
        if (artifactContextMenuEl) {
          artifactContextMenuEl.remove();
          artifactContextMenuEl = null;
        }
      };

      const openArtifactFolder = async (taskId, path) => {
        if (!taskId || !path || !window.AgentDeskAPI?.revealWorkspacePath) return;
        try {
          await AgentDeskAPI.revealWorkspacePath(taskId, path);
        } catch (err) {
          console.warn("[AgentDesk] reveal folder failed", err);
          alert(err instanceof Error ? err.message : String(err));
        }
      };

      const showArtifactContextMenu = (event, taskId, path) => {
        event.preventDefault();
        event.stopPropagation();
        closeArtifactContextMenu();
        const menu = document.createElement("div");
        menu.className = "wm-artifact-context-menu";
        menu.innerHTML =
          '<button type="button" data-artifact-menu-action="open-folder">打开文件夹</button>' +
          '<button type="button" data-artifact-menu-action="share-file">分享文件</button>' +
          '<button type="button" data-artifact-menu-action="add-composer">添加到对话框</button>';
        menu.style.left = `${event.clientX}px`;
        menu.style.top = `${event.clientY}px`;
        document.body.appendChild(menu);
        artifactContextMenuEl = menu;
        menu.querySelector('[data-artifact-menu-action="open-folder"]')?.addEventListener(
          "click",
          () => {
            closeArtifactContextMenu();
            void openArtifactFolder(taskId, path);
          },
        );
        menu.querySelector('[data-artifact-menu-action="share-file"]')?.addEventListener(
          "click",
          () => {
            closeArtifactContextMenu();
            const shareText = path;
            if (navigator.share) {
              void navigator
                .share({ title: path.split("/").pop() || path, text: shareText })
                .catch(() => {});
              return;
            }
            void navigator.clipboard
              .writeText(shareText)
              .then(() => alert("文件路径已复制，可粘贴分享。"))
              .catch(() => prompt("复制文件路径以分享：", shareText));
          },
        );
        menu.querySelector('[data-artifact-menu-action="add-composer"]')?.addEventListener(
          "click",
          () => {
            closeArtifactContextMenu();
            const composerInput = document.getElementById("chatComposerInput");
            if (!(composerInput instanceof HTMLTextAreaElement)) return;
            const label = path.split("/").pop() || path;
            const snippet = `@${label}`;
            const trimmed = composerInput.value.trim();
            if (!trimmed) composerInput.value = snippet;
            else if (!trimmed.includes(snippet)) composerInput.value = `${trimmed}\n${snippet}`;
            composerInput.focus();
          },
        );
        requestAnimationFrame(() => {
          const rect = menu.getBoundingClientRect();
          if (rect.right > window.innerWidth) {
            menu.style.left = `${Math.max(8, window.innerWidth - rect.width - 8)}px`;
          }
          if (rect.bottom > window.innerHeight) {
            menu.style.top = `${Math.max(8, window.innerHeight - rect.height - 8)}px`;
          }
        });
      };

      document.addEventListener("click", closeArtifactContextMenu);
      document.addEventListener("scroll", closeArtifactContextMenu, true);

      const normalizeArtifactList = (items) =>
        (items || [])
          .filter((a) => a && (a.path || a.name))
          .map((a) => {
            const path = normalizeArtifactReadPath(a.path || "");
            const name = a.name || path || "文件";
            const role = inferArtifactRole({ ...a, name, path });
            return {
              kind: a.kind || "file",
              role,
              path,
              name,
              op: a.op || "edit",
              summary: a.summary || a.name || path || "文件",
              lines: a.lines ?? null,
              tool: a.tool || "",
            };
          })
          .filter((a) => a.role);

      const renderArtifactChipHtml = (artifact, turnKey) => {
        const roleClass = artifact.role === "product" ? " is-product" : "";
        return `<button type="button" class="wm-artifact-chip${roleClass}" data-artifact-chip="1" data-artifact-path="${escapeHtml(
          artifact.path,
        )}" data-artifact-role="${escapeHtml(artifact.role)}" data-turn-key="${turnKey}" title="${escapeHtml(
          artifact.summary,
        )}">${escapeHtml(artifact.name)}</button>`;
      };

      const renderTurnArtifactsHtml = (artifacts, options = {}) => {
        const list = normalizeArtifactList(artifacts);
        if (!list.length) return "";
        const files = list.filter((a) => a.kind === "file");
        if (!files.length) return "";
        const products = files.filter((a) => a.role === "product");
        const changes = files.filter((a) => a.role === "change");
        const turnKey = options.turnKey != null ? String(options.turnKey) : "0";

        const section = (title, items, viewAllTab) => {
          if (!items.length) return "";
          const chips = items.map((a) => renderArtifactChipHtml(a, turnKey)).join("");
          const viewAll =
            viewAllTab === "files"
              ? `<button type="button" class="wm-artifact-link" data-artifact-view-all="1" data-turn-key="${turnKey}" data-artifact-tab="files">查看全部制品 →</button>`
              : `<button type="button" class="wm-artifact-link" data-artifact-view-all="1" data-turn-key="${turnKey}" data-artifact-tab="changes">查看文件变更 →</button>`;
          return `
          <div class="wm-turn-artifacts w-full" data-turn-artifacts="${turnKey}">
            <div class="wm-turn-artifacts-title">${title}（${items.length}）</div>
            <div class="flex flex-wrap items-center gap-1">${chips}</div>
            ${viewAll}
          </div>`;
        };

        return (
          section("任务产生制品", products, "files") +
          section("文件变更", changes, "changes")
        );
      };

      const ensureSkillFileArtifact = (createdSkill, { op = "edit" } = {}) => {
        if (!createdSkill) return;
        const dir = String(createdSkill.dir || createdSkill.name || "").trim();
        if (!dir) return;
        if (!currentTurnRuntime) currentTurnRuntime = createEmptyTurnRuntime();
        currentTurnRuntime.artifacts = currentTurnRuntime.artifacts || [];
        const skillPath = `skills/${dir}/SKILL.md`;
        const exists = currentTurnRuntime.artifacts.some(
          (a) => a.path === skillPath || (a.name === "SKILL.md" && String(a.path || "").includes(dir)),
        );
        if (exists) return;
        currentTurnRuntime.artifacts.push({
          type: "artifact",
          kind: "file",
          role: "change",
          path: skillPath,
          name: "SKILL.md",
          op,
          summary: op === "create" ? "新建 SKILL.md" : "修改 SKILL.md",
          tool: op === "create" ? "materialize_skill" : "overwrite_skill",
        });
      };

      const renderArtifactPanelShellHtml = () => {
        if (!artifactPanelOpen) return "";
        const tabs = [
          { id: "products", label: "产物" },
          { id: "files", label: "全部文件" },
          { id: "changes", label: "变更" },
        ];
        const tabHtml = tabs
          .map(
            (t) =>
              `<button type="button" class="wm-artifact-tab ${
                artifactPanelTab === t.id ? "is-active" : ""
              }" data-artifact-tab="${t.id}">${t.label}</button>`,
          )
          .join("");
        const pathLabel = artifactPanelPath
          ? `${escapeHtml(artifactPanelPath)}${
              artifactPanelPreview?.lines != null ? ` +${artifactPanelPreview.lines}` : ""
            }`
          : "选择左侧文件查看内容";
        const body =
          artifactPanelTab === "files"
            ? `<div class="min-h-0 flex-1 overflow-y-auto p-2">
                ${
                  artifactPanelFiles.length
                    ? artifactPanelFiles
                        .map(
                          (f) =>
                            `<button type="button" class="wm-artifact-file-item ${
                              f.path === artifactPanelPath ? "is-selected" : ""
                            }" data-artifact-file="${escapeHtml(f.path)}">${escapeHtml(
                              f.path,
                            )}</button>`,
                        )
                        .join("")
                    : '<div class="p-3 text-[12px] text-gray-400">工作区暂无文件</div>'
                }
              </div>`
            : `<div id="artifactPanelBodyScroll" class="min-h-0 flex-1 overflow-y-auto p-3">
                ${
                  artifactPanelLoading
                    ? '<div class="text-[12px] text-gray-400">加载中…</div>'
                    : artifactPanelPreview?.content
                      ? `<pre class="wm-artifact-preview">${escapeHtml(
                          artifactPanelPreview.content,
                        )}</pre>`
                      : artifactPanelPreview?.binary
                        ? '<div class="text-[12px] text-gray-500">二进制文件，暂不支持预览</div>'
                        : '<div class="text-[12px] text-gray-400">点击消息中的文件 chip 或从「全部文件」选择</div>'
                }
              </div>`;
        return `
          <aside id="artifactPanel" class="flex h-full min-h-0 w-[min(42%,520px)] shrink-0 flex-col border-l border-gray-200 bg-white">
            <div class="flex shrink-0 items-center justify-between border-b border-gray-200 px-3 py-2">
              <div class="flex gap-1">${tabHtml}</div>
              <button type="button" id="artifactPanelClose" class="cursor-pointer rounded-lg px-2 py-1 text-[12px] text-gray-500 hover:bg-gray-100" aria-label="关闭预览">关闭</button>
            </div>
            <div class="shrink-0 border-b border-gray-100 px-3 py-2 text-[11px] text-gray-500 truncate">${pathLabel}</div>
            ${body}
          </aside>`;
      };

      const scrollArtifactPanelToBottom = () => {
        const el = document.getElementById("artifactPanelBodyScroll");
        if (!el) return;
        const apply = () => {
          el.scrollTop = el.scrollHeight;
        };
        apply();
        requestAnimationFrame(() => {
          apply();
        });
      };

      const refreshArtifactPanelInPlace = () => {
        const panel = document.getElementById("artifactPanel");
        const host = document.getElementById("taskConversationLayout");
        if (!host) return;
        const existing = document.getElementById("artifactPanel");
        if (artifactPanelOpen) {
          const html = renderArtifactPanelShellHtml();
          if (existing) {
            existing.outerHTML = html;
          } else {
            host.insertAdjacentHTML("beforeend", html);
          }
          bindArtifactPanel(activeTaskId);
          if (isTaskStreaming) {
            scrollArtifactPanelToBottom();
          }
        } else if (existing) {
          existing.remove();
        }
      };

      const loadArtifactPanelFile = async (taskId, path) => {
        if (!taskId || !path) return;
        const readPath = normalizeArtifactReadPath(path);
        artifactPanelPath = readPath;
        artifactPanelLoading = true;
        artifactPanelTab = "changes";
        refreshArtifactPanelInPlace();
        try {
          const data = await window.AgentDeskAPI.getWorkspaceFile(taskId, readPath);
          artifactPanelPreview = data;
        } catch (err) {
          artifactPanelPreview = {
            content: err instanceof Error ? err.message : "加载失败",
            lines: 0,
          };
        } finally {
          artifactPanelLoading = false;
          refreshArtifactPanelInPlace();
        }
      };

      const loadArtifactPanelTree = async (taskId) => {
        if (!taskId) return;
        try {
          const data = await window.AgentDeskAPI.getWorkspaceTree(taskId);
          artifactPanelFiles = Array.isArray(data.files) ? data.files : [];
        } catch (_) {
          artifactPanelFiles = [];
        }
      };

      const openArtifactPanel = async (taskId, options = {}) => {
        artifactPanelOpen = true;
        artifactPanelTab = options.tab || artifactPanelTab || "changes";
        if (options.path) {
          await loadArtifactPanelTree(taskId);
          await loadArtifactPanelFile(taskId, options.path);
          return;
        }
        await loadArtifactPanelTree(taskId);
        refreshArtifactPanelInPlace();
      };

      const closeArtifactPanel = () => {
        artifactPanelOpen = false;
        refreshArtifactPanelInPlace();
      };

      const bindArtifactPanel = (taskId) => {
        const panel = document.getElementById("artifactPanel");
        if (!panel) return;
        panel.querySelector("#artifactPanelClose")?.addEventListener("click", closeArtifactPanel);
        panel.querySelectorAll("[data-artifact-tab]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            artifactPanelTab = btn.getAttribute("data-artifact-tab") || "changes";
            if (artifactPanelTab === "files") {
              await loadArtifactPanelTree(taskId);
            }
            refreshArtifactPanelInPlace();
          });
        });
        panel.querySelectorAll("[data-artifact-file]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = btn.getAttribute("data-artifact-file");
            if (path) void loadArtifactPanelFile(taskId, path);
          });
          btn.addEventListener("contextmenu", (event) => {
            const path = btn.getAttribute("data-artifact-file");
            if (path) showArtifactContextMenu(event, taskId, path);
          });
        });
      };

      const bindArtifactChips = (root, taskId) => {
        if (!root) return;
        root.querySelectorAll("[data-artifact-chip]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = btn.getAttribute("data-artifact-path");
            const role = btn.getAttribute("data-artifact-role") || "change";
            if (path) {
              void openArtifactPanel(taskId, {
                path,
                tab: role === "product" ? "files" : "changes",
              });
            }
          });
          btn.addEventListener("contextmenu", (event) => {
            const path = btn.getAttribute("data-artifact-path");
            if (path) showArtifactContextMenu(event, taskId, path);
          });
        });
        root.querySelectorAll("[data-artifact-view-all]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const tab = btn.getAttribute("data-artifact-tab") || "files";
            void openArtifactPanel(taskId, { tab });
          });
        });
      };

      const TRACE_STEP_LABELS = {
        context_compact_end: "上下文已压缩",
        context_compact_error: "上下文压缩失败",
        tool_result_pruned: "工具输出已裁剪",
        context_offload: "工具输出已归档",
        thinking_start: "深度思考",
        thinking_end: "深度思考完成",
        skill_read_existing: "阅读已有技能",
        reply_start: "开始处理",
        reply_end: "本轮回复结束",
      };

      const TRACE_SKIP_PLAIN_STEPS = new Set(["reply_start", "reply_end"]);

      const TRACE_DETAIL_LIMIT = 3200;
      const TRACE_TOOL_MERGE_STEPS = new Set([
        "tool_call_start",
        "tool_call_end",
        "tool_result_start",
        "tool_result_delta",
        "tool_result_end",
      ]);
      const TRACE_SKIP_PLAIN = new Set(["thinking_delta", "tool_call_start", "tool_result_start"]);

      const createThinkingProcessStep = (id, time = "") => ({
        type: "thinking",
        id: id || "thinking",
        time,
        title: "深度思考",
        text: "",
        pending: true,
      });

      const traceEventTimeHint = (evt) =>
        typeof evt.created_at === "string" && evt.created_at.length >= 19
          ? evt.created_at.slice(11, 19)
          : formatEventTime(evt.created_at);

      const traceProcessIconSvg = (kind) => {
        const paths = {
          eye: '<path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6Z" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/>',
          terminal:
            '<path d="M4 7l3 3-3 3M9 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
          globe:
            '<circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M3 10h14M10 3a12 12 0 010 14M10 3a12 12 0 000 14" stroke="currentColor" stroke-width="1.5" fill="none"/>',
          file:
            '<path d="M6 3h5l3 3v11H6V3Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M11 3v4h4" stroke="currentColor" stroke-width="1.5" fill="none"/>',
          list: '<path d="M4 6h12M4 10h12M4 14h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>',
          search:
            '<circle cx="9" cy="9" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M13 13l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>',
          model:
            '<path d="M4 6h12v8H4V6Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 14v2M13 14v2M7 6V4M13 6V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>',
          brain:
            '<path d="M10 4.5c-2.2 0-4 1.5-4 3.6 0 .9.3 1.7.9 2.3-.6.6-.9 1.4-.9 2.3 0 2 1.6 3.6 3.6 3.6.5 0 1-.1 1.4-.3.4.8 1.2 1.3 2.1 1.3 1.5 0 2.7-1.2 2.7-2.7 0-.4-.1-.8-.3-1.1 1.1-.5 1.9-1.6 1.9-2.9 0-1.8-1.5-3.3-3.4-3.3Z" stroke="currentColor" stroke-width="1.3" fill="none"/>',
          tool: '<path d="M7 3l2 2-1 1 5 5 1-1 2 2-3 3-2-2-1 1-5-5-1 1-2-2 3-3Z" stroke="currentColor" stroke-width="1.3" fill="none"/>',
          step: '<circle cx="10" cy="10" r="2" fill="currentColor"/>',
        };
        const inner = paths[kind] || paths.step;
        return `<svg viewBox="0 0 20 20" fill="none" class="h-3.5 w-3.5" aria-hidden="true">${inner}</svg>`;
      };

      const traceIconKindForTool = (toolName) => {
        const n = String(toolName || "").toLowerCase();
        if (n === "read_file" || n === "read") return "eye";
        if (n.includes("shell") || n === "bash" || n === "execute_shell_command") return "terminal";
        if (n === "web_fetch" || n.includes("fetch")) return "globe";
        if (n === "glob_search" || n === "glob" || n === "grep_search" || n === "grep") return "search";
        if (n.includes("write") || n.includes("edit")) return "file";
        if (n.includes("propose") || n.includes("clarify") || n.includes("choice")) return "list";
        return "tool";
      };

      const parseToolResultSections = (detail) => {
        const text = String(detail || "").trim();
        if (!text) return { input: "", output: "" };
        const inputMatch = text.match(/^【参数】\n([\s\S]*?)(?:\n\n【输出】\n|$)/);
        const outputMatch = text.match(/\n\n【输出】\n([\s\S]*)$|^【输出】\n([\s\S]*)$/);
        if (inputMatch || outputMatch) {
          return {
            input: inputMatch ? inputMatch[1].trim() : "",
            output: (outputMatch ? outputMatch[1] || outputMatch[2] : "").trim(),
          };
        }
        return { input: "", output: text };
      };

      const parseToolNameFromLabel = (label) => {
        const m = String(label || "").match(/工具完成[：:]\s*([^\s（(]+)/);
        return m ? m[1].trim() : "";
      };

      const isDelegateTeamWorkerTool = (toolName) =>
        String(toolName || "").includes("delegate_team_worker");

      const traceWorkerPrefix = (evt) => {
        const extra = evt?.extra;
        const worker =
          (extra && typeof extra === "object" && extra.team_worker) ||
          evt?.team_worker ||
          "";
        return worker ? `@${worker} · ` : "";
      };

      const splitToolInputPreview = (detail, toolName) => {
        const text = String(detail || "").trim();
        if (!text) return { desc: "", command: "" };
        const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
        const cmdIdx = lines.findIndex((l) => l.startsWith("$ "));
        const kind = traceIconKindForTool(toolName);
        if (kind === "terminal" && cmdIdx >= 0) {
          return {
            desc: lines.slice(0, cmdIdx).join("\n"),
            command: lines.slice(cmdIdx).map((l) => l.replace(/^\$\s*/, "")).join("\n"),
          };
        }
        if (lines.length <= 1) return { desc: text, command: "" };
        return { desc: lines[0], command: lines.slice(1).join("\n") };
      };

      const createToolProcessStep = (evt, id, stepsLen = 0) => ({
        type: "tool",
        id: id || `tool-${stepsLen}`,
        toolName: evt.tool_name || parseToolNameFromLabel(evt.label) || "",
        time: traceEventTimeHint(evt),
        title: "",
        input: "",
        output: "",
        state: "",
        pending: true,
        startedAt:
          evt.created_at && !Number.isNaN(Date.parse(evt.created_at))
            ? Date.parse(evt.created_at)
            : Date.now(),
      });

      const buildProcessStepsFromTraces = (traces, options = {}) => {
        const steps = [];
        const toolById = new Map();
        let lastOpenTool = null;
        let thinkingStep = null;
        const liveThinking = String(options.thinkingText || "").trim();
        if (liveThinking && options.thinkingPending !== false) {
          thinkingStep = createThinkingProcessStep("thinking-live");
          thinkingStep.text = liveThinking;
          steps.push(thinkingStep);
        }
        for (const evt of traces || []) {
          if (!evt) continue;
          if (evt.step === "thinking_delta") {
            if (!thinkingStep) {
              thinkingStep = createThinkingProcessStep(
                evt.thinking_id || "thinking",
                traceEventTimeHint(evt),
              );
              steps.push(thinkingStep);
            }
            thinkingStep.text = `${thinkingStep.text || ""}${evt.detail || ""}`;
            continue;
          }
          if (evt.step === "thinking_start") {
            if (!thinkingStep) {
              thinkingStep = createThinkingProcessStep(
                evt.thinking_id || "thinking",
                traceEventTimeHint(evt),
              );
              steps.push(thinkingStep);
            }
            if (evt.label) thinkingStep.title = evt.label;
            continue;
          }
          if (evt.step === "thinking_end") {
            if (!thinkingStep) {
              thinkingStep = createThinkingProcessStep(
                evt.thinking_id || "thinking",
                traceEventTimeHint(evt),
              );
              steps.push(thinkingStep);
            }
            if (evt.detail) thinkingStep.text = String(evt.detail);
            thinkingStep.pending = false;
            thinkingStep.title = evt.label || TRACE_STEP_LABELS.thinking_end;
            thinkingStep = null;
            continue;
          }
          if (TRACE_TOOL_MERGE_STEPS.has(evt.step)) {
            const tid = evt.tool_call_id || null;
            let t = null;
            if (tid) {
              if (!toolById.has(tid)) {
                const entry = createToolProcessStep(evt, tid, steps.length);
                toolById.set(tid, entry);
                steps.push(entry);
                lastOpenTool = entry;
              }
              t = toolById.get(tid);
            } else if (evt.step === "tool_call_end") {
              const entry = createToolProcessStep(evt, `seq-${steps.length}`, steps.length);
              steps.push(entry);
              lastOpenTool = entry;
              t = entry;
            } else if (evt.step === "tool_result_end") {
              if (lastOpenTool && lastOpenTool.pending) {
                t = lastOpenTool;
              } else {
                const entry = createToolProcessStep(evt, `seq-${steps.length}`, steps.length);
                steps.push(entry);
                lastOpenTool = entry;
                t = entry;
              }
            } else {
              continue;
            }
            if (evt.tool_name) t.toolName = evt.tool_name;
            if (!t.toolName) t.toolName = parseToolNameFromLabel(evt.label);
            if (evt.created_at) t.time = traceEventTimeHint(evt);
            if (evt.step === "tool_call_start") {
              t.title =
                traceWorkerPrefix(evt) +
                (evt.label || t.title || `调用 ${t.toolName || "工具"}`);
            }
            if (evt.step === "tool_call_end") {
              t.title =
                traceWorkerPrefix(evt) +
                (evt.label || t.title || `调用 ${t.toolName || "工具"}`);
              if (evt.detail) t.input = String(evt.detail);
            }
            if (evt.step === "tool_result_delta") {
              t.output = `${t.output || ""}${evt.detail || ""}`;
            }
            if (evt.step === "tool_result_end") {
              t.pending = false;
              t.state = evt.state || "success";
              const sections = parseToolResultSections(evt.detail);
              if (sections.input && !t.input) t.input = sections.input;
              if (sections.output) {
                t.output = t.output ? `${t.output}\n${sections.output}` : sections.output;
              } else if (evt.detail && !sections.input) {
                t.output = t.output ? `${t.output}\n${evt.detail}` : String(evt.detail);
              }
              if (!t.title) {
                t.title =
                  traceWorkerPrefix(evt) +
                  (evt.label || `完成 ${t.toolName || "工具"}`);
              }
              lastOpenTool = null;
            }
            continue;
          }
          if (TRACE_SKIP_PLAIN.has(evt.step)) continue;
          if (evt.step === "skill_read_existing") {
            const rel = String(evt.detail || "").trim();
            steps.push({
              type: "simple",
              iconKind: "eye",
              time: traceEventTimeHint(evt),
              text: evt.label || (rel ? `已读取 ${rel} L1-末尾` : "阅读已有技能"),
            });
            continue;
          }
          if (TRACE_SKIP_PLAIN_STEPS.has(evt.step)) continue;
          if (evt.step === "thinking_start" || evt.step === "thinking_end") continue;
          steps.push({
            type: "plain",
            step: evt.step,
            time: traceEventTimeHint(evt),
            label:
              traceWorkerPrefix(evt) +
              (TRACE_STEP_LABELS[evt.step] || evt.label || evt.step || "事件"),
            detail: String(evt.detail || "").trim(),
          });
        }
        if (options.activityPending && String(options.activityText || "").trim()) {
          steps.push({
            type: "simple",
            iconKind: "step",
            time: "",
            text: `输出中：${String(options.activityText).trim().slice(-160)}`,
          });
        }
        steps.forEach((step, idx) => {
          if (step.type === "thinking" && step.pending && liveThinking) {
            step.text = liveThinking;
          }
          if (
            step.type === "tool" &&
            step.pending &&
            isDelegateTeamWorkerTool(step.toolName) &&
            idx < steps.length - 1
          ) {
            step.pending = false;
            step.state = step.state || "success";
          }
        });
        return steps;
      };

      const buildProcessStepOptions = (runtime, overrides = {}) => ({
        thinkingText: runtime?.thinking,
        thinkingPending: Boolean(
          overrides.thinkingPending ??
            (runtime?.thinking && isTaskStreaming),
        ),
        activityText: runtime?.activityText,
        activityPending: overrides.activityPending ?? isTaskStreaming,
        pulseAt: runtime?.pulseAt || 0,
      });

      const computeToolUsageFromTraces = (traces) => {
        const usage = {};
        for (const step of buildProcessStepsFromTraces(traces)) {
          if (step.type !== "tool" || !step.toolName) continue;
          usage[step.toolName] = (usage[step.toolName] || 0) + 1;
        }
        return usage;
      };

      const renderRuntimeStatsHeaderHtml = (runtime) => {
        const stats = runtime?.stats || currentTaskStats || {};
        const traces = runtime?.traces || [];
        const toolUsage = Object.keys(stats.tool_usage || {}).length
          ? stats.tool_usage
          : computeToolUsageFromTraces(traces);
        const toolTags = Object.keys(toolUsage)
          .map(
            (name) =>
              `<span class="rounded-full border border-blue-100 bg-blue-50 px-2 py-0.5 text-[10px] text-blue-700">${escapeHtml(
                name,
              )} × ${toolUsage[name]}</span>`,
          )
          .join("");
        const toolCalls = runtime?.toolCallCount || stats.tool_calls || countToolStepsFromTraces(traces);
        return `
          <div class="wm-runtime-stats-grid">
            <div class="wm-runtime-stat-cell">事件数：${stats.events || traces.length || 0}</div>
            <div class="wm-runtime-stat-cell">模型调用：${stats.model_calls || 0}</div>
            <div class="wm-runtime-stat-cell">工具调用：${toolCalls}</div>
            <div class="wm-runtime-stat-cell">Tokens：${stats.total_tokens || 0}</div>
          </div>
          <div class="mt-2 flex flex-wrap gap-1">${toolTags || '<span class="text-[10px] text-gray-400">暂无工具统计</span>'}</div>
        `;
      };

      const countProcessTraceEvents = (traces, runtime) =>
        buildProcessStepsFromTraces(traces, buildProcessStepOptions(runtime)).length;

      const countToolStepsFromTraces = (traces) =>
        buildProcessStepsFromTraces(traces).filter((s) => s.type === "tool").length;

      const renderProcessCommandHtml = (command) => {
        const text = String(command || "").trim();
        if (!text) return "";
        const clipped = text.slice(0, TRACE_DETAIL_LIMIT);
        const long = text.length > 280;
        if (!long) {
          return `<div class="wm-process-command"><span class="wm-process-command-prefix">&gt;_</span><span>${escapeHtml(
            clipped,
          )}</span></div>`;
        }
        return `<details class="wm-process-command cursor-pointer">
          <summary class="list-none"><span class="wm-process-command-prefix">&gt;_</span> ${escapeHtml(
            clipped.slice(0, 120),
          )}…</summary>
          <div class="mt-1 whitespace-pre-wrap break-words">${escapeHtml(clipped)}</div>
        </details>`;
      };

      const renderProcessOutputCardHtml = (step, output) => {
        const state = step.state === "success" || !step.state ? "success" : step.state;
        const label = step.toolName
          ? `工具完成（${state}）`
          : `输出（${state}）`;
        return `<li class="wm-process-output-card">
          <div class="wm-process-output-head">
            <span class="wm-process-time">[${escapeHtml(step.time)}]</span>
            <span class="wm-process-output-badge">输出</span>
            <span class="min-w-0 flex-1 truncate">${escapeHtml(label)}</span>
          </div>
          <div class="wm-trace-tool-body">${escapeHtml(output)}</div>
        </li>`;
      };

      const renderProcessSimpleHtml = (step) =>
        `<li class="wm-process-simple">
          <span class="wm-process-icon is-tool">${traceProcessIconSvg(step.iconKind || "eye")}</span>
          <div class="wm-process-simple-text">
            <span class="wm-process-time">[${escapeHtml(step.time)}]</span>
            ${escapeHtml(step.text || "")}
          </div>
        </li>`;

      const renderProcessStepHtml = (step) => {
        if (!step) return "";
        if (step.type === "simple") return renderProcessSimpleHtml(step);
        if (step.type === "thinking") {
          const text = String(step.text || "").trim().slice(0, TRACE_DETAIL_LIMIT);
          const statusCls = step.pending ? "is-pending" : "is-success";
          const statusText = step.pending ? "思考中" : "完成";
          const body = text
            ? `<details class="wm-process-desc mt-1 cursor-pointer" ${step.pending ? "open" : ""}>
                <summary class="list-none text-[10px] text-violet-600">${step.pending ? "展开思考过程" : "查看思考过程"}</summary>
                <div class="mt-1 whitespace-pre-wrap break-words">${escapeHtml(text)}</div>
              </details>`
            : `<div class="wm-process-desc mt-1 text-[10px] text-gray-400">${step.pending ? "等待模型输出…" : "（无内容）"}</div>`;
          return `<li class="wm-process-step is-thinking">
            <div class="wm-process-step-row">
              <span class="wm-process-icon is-thinking">${traceProcessIconSvg("brain")}</span>
              <div class="wm-process-body min-w-0 flex-1">
                <div class="wm-process-title">
                  <span class="wm-process-time">[${escapeHtml(step.time || "--:--:--")}]</span>
                  ${escapeHtml(step.title || "深度思考")}
                  <span class="wm-process-status ${statusCls} ml-1">${statusText}</span>
                </div>
                ${body}
              </div>
            </div>
          </li>`;
        }
        if (step.type === "plain") {
          const iconKind = step.step?.startsWith("model_") ? "model" : "step";
          const iconClass = step.step?.startsWith("model_") ? "is-model" : "";
          return `<li class="wm-process-plain">
            <span class="wm-process-icon ${iconClass}">${traceProcessIconSvg(iconKind)}</span>
            <div class="min-w-0 flex-1">
              <span class="wm-process-time">[${escapeHtml(step.time)}]</span>
              ${escapeHtml(step.label)}
              ${step.detail ? `<div class="wm-trace-line-detail">${escapeHtml(step.detail.slice(0, TRACE_DETAIL_LIMIT))}</div>` : ""}
            </div>
          </li>`;
        }
        const iconKind = traceIconKindForTool(step.toolName);
        const { desc, command } = splitToolInputPreview(step.input, step.toolName);
        const title =
          step.title ||
          desc ||
          (step.toolName ? `调用 ${step.toolName}` : "工具调用");
        const showDesc = desc && desc !== title && desc !== step.input;
        const statusCls = step.pending
          ? "is-pending"
          : String(step.state || "success").toLowerCase().includes("error") ||
              String(step.state || "").toLowerCase().includes("fail")
            ? "is-error"
            : "is-success";
        let statusText = step.pending
          ? "执行中"
          : step.state === "success" || !step.state
            ? "完成"
            : step.state;
        if (step.pending && step.startedAt) {
          const elapsed = Math.max(0, Math.floor((Date.now() - step.startedAt) / 1000));
          if (elapsed >= 2) statusText = `执行中 · ${elapsed}s`;
        }
        const output = String(step.output || "").trim().slice(0, TRACE_DETAIL_LIMIT);
        const toolBadge = step.toolName
          ? `<span class="rounded border border-gray-200 bg-gray-50 px-1.5 py-0.5 font-mono text-[10px] text-gray-600">${escapeHtml(
              step.toolName,
            )}</span>`
          : "";
        const rawInput =
          !command && step.input && step.input !== title && step.input !== desc
            ? step.input.slice(0, TRACE_DETAIL_LIMIT)
