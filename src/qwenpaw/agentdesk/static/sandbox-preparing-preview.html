<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandbox Preparing Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #f8faf9;
      background-image:
        radial-gradient(ellipse 70% 45% at 50% -10%, rgba(16, 185, 129, 0.1), transparent 55%),
        radial-gradient(ellipse 45% 35% at 95% 45%, rgba(59, 130, 246, 0.06), transparent 50%),
        radial-gradient(ellipse 40% 30% at 5% 85%, rgba(16, 185, 129, 0.05), transparent 50%);
    }
    .card {
      width: 352px;
      padding: 28px 24px 24px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06), 0 0 0 3px rgba(16, 185, 129, 0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .brand {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 14px rgba(15,23,42,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: #065f46;
    }
    .art { width: 160px; height: 160px; }
    .title {
      margin-top: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      text-align: center;
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .progress {
      margin-top: 16px;
      width: 100%;
      height: 3px;
      border-radius: 9999px;
      background: rgba(243, 244, 246, 0.95);
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 42%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #059669, #34d399, #059669);
      background-size: 200% 100%;
      animation: progress 1.6s ease-in-out infinite;
    }
    @keyframes progress {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1); }
    }
    @keyframes scan {
      0%, 100% { transform: translateY(0); opacity: 0.35; }
      50% { transform: translateY(72px); opacity: 0.85; }
    }
    .ring-outer { transform-origin: 100px 100px; animation: spin 14s linear infinite; }
    .ring-inner { transform-origin: 100px 100px; animation: spin 9s linear infinite reverse; }
    .cell { animation: pulse 1.8s ease-in-out infinite; }
    .scan { animation: scan 2.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="card" id="capture">
    <div class="brand" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor">
        <path d="M12 3l1.6 4.9L18.5 9l-4.9 1.6L12 15.5 9.4 10.6 4.5 9l4.9-1.6L12 3z"/>
        <path d="M19 14l.9 2.7L22.5 18l-2.6.9L19 21.5l-.9-2.6L15.5 18l2.6-.9L19 14z"/>
      </svg>
    </div>
    <svg class="art" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ring" x1="40" y1="20" x2="160" y2="180" gradientUnits="userSpaceOnUse">
          <stop stop-color="#10B981"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0.55"/>
        </linearGradient>
        <linearGradient id="fill" x1="70" y1="70" x2="130" y2="130" gradientUnits="userSpaceOnUse">
          <stop stop-color="#ECFDF5"/><stop offset="1" stop-color="#F0FDF4"/>
        </linearGradient>
      </defs>
      <circle class="ring-outer" cx="100" cy="100" r="78" stroke="url(#ring)" stroke-width="2" stroke-dasharray="8 10" stroke-linecap="round" opacity="0.55"/>
      <circle class="ring-inner" cx="100" cy="100" r="68" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 14" opacity="0.28"/>
      <rect x="58" y="58" width="84" height="84" rx="16" fill="url(#fill)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
      <rect class="cell" style="animation-delay:0s" x="72" y="72" width="14" height="14" rx="4" fill="#059669" opacity="0.75"/>
      <rect class="cell" style="animation-delay:.12s" x="92" y="72" width="14" height="14" rx="4" fill="#059669" opacity="0.55"/>
      <rect class="cell" style="animation-delay:.24s" x="112" y="72" width="14" height="14" rx="4" fill="#059669" opacity="0.45"/>
      <rect class="cell" style="animation-delay:.36s" x="72" y="92" width="14" height="14" rx="4" fill="#059669" opacity="0.65"/>
      <rect class="cell" style="animation-delay:.48s" x="92" y="92" width="14" height="14" rx="4" fill="#059669" opacity="1"/>
      <rect class="cell" style="animation-delay:.6s" x="112" y="92" width="14" height="14" rx="4" fill="#059669" opacity="0.5"/>
      <rect class="cell" style="animation-delay:.72s" x="72" y="112" width="14" height="14" rx="4" fill="#059669" opacity="0.4"/>
      <rect class="cell" style="animation-delay:.84s" x="112" y="112" width="14" height="14" rx="4" fill="#059669" opacity="0.45"/>
      <rect class="cell" style="animation-delay:.96s" x="92" y="112" width="14" height="14" rx="4" fill="#059669" opacity="0.6"/>
      <rect class="scan" x="62" y="92" width="76" height="3" rx="1.5" fill="#34D399" opacity="0.85"/>
      <circle cx="36" cy="100" r="5" fill="#10B981" opacity="0.8"/>
      <circle cx="164" cy="72" r="4" fill="#3B82F6" opacity="0.75"/>
      <circle cx="164" cy="128" r="4" fill="#059669" opacity="0.6"/>
    </svg>
    <p class="title">正在准备沙箱环境…</p>
    <p class="hint">隔离工作区 · 挂载依赖 · 校验权限</p>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>
</body>
</html>
